body:
  text: 蓮峯集巻三宋史堯弼撰表代柳觀察謝御書表宸章飛動昭垂奎宿之文黌宇輝華増重坤隅之勢聳觀多士欣戴羣黎臣誠惶誠懼頓首頓首竊以卦爻彖象之言歴更四聖仁義道徳之㫖著成七篇用敷美於本朝尤推尊於先聖躬製贊詞之潤載形心術之微布在丹青煥然雲漢此蓋伏遇皇帝陛下神心經緯聖學緝熈探金匱石室之藏應河圖洛書之瑞放牛歸馬方將修文徳於逺人卧虎跳龍豈止逹書名以外史頒行天下昭示方來臣謬居承宣獲與瞻覩天顔咫尺如臨泮水以甚嚴神物䕶持當與岷山而不朽代張觀察賀皇帝幸學表清蹕風驅徃傃膠庠之地儒冠雲集幸瞻天日之光豈獨一時之榮允為千載之盛恭以臨雍之禮從古已行莫如我朝數舉斯典必命儒臣之選講眀聖奥之歸太宗詢爻象之文深研消長章聖探典謨之訓益勵憂勤丹青具存風烈如在自非孝治之世孰繩祖武之休恭惟皇帝陛下學本生知理有心㑹以斯道幾微為宵衣之念以人才未作為側席之憂乃闢賢關一陶士類欲使衣冠之俗悉知禮義之尊爰率舊章以風寰海臣嘗汙邇列邈在逺隅阻望後塵暨百僚而稱慶式觀成化與三代以同風策問問后䕫師曠之於音而有惉懘非所以為善樂也王良造父之於馬而有蹶驟非所以為善御也禹湯文武成王周公之於政而猶有疎闊烏得為善治者哉孔子曰行夏之時蓋以建寅之正奉天時授民事為最正者夫夏之時既巳盡善而商周何乃建子建丑紛更之為四時之令十二氣之事無乃舛逆而不順歟龍子曰治地莫善於助莫不善於貢禹勤勞於天下民之便不便利害纎悉之際宜無不盡者而貢猶有所不善者何也夫助法既已善矣而周人必改為徹豈亦好為更張而不寧者歟周初五刑之屬二千有五百輕刑與重刑相若文王以來未之有改也至穆王始作吕刑其屬三千减大辟三百宫刑二百而増墨劓為千使輕刑多而重刑寡夫周之初其刑皆重而今始輕意者文武成王周公之仁不及穆王歟三代之法可謂盡美矣而時獨夏為正賦獨商為善刑獨周穆王為輕凡其法皆聖人作而各有未盡常求其説而不得願與諸君論之問所貴乎聖者貴其能知天命也命當行耶吾之道與之偕行命當止耶吾之道與之偕止盈虚消息周旋曲折聖賢之所昭徹獨見乎此其必無失也矣然而孔子執贄行于天下所見之君無慮數十而尤眷眷於衛靈魯哀齊景而不去甚者至於南子之汚公山佛肸之叛而猶徃焉何其求用之汲汲戰國之世則又大異於春秋矣而孟子持必不可合之説以見不足與有為之君如齊之宣王既已不能用孟子而猶徘徊於晝以待其召而復也雖蕞爾之滕其在天下眇然甚微而亦與之論王道惟恐其不見用也無乃於道自輕而不自重歟豈知其不可而强與之歟抑不知其不可而冒進歟皆非所以為知天命者也聖賢之意將安在願與諸生辨之問天生財而民用之君理之必使民裕於下君足於上上下兼得而不可以一缺此古今不易之道也然夏商周之時兩得之漢唐之時兩失之有不可不論者禹之治水勤天下之力冀兖之作至十有三載乃同而餘州猶不與焉湯之興以七十里之國而文王武王亦不過百里當其初造之時四方君長日交於廷征誅之師日出於外湯又以餘力餉葛伯文王亦嵗奉商之職貢當此時澤梁不禁闗市不征賦斂薄而國不匱民不困未嘗聞其理財而沛然常有餘卒以此成王業此何為其然也至於漢唐以全盛之天下而又理財之道日夜講求無所不至漢之𣙜酤鹽鐵白金皮幣唐之隠户剰田間架之利轉漕之法無所不用桑羊孔僅趙過宇文融第五琦劉晏李巽之徒鞭算心計無所不盡然而君民皆耗虛至以此生變此又何為其然也豈天之生財饒於古而嗇於後耶抑時有盈有虛而術有善不善耶恭惟國家軍國之費亦廣矣然比年以來罷力役之征以惠四方又念蜀逺民或有未裕則萬里遣使求所以裕之者甚惠日者恩詔之下所以搜求其條目罷而去之以厚民者甚備普天之民孰不銜戴而蜀民呼舞獨為甚切吾君吾相澤流天下為甚大矣其所以足國裕民而兩得者近所未有此亦何道而然歟夫不求漢唐之失無以知夏商周之得不觀夏商周之得無以見今日之美願詳著之于篇問異學之在天下君子必鋤而去之者以其有害於吾之道也孔子曰惡莠恐其亂苗惡紫恐其亂朱所惡者惡其似是而非耳夫異學者必並縁聖人之説而有甚似於其間墨氏兼愛而同是堯舜許行欲君民並耕而其説本於神農孟子因而闢之豈非以其近似而為害深也歟吾宋元祐間伊川程氏進於朝其學始盛於伊洛至今而遂廣及於天下其説一本於中庸大學舉誠與恭以為謹獨之要務在黙識力行而去人欲而全天理凡佛老雜説皆擯斥不道而一以孔氏為宗天下之士見其本於孔氏也是以波蕩而從之無疑其説之是與非同與異甚似而難辨者與墨氏許行又相逺也而論者疾之斷然以為姦何哉今廟堂之上又將行其説而言事之臣皆謂異學而攻之抑以其似是而非歟而推原程氏之學所從得與其所從失於吾夫子之道是否同異果如何以明曉天下庶幾少佐今日扶正道去異學之治云問今學者率喜措意於性命之表務為滉漾不可究知之説以為聖賢之極至禮樂之文綢繆委曲燦然可以相接則指以為粗云徃徃蕩然習放曠而以區區之文為不足學學其極至者斯已矣吁亦既甚病哉且唐虞之盛而皆出於周旋揖遜其所以變化天下之士使之日就道徳之質各適於文武之用剛柔緩急皆不失其中進退語黙而無愧死生禍福之所不能動者意其當時必有大出於禮樂之外然唐虞逺矣猶可以想見者惟其雍容之風尚在耳而三代之法又養之於大學試之於射宫其文為甚詳士生其問出入於和鸞玉佩之中而燕處於雅頌琴瑟之際衣服有常几杖有銘視聽言動莫不有節若此者抑亦可以為粗歟則洒掃庭内衛武之所警恂恂鄉黨孔子之所居者皆今之學者所嘗忽也而二聖人之所篤行者獨何哉然昔之論君子者以為不必相與言也以禮樂示之而已夫禮樂之用又何以不言而相示歟夫成於樂立於禮所以為學之終始者其㫖安在願聞其實問振天下於怠惰廢弛因循苟且之中而與為剛健奮振卓然有立之治此人君之最難能古今之最難逢當世仁人君子豪傑有志之士所以咨嗟憤悶慕望而不得見者也自非人君赫然有立於上而天下之人雜然應之於下有不能至者矣昔者周之治放於柔弱宣王起而振之漢之治放於因循宣帝起而振之唐之治放於姑息憲宗起而振之三代以來迄於五季獨能以剛健振起者惟此三君而已是可謂難得也矣夫豈三君者獨能赫然自為之哉蓋亦天下之人雜然應之而後能至於此也嘗考之於其書周家之臣王命之肅必與將之邦國之否必與眀之衮職之闕必與補之何其忠也神爵甘露之間至於文學法理工匠技巧之事皆極其能何其精也元和之初薦士三十以助成其治者何其盛也豈天下之人自盡其力而為之歟抑三君者有術於此以起之歟不可不究眀其所以然恭惟主上當中興平定之餘慮天下之人久廢於無事英斷獨運動蕩振刷而大作起之廣開衆正之門杜絶羣枉之路憲度一新威令一振風聲所暨際天所覆罔有内外莫不悚動鼔舞以觀千載希濶之舉詩云周雖舊邦其命維新今欲使天下之人盡革去前日怠惰廢弛因循苟且之風羣臣皆如周之忠萬事悉如漢之精衆才又如唐之盛以大應今日惟新之治將何道而可其併三君所以然者悉陳之以佐今日之萬一云問三代以降天下之俗何紛紜其亟變也一時之士必有一時之俗一時之俗必有一時之弊一時之弊必有一時之害未有有士而無俗有俗而無弊有弊而無害者此何為其然也士患智不足以識變而戰國之士智而至於詐患勇不足以立事而秦之士勇而趨於利患無寛柔和易之行而西漢之士柔則失於偷患無剛毅挺特之操而東漢之士剛則陷於訐患無髙逺之志晉之士髙矣而蕩為虚浮患無文章之用唐之士文矣而流為華靡豈三代而下者其俗終不可革歟凡所以至此者其故何也其始必有以作之作之必有其端其終必有以成之成之必有其漸以至於風成俗定而不可復改此又不可不求其故而論其所以然也其始不過出於士之所習尚而其利害禍福及於天下而莫可解其可不思所以救之之道歟今欲使天下之士智而不至於詐勇而不趨於利柔不偷剛不訐髙不蕩於虚浮文不流於華靡去數代之弊以成一代之俗其亦有道於此乎否也易大傳君子之道或出或處或黙或語二人同心其利斷金所趨甚異而聖人以為同何耶太公佐武王伐商其功列於詩書伯夷不食周粟而傳稱其仁是皆天下之大老嘗經聖人所去取者而不同猶如此出於聖人之後而其趨異者將何以定其同與否耶張良佐漢有天下終從赤松遊而四皓則遁秦亦不仕於漢梅福嘗上書論事一朝棄官以去揚子雲校書天祿嚴君平李仲元皆其友也而終於隠嚴光當光武世亦可出矣而老於釣荀爽申屠蟠徐孺子之於辟命或就或不就諸葛孔眀龎士元事蜀而龎公採藥鹿門不反當此時管寧亦不應朝命晉孫登居宜陽山但撫一絃琴而不言陶潛嘗為縣令矣而賦歸去來王通講道河汾著書垂後蓋有志於世者而稱仲長子光為天隠是衆賢者之所以或出或處或黙或語其意各安所出於君子之道其亦有合乎否耶所趨如此其不齊其心果同乎否耶問甚哉文章之變其得䘮之闗於天而盛衰之闗於世也孔子曰天之將䘮斯文也後死者不得與於斯文也天之未䘮斯文也匡人其如予何文之用否其大矣哉三代之盛訓誥誓命之文風賦雅頌之作道徳仁義禮樂寓于其中聖賢之心術天下理亂之幾微皆在得非闗於天者哉至其衰季孔子出焉刪定系述之文作而其用被于千萬世何其甚盛也豈亦禹湯文武有以作成之歟漢司馬相如輩所作而班固遂以為漢文章與三代同風其果信然耶然固之論如賈誼司馬遷揚雄不在其列何也唐文自太宗以來猶未改六代浮靡之習大歴貞元間韓愈李翺柳宗元出而唐文始復古亦可以庶幾三代之文否也漢唐之文君亦有以作成之歟恭惟吾宋二百餘年文物之盛跨絶百代蓋其始盛於慶歴嘉祐治平而後一振於元祐文采述作論議術學衆多繁夥又非漢唐之所可幾及矣然則祖宗之所以作成之者亦以何道哉夫得䘮之闗天盛衰之闗世千百年之間其盛不過漢與唐與吾宋三而已但吾宋之文章其所從興與其所從盛者何由與三代與漢與唐何辨作成之道何由斷而論焉一王之法為百世之鑑可也問為天下者既有巳行之法必務為可見之效而後天下可為也使其法令雖行而成效不見民不被其實利而國不䝉其休美則所為法令者是徒為無益之文具而已其將何以致天下之理哉國家自軍興以來嵗周一星有半亦久矣今始享一旦息肩之安則夫所以講求乎國本設為已行之法而責其可見之效使民厚其業而樂其生者在今日所不可緩也昔漢文當髙祖創業之後專以農為務其詔之為農而下者十常六七亦以其不可緩焉耳是以當時海内富足興於禮義幾致刑措亦其效之可見者也主上比嵗以來務農之詔旁午於郡縣不啻漢文之日矣而猶以農不加勸糓不加多户口不加益而倉廪日虚為嘆何哉日者下詔㫖欲責漕臣使率屬部守令正經界均賦調趣耕殖以為民仰事俯育養生送死之計夙夜之意至深切也然考之於田野之間則今日之弊猶前日也經界之未正賦調之未均耕殖之未趣者尚多有也嗚呼當循習之久經界未易正也多寡之不齊逃匿隠落之不一賦調未易均也荒蕪之多而游手之衆耕殖未易趣也然則將何術以正之均之趣之使效有可見而法不為虚行使民被實利而國䝉休美哉方求其術而不得諸生其條陳之問三易之書名之所命必有其義書之所作必因乎人卦之所次數之所占孰同而孰異取而為卜筮者孰當而孰否其推明之案史氏自擬策問仍自擬試策原本附録兩篇於策問之後今仍其舊甚矣道之難明也聞道者多而知道者少語道者衆而味道者希其弊盖起於世之儒者措意太過立言太髙而不能知道之深味道之切是以道日逺人而人亦以道為清虛無用之物舉而措之莊老之間是不知道可以一言而盡孔子曰天之將䘮斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何此言道也非言文也語道至是則道之興亡非天而何苟天下幸遇聖人百度修明庶政和穆則是道也應入於刑名度數之間而為禮樂刑政之化天下不幸而逢暗世則是道也亦將自晦于無用之地厯古而來聖聖相承雖所尚之不同所為之各異而區區所傳亘千古厯萬變亦無非是道而已矣故董仲舒曰道之大原出於天天不變道亦不變三聖相承而守一道故繫辭亦曰形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業故古之聖人所以體道之妙用道之實其示天下也雖有可見之迹而實運於不可見之心雖有可知之事而實藏于不可知之用其舉而為事業則可知而可見者常載于詩書其化而裁通而變不可見而不可知者獨傳於三易則易之書實天之所畀道之所在豈可輕議之耶昔伏羲之作造于太古之初其聖神之妙仰觀俯察可以畫卦矣然而未敢以自為也及龍負圖而出於河龜負書而出於洛乃始作八卦以通神眀之徳以類萬物之情文王當眀夷之時羑里之難險阻艱難備嘗之矣重爻之意亦未敢以自擅也及鳯凰之至乃始精六十四卦而重之仲尼值晚周之衰負天縱之將聖以好學之不倦亦可奮然而興易道矣然亦未敢自專也亦曰文王既没文不在兹乎逮夫五十以學易且韋編三絶豈非是書也天之所畀道之所在而聖人亦不敢以輕議者耶向使鳯鳥不至而河不出圖是數聖人者亦泯然而已矣奈何聖人慮患之心思天下後世之切至以謂吾而不言千百載之後吾之所為妙用者蔑而不傳則道亦從而喪矣是以伏羲神農黄帝則有三墳焉夏商周則有三易焉三墳亦三易也三易亦三墳也其妙道一也是皆聖人不可易不可知之事存乎其間蓋是書也亦幸而出於三皇之時而顯于三代之際亦不幸而罹春秋更戰國遭秦歴漢泯没于千百載之後遂使腐儒曲學得以肆其臆説妄議上古遂以為無用之具雖或取信於一時然亦不過目之為卜筮之書大抵其説不過有四以為春秋之時左史倚相能讀三墳五典楚子指以視子革以能讀古書春秋之至今幾千百年矣時之久逺此其所以致疑者一也歴古而來典籍之阨不可勝數矣風雨之霑霈水火之沈燼亦屢矣西漢之興雖間出于屋壁之藏未必能無遺散者故漢下求書之詔是書亦不顯於是時藝文志所錄古書為詳而是書亦不載于當世此其所以致疑者二也周易實出于近古遭秦焚書又以卜筮獨得不廢罷然而載鬼一車需于血出自穴與夫繫辭所謂子曰之辭後世之議者未免致疑于其間况是書姓紀皇策政典之篇文辭質略義㫖深厚不可以言語造者又焉能曉其義耶此其所以致疑者三也羲和湎滛夏后征之其出征之辭引政典曰先時者殺不及時者殺後世莫不以為夏后氏為政之典雖孔安國亦莫不以為然今此書政典之篇頗與書合則其辭之可具載于詩書隠而難知畧而不詳又不過如此此其所以致疑者四也嗚呼歴是四疑而遂使三皇與夫文王孔子盡心者流非特鬰鬰不伸又入于卜筮之學夫豈知治天下之妙用實在于此人更三聖世歴三古天之所畀道之所在者歟噫所不可知之事闕之可也所不能之事置之可也苟不能然而簧鼓邪説妄指聖人之書以為偽妄吁可痛也幸承眀問之及欲論是書之義則非止十稔之窮思數萬之累辭蓋聖人之神道妙用寓於其間而實非區區塲屋之文敢議也若夫止于名之所命書之所作卦之所次數之所占與夫取而為卜筮下及諸儒之論秘府之藏則亦不敢不論以攻邪説恭惟神宗皇帝以道徳格天下以淳厚化斯民天人之妙趣性命之至理藹然見於當時故天不愛道河圖洛書復降是道以助至化元豐之七年西京之部使者廵按部屬歴唐州之比陽是書復出于野民之家天之未喪斯文豈特斯民之幸而亦吾道之幸也昔孔安國叙書以為伏羲神農皇帝之書謂之三墳言天道也今考墳之所以有三曰山墳言君臣民物隂陽兵象謂之連山氣墳言歸藏生動長育止殺謂之歸藏形墳言天地日月山川雲氣謂之坤乾蓋墳雖兆於三皇而其道實顯於夏商周之際故仲尼常曰之杞而得夏時之宋而得坤乾坤乾之義夏時之等吾以是觀之此其命名之義作書之人有如此者連山之書以艮為首歸藏之書以坤為首坤乾以乾為首雖三易之書卦之易次名之不同而其經卦皆八其重爻皆六十有四及夫揲蓍布數取以為占騐則隂陽老少之文大抵亦不離乎七八九六而已蓋七八者少隂少陽之數而九六者老隂老陽之數天地之所為時運之所㑹雖聖人亦豈得與奪於其間耶此其次卦之序占數之際雖稍有不同大抵如執㑹要以觀方來終於殊途同歸耳此其卦之所次數之所占其同異有如此者然而周禮獨載是書於太卜筮人之官而純取以為卜筮遂使聖人之神道以為後世滛巫瞽史卜肆占市之設先儒或以周禮為戰國之説不足怪者且左氏好巫其所載占筮最為詳悉以周易為占者十有六以連山歸藏為占者一南蒯之筮周易之筮者也遇坤之比其繇曰黄裳元吉穆姜之筮于東宫此連山歸藏之筮也遇艮之八其繇曰元亨利貞是南蒯穆姜之筮皆吉兆然而咸以為不祥之事惟此二兆頗為近正其餘又怪誕不經則是書謂之卜筮則可謂之純為卜筮則不可此其所以為卜筮者如此然是書之不幸汨沒于世而杜子春鄭康成皆先儒之美者而無一言以及之又從而為之説曰此隂陽之説也惟杜預孔安國輩粗能得之而亦紛紛藉藉終以不振至於隋唐之盛括囊典籍文物燦然而秘府所藏尚不過連山歸藏二十三巻而坤乾之書亦未見其間此其諸儒之論秘府之藏不過如是而已此三易之始末也抑嘗論之書之泯没于世非大聖大賢則不能振起之也有若荀子有若鶡冠子有若儀禮有若墨子非韓愈而振起之則與異端邪説並棄於世矣有若列子有若文子有若鬼谷子有若亢倉子非柳宗元而力辨之則其遺編餘論亦與草木而煨燼矣是數子者尚不過論五覇之大畧或崇虛無之空言或為黄老刑名之學或出於戰國縱横之流而二賢尚能扶持使炳耀以傳誦于人之耳目况三易之書天之所存道之所在聖人之妙用存其間此正諸生喜與執事者論之問東京何休道術深明有聞于世其解詁公羊之傳也以春秋之論駮漢家之政凡六百餘條其説雖不傳然意其為人必非苟然者其後服䖍又以左氏之説正何休之駮凡六十餘條則何服之學其可謂通經術而曉世務者矣諸君得為何休其能駮漢者何事使諸君為服䖍則其駮何休者何説六經備於孔子隠於戰國火於秦比漢興稍復出矣而西京以朋黨亂東京以圖緯惑聖人之意其存者鮮夫詩書禮樂非明問之所及也請獨以春秋言之春秋之為經一而為傳者有三漢武帝表章六經公羊傳盛行于時糓梁之學出於宣帝左氏之學起於哀平言公羊者有嚴顔眭孟之徒而胡生為之祖言糓梁者有伊胡申章之徒而魯榮廣為之宗言左氏者有陳欽賈復䕶之徒而劉歆為之倡劉歆嘗欲立左氏矣而大司空師丹以為非毁先帝嚴彭祖嘗奏議殿中矣而太傅蕭望之折之以糓梁之言言世次則有孔子子夏傳授之殊言逺近則有齊學魯學之異大抵經有數家家有數説分文析字煩言碎辭信異説而背傳記是末師而非徃古古人所謂黨同門妬道真而無徙善服義之心者是也光武中興承新室詭政之弊而白水卯金之語執以為受命之符此風一扇天下靡然從之於是聖人之經與邪説並行矣郅惲之論謂漢厯久長孔為之訓而賈逵之攻二傳則謂劉氏為堯後惟左氏獨有眀文然則春秋之㫖其説雜乎䜟緯者類皆如此是可嘆也愚嘗論之西漢之士亂于朋黨故朝廷之上無豪傑之士而新室之變遂以興東漢之士惑於邪説故聖人之教日以淪亡而西域之書于焉得入此理勢之自然無足怪者觀西漢春秋之士如公孫宏董仲舒翟方進可謂大儒矣然公孫挾詐多私中傷賢士遷董仲舒殺主父偃皆出隂謀則春秋善善惡惡之理宏蓋不知也方進内求人主微指以固其位善淳于長以持其寵此正犯春秋外交之譏惟江都董生慨然力學有意乎三代之際矣然猶不能卓立傑出而玉杯繁露竹林之書隂陽閉縱災異之學皆守公羊之家法宜乎後世之所深惜者也東京鄭康成囊括大典網羅衆家號為仲尼之門未能逺過而賈景伯父子蓋杜征南所謂先儒之美也然二人之學皆以圖䜟從事則其他可以想見矣景伯常入講南宫黜二傳以扶丘眀彊執誣罔之辭以符異端之説使丘眀有靈其將喜之乎何休嘗以私意著三傳優劣論而康成為之發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我然何休之與康成要皆圖緯之學也左右劔佩彼此相笑豈容一勝一負者乎陳元有言諸儒之駁議皆斷截小文媟瀆微辭以年數小差掇為巨謬遺脱微細指為大尤所謂小辯破言小言破道此兩漢之風俗也眀問所謂何休駁漢事六百餘條服䖍駁何休之所駁六十餘事亦不復置言可也誠難以辱執事之聽矣然審是去非學者之職也試以其學乎春秋者妄為執事言之漢自髙祖以來治雜覇道而叔孫通綿蕝之禮已為一代偉觀則其君臣政事得罪於春秋者如何也春秋公及戎盟于唐已重譏矣而奉春君至於與匈奴結和親約春秋初税畆已深貶矣而武帝至于算及舟車起栢梁臺築臺于秦之罪也射蛟江中矢魚于棠之誅也郡國建廟立武宫煬宫之黜也何休之駁不知其為何語而愚之所駁與休異者愚不學圖䜟也公羊之書喜為怪僻而何休學之又復甚焉以春秋託受命於魯託隠公為受命之王是則無君臣之分以絶文姜不為不孝拒蒯聵不為不順是則無父母之恩以紀季之權絶先祖之祀是則無兄弟之義以至三統之論災異之應皆為違經背道而血書端門之語尤為名教之罪人此何休之失也服䖍之駁不知其為何語而愚之所駁與䖍異者愚不黨同門也嗚呼何服之學愚雖未嘗見而以為不足言者以其人觀之也何服之學愚以為不足言而終有言者以春秋論之也春秋之學于今盛行左氏以杜征南榖梁以范武子而公羊則以休也愚縱觀三家之書考其行事而休實非二子徒也杜征南竒謀偉論振耀一世而江南之役遂収破竹之功謂其不深得左氏可乎范氏之不私所學考聖經而質衆傳斥何晏王弼之論破晉朝浮靡之風此其存心以公之效也執事所謂通經術而曉世務愚意以為有二子之學而後可以當焉若夫講論當世之務質以春秋之説則常日願效二子之為人固不敢以容易談也問朝廷之所尚天下之所趨也所尚者正天下悉趨於正所尚者不正天下悉趨於不正樞機之所發本原之所自不可不謹也蓋三代之季六經之書既作而專門之學未聞於天下也莊老之學雖出而浮虛之學未聞於世也至西漢宣帝與諸儒講六經於石渠東漢顯宗亦與諸儒講六經於橋門自是朝廷所用之公卿大夫皆專門之士也如是天下安得而不趨於專門之學至西晉之君以山濤王衍為政東晉之君以庾亮殷浩為政自是朝廷所用之公卿大夫皆浮虚之士也夫如是天下安得不趨於浮虚之學此二學之行於天下豈非漢晉之君所尚有以驅之耶聖賢之君如日月也而二代之君放為淫僻墮為此學其失安在吾宋之盛朝廷之上未嘗尚此而專門浮虚之學徧天下何哉其所以然者豈無所自耶主上神眀照見新弊申敇天下學校禁專門之學使科舉取士專以經術淵源之文其涉虚無異端者皆勿取所以幸惠天下之士者大矣漢晉之君方且倡為此學真今日之罪人也哉夫專門之學行則議論將入于不通浮虚之學行則人才必至於無用則去之不可以不盡而除之不可以不速也矣漢晉尚此而其學亦行幸攷其所以然而求其所自併與漢晉之所以失者而陳之將告於上盡去而速除之以正天下之學術云

body:
  text: 蓮峯集巻六宋史堯弼撰論洪範論上并引洪範之要有二出於天者其數也施於人者其用也天不能言其用故示之以數聖人者知天之意原其數而得其用者也且天之與人其勢必不能以相接則洪範之所從錫何如其錫也箕子曰天乃錫禹洪範九疇曰九疇者則天亦不過示之以數焉耳世之不知乎此是以其説不傳也久矣誠欲得其傳乎必先有以考其數而後得以明其用數與用皆得而聖人之意乃可以見矣作洪範論上下六經之作有出於人而易知者有出於天而難知者其易知者天下皆可以意推而其難知者雖聖人不能以義起也甚矣説者之惑也舉夫不可以義起者而施之於可以意推者之間而不得其要聖人之道遂以滅没不振天之所以畀付聖人者因以晦而不明亦可惜矣且詩之作不過於咏嘆而書之作亦不過當時相與誥戒故其意若指諸掌無疑也春秋之予奪禮樂之名數雖若有所難知者然皆出於人之所作是故可以意曉而無難也六經之中惟易與洪範乃皆出於天而有所不可知者而或者乃一以詩書春秋禮樂之法而求之則亦不思而已矣昔者河圖之未出九疇之未錫也伏羲與禹之聖盖亦拱手而莫能窺也及夫天之有所畀付而後二聖人者始得以措意乎其間此必有所系乎數而非人之所能與也數者雖非聖人所用心道之出於天下亦非數之所能盡然而非數則道無以見故夫不通於數而論易與洪範者皆一時之曲説而非其實耳然或者猶知以數論易而不知以數論洪範此何也易之為數詳洪範之為數畧詳者顯而畧者晦是以或者之有所不見也且彼不知夫九疇之數聖人不足之為十而止於九皇極之大不加之於初一次二之間而反列於次五是二者其故必有説也竊嘗推之洪範之數盖與河圖合河圖則施於天而洪範則施於人者也河圖之數本於九獨五處其中而為之用其所謂五者即易之天五其餘八位則五之所統也意夫聖人之初見天下之大事物之衆變故之多而不可以尋常治也是以觀天之所為神者攬其要㑹以制其治皇極之次五而處於九疇之中者盖取夫五之為用而疇之所以有九者盖本夫河圖之數加之不可為十損之不可為八而天地事物之理無所不在是也夫然後聖人處其中建皇極以統治之使其彞倫不至於斁以及於亂此洪範之為作而天之所以畀禹也彼不知者則為臆説曰五論人事天則吾不知而遂以論天者為誕如是則行道之人皆可率其私意而作洪範何待天之錫禹之傳武王亦可以自陳而何俟夫箕子哉故嘗論之知天之數然後禹與箕子之意明知夫五之為用然後皇極之所以列于次五之意可見本乎河圖然後疇之所以為九者有所一定而不易其所從生者可考也不然則去道也逺矣洪範論下洪範其出於天乎曰固也其出於天也曰然則孔安國之説淺矣歆向之以災異相傳而明天人之應也不幾於妄乎嗟夫其所謂天者特牽合五行五事庶徴福極之應而為之説爾道之出於天總其要而㑹其歸設為九疇之用舉而措之天下以成聖人之事業者歆向則無毫髮於此矣且箕子之陳洪範將著其應而已乎抑亦求其可以措之天下者之用也若欲考其應則歆向之説且猶未至而况其所謂措之天下者之用哉葢嘗考歆向之書其牽合而有所不至以自乖張其説者葢不少矣然其為妄則莫甚於舉皇極以㕘五事而配之以六極之弱也不知歆向以皇極為何物也哉福旣止於五已分𨽻事無復餘矣獨六極餘其一而無所𨽻遂牽强皇極以充之又外引眊與陰而配之夫眊與陰皆洪範所無者不知歆向何從而得也此亦見其妄甚矣且彼不知夫箕子所以列四疇於上列四疇於下而以皇極當其中獨於次五始明言王道以為之主此其意葢以皇極賅九疇而無所不統也或者之論旣知歆向之為非矣而斷以已説曰洪範百歸之五十五十歸之九九歸之三三者五行也五事也皇極也知皇極之為本其説是矣然曰以一治三三治九九治五十則恐夫箕子之意或有不然也彼葢知九疇之中有相為用者之相應而不知夫不相為用者之倶統於皇極也五行之數五五事之數五五福之數五庶徴之數五其理有相應者故彼得以合之舉庶徴福極以應五行五事而系之於皇極而遂以八政五紀三德稽疑為不相應而在數者之外則亦惑矣夫皇極之於天下猶人之有心謂心為無所不治百骸之理不理係於心之正不正則可而謂以心治首以首治足以足治耳以耳治目則理豈有如是哉故嘗論之皇極雖均為一疇然以道觀之其他八疇皆不過入於形器事物之間而皇極葢居其虚位而無所不治者也苟王道行而極之建則五行之用於物者必得其常五事之見於人者必得其和八政之布於治者必得其理五紀之施於天者必得其叙三德本於中則不悖稽疑定於正則不妄於是庶徴無所致其咎六極無所措其極而五福得以均被天下矣極之不建則反是如是而後洪範之用乃可議矣且洪範之要葢亦簡約易曉非若易之道廣大悉備而無際有所不可窺者苟知皇極之無所不治則知禹與箕子之意無難也彼或者之説乃欲以一治三以三治九而今之説則曰以一而無所不治夫彼是各以其説而皆曰此禹與箕子之意也嗚呼其將何所取正哉天下其獨無明者歟於此三者其必有能擇之矣詩論聖人之於天下所以設為禮樂品節次序綢繆反覆常若迂緩而不迫者此非苟然而已也要使天下之人入乎其中周旋曲折不敢為放恣以消爍其忿戾頑悍難制之氣使其性情和平而樂易其心紆徐温厚而不刻方其無事相與優游雍容以居其安其或與之處危亦將徘徊眷顧不忍割去以及於亂夫天下之情惟其忽焉而合者故亦必將忽焉而離聖人恐其忽然而離以及於亂也是以設為禮樂節文而與為久逺相得之計故夫迂緩不迫者將以求其眷顧而不忍割去也甚矣夫三代之治其朝廷鄉黨閨門之間何其文禮之繁且曲也其朝㑹之際先之以五玉薦之以繰藉而後得入一揖之為簡而三揖之為禮再拜之為易而百拜之為禮其卿士大夫之相見必遵之以僎介表之以三帛二牲一死贄其平居相與宴飲鄉射必嚴其齒德之分定其位置以法三光之象幣帛觥豆酬酢終日而不亂其宗廟之中傴僂跪起分毫不敢為慢易其大者旣總於朝覲祀享冠婚喪祭而其細又及於進趨步武鸞和之鳴籩豆鐘鼓樂舞之數無一不為之疏數之節使其公卿大夫日從事於其間雖其匹夫小民亦於農隙登之公堂合之以大蜡野衣黄冠謳歌鼓舞以盡其歡欣而莫不有文采之序自今觀之雖若濡滯煩數而不知聖人所以調理天下使浸之深習之熟樂不至於淫悲不傷於怨而不為變者其權固在於此也盖嘗得之於詩雖其危亂困苦而其人猶有徘徊眷顧不去之意然後知聖人所為迂緩不迫者之效至此而後見也且周自幽厲以來虐政弊俗布滿天下當時之人非不怨之深切而猶戀戀比物引類稱述先王而隱諷之其言常及於理亂猶冀其或聞而改也且其言曰靜言思之躬自悼矣靜言思之寤擗有摽又曰心之憂矣不遑假寐憂心如酲誰秉國成雖其思之至於自悼自摽而亦未嘗痛割以去憂之深而亦未嘗一念不在於家邦雖心意繁亂而終復於仁義道德之説周衰天下不寧者數百嵗而人終不至崛起以犯上者由此之故也不然憂思而至於割則亂將有不可勝言矣嗟夫後世日相與從事於急迫慘刻而無復有迂緩不迫之治故雖其至尊與至親之間一有所拂逆至於相背相擊亦無復有不忍之意嘗思所以反其本者竊以為欲上之人以情接下丁寧而不倦宜必觀乎書欲下之人以情愛上眷顧而不去宜必觀夫詩庶乎王政可得而聞也中庸論上中庸之説曰君子之道造端乎夫婦及其至察乎天地雖今日為中庸明日為君子聖人以為必可至者非其故為是廣大以私天下彼盖有以曉然知天下之可與皆至於此也今人有百頃之田不自知其五穀之貴而外慕夫商賈金玉之利使其一旦自取其田而深耨之則其無窮之利豈特金玉而已哉甚矣天下之患莫大於不知有其所有弗能反身而充之以極髙明此天下之所迷焉而聖人所以為之率也夫聖人所與天下均者道心之㣲天下之所以與聖人異者人心之危其自充與自棄之間乃有天壤之異仲尼見其然也故其教無所不受雖其門人不仁如宰我踞傲如原壤可棄而皆不棄者知其所有者猶可與為善也聖人盖因天下以其所有豈能與之以其所無也哉惟能開其匹夫匹婦毫毛之端以至於察天地此其所以博大深逺而天下無所逃遁俾天下各以其所有而入於吾教故力不勞吾亦未嘗强之以其所無故道易行以至于今不廢嗟夫荀況者乃一舉天下所有者而盡付於性惡謂桀紂性也堯舜偽也夫使天下自知充足飽滿而易入然猶奔放而弗從今乃舉其良璞而剖擊之彼無所慿藉而以入於善則將蕩然肆於惡必矣且所貴於君子者以其能盡性以入道率道以範世也今況之言反若此則況之所學者不知其何為也仲尼之道傳至孟軻軻之心惟恐人求之於逺而不自反其所有故其誘人也皆以聖人之事期之自取諸身推入於深㣲之域是以堅持四端之論而專斥義外之説要以廣容而博受俾人各率其毫毛之端以入於中而已非求立論也論性之爭不自於孟氏而實起於況道本無異故不爭況不探其端而務為立異論論不當而爭遂起揚雄韓愈紛然失其真自況始也本於太髙而反失於太卑求異於孟子而反有叛於孔子是亦過矣且堯舜禹湯文武周公之為治天下雖待於聖人聖人亦有待於天下彼盖取中於民還以導之要使避惡就善斯已矣夫五帝三王周孔之所用六經之所範圍皆所以使天下之性歸諸道而止況之書亦知帝王周孔之為尊六經之為貴而乃甘持性惡之論是反盡其所尊貴者而搥提之矣且今天下皆知申韓楊墨之為異端而共擊之而況也倚吾牆反有禍於吾教夫萬金之家盗其千金而不足憂狡𨽻悍妾無故竊其一金則深可慮何則禍自内者所喪大也義外之論君子且深懼而况於性惡乎使世不從況則已使世而從況之説則為善者苦其難必曰吾性惡矣不可為矣有志化天下者必曰其性惡矣弗可化矣喜刑名者必曰人性惡矣刀鋸於是乎用矣嘗恐其害之至於此故特舉而論之云中庸論下中庸之道萬世之所通行而不可違者也故聖人之在上也舉是道而措之於用使人油然而皆化聖人之在下也歛是道而施之於教使人黙然而皆識堯舜禹湯文武成康之際措之於用者也故修諸身謂之執中觀於民謂之取中舉而措之謂之用中又大為之名謂之皇極當時聖人未嘗不本乎此以化人而當時之人未有不由此而得為君子者故能剛不吐柔不茹寛而有制從容以和行之當世而無弊矣此唐虞三代之士俗所以為大過人也歟晩周之衰斯道不復行於上矣故孔孟汲汲以誨其徒斂而施之於教而其説曰中庸其至矣乎民鮮久矣民旣鮮則卑者必入於汚髙者必入於僻智不制而至於詐勇不學而至於蕩聖人憂其然也故極髙明以導中庸而躬率之要使天下皆入於中庸而不為小人之無忌憚是以獨取顔氏之子為庶幾不取狂者之過而深嫉鄉原之害德以為天下之勸焉嗚呼聖人之欲行中庸之道甚切也有人焉於中庸則過然猶可以入於善則聖人雖無取而猶或可取也又有人焉近似中庸而反有害於德則聖人之所切惡而不可復教矣狂狷之徒是過中庸而猶可為善者也鄉原之徒是近似於中庸而有害於德者也執是而論西漢之士斯可得而議矣汲黯之直蕭望之之剛得非近於狂狷者歟鄭莊之推賢倪寛之下士韋元成之謙遜平當之通明得非入于鄉原者歟何則汲黯之面折廷諍可以為直矣而失之戅蕭望之堂堂折而不撓可以為剛矣而失之太剛而必折雖可謂賢而於中庸則過豈非嘐嘐有大志狂而進取狷而有所不為哉彼鄭莊之流則異於是矣屈志以下賢棄産以市義鄭莊以此為善而力行之卑體以下士循黙以逺名倪寛以此為善而力行之疑若近似中庸者矣然二人處武帝之世莊有趨和之譏寛有封禪之請是失之佞也其可以之入德乎避侯以為遜自劾以為謙元成以此為善而力行之逡巡而有恥堅卧以辭封平當以此為善而力行之疑若近似中庸矣然二人處元哀之間元成不能守正平當無所建明則是失之懦也其可與之入德乎然則是四人之為善不過同乎流俗合乎汚世奄然以媚於人者而已由是觀之汲黯望之雖過乎中庸然而用心之剛有聖人而引之猶可復也彼四子之所為自以為善而固執之不知其失之佞失之懦没溺而不可復返雖有堯舜不可化之於道矣兹不亦鄉原之害德者哉使之用於世必無益於成敗之數而汲黯望之之賢猶足以為近古社稷臣此孔孟之深疾夫鄉原而或取於狂狷也歟嗚呼聖人雖不輕許人以中庸而欲使天下盡入於中庸之道其所以望於人者皆欲其剛不吐柔不茹如唐虞三代之士俗而後已也至於狂狷猶或取而於鄉原則深疾之學者之志於道者其可不求其意哉堯言布天下論聖人之為天下何其道之神用之妙也以其一身處乎巍巍之上以其一心運乎茫茫之中而意有所趨治有所向雖四方萬里之逺不崇朝之頃㨗然如影響之必從使之治則治使之化則化而不敢有後是豈待于諄諄然令之而後從哉此其道之神用之妙所以鼓動其心者有不在于言而其效之速施之博又有甚于言則其為言也不亦大乎若是者雖非言而謂之言可也昔者堯之治天下未嘗有一言加乎民也而夏侯勝以為堯言布于天下竊意其道之神用之妙其鼓動天下者雖不在于言而其效有甚于言歟獨不觀夫天之所以成四時生萬物乎確然而不見其動也寂然而不聞其聲也疑若天之所無為也及其運也吾欲生物則春為之榮吾欲長物則夏為之秀吾欲揫物則秋為之肅吾欲蟄物則冬為之藏至于日月為之照臨風雷為之鼓舞雨露為之滋殖雪霜為之堅凝是數者皆從焉而不敢違雖毫忽之間皆不爽也而天下實運之夫天亦曷嘗有言哉而其道如此其神用如此其妙則甚于有言矣故吉凶禍福之間天下之人兢兢然常若天之日臨其上而戒勅之祗惕警懼而不敢慢也是天之所以言于人者無所徃而不存矣孔子曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉堯之聖豈有他哉本乎天道而已矣以天之所以言于人者如此則堯之言布于天下者從可知矣夫堯之時昊天之象羲和司之洪水之害鯀禹治之賢能之舉四岳任之百揆之職虞舜總之而堯未嘗有所為也曰吁曰俞曰咈哉曰欽哉曰徃欽哉其所言者是數語而已非有所謂布于天下者也然欲明俊德則俊德明欲親九族則九族親欲平章百姓則百姓昭欲協萬邦則萬邦和欲於變黎民則黎民變是數者堯未嘗訓之以一詞以求其如此也而其意之所欲至有不期化而化不期率而率者豈非其道之神用之妙不動而章無為而成有甚于言歟是以七十年之間天下之人從其化而不敢違惕然常若帝堯親臨其家曉之相與盡入于仁壽之域至于畫衣冠而不犯則是七十年之中堯未嘗一日而不言言未嘗一日而不布于天下而何待于嘵嘵然而告之哉是以聖人不以言為教而以不言為教斂其神道妙用而黙運之以磅礴于天地之間而施及于四海之外則其言布于天下者廣矣是以内而精神之運心術之動無非堯之言也外而禮樂之作法度之備無非堯之言也自是而動容周旋以示天下之儀施設措置以成天下之治無徃而非堯之言矣何待出于口而後為言哉彼不知者乃以都俞吁咈為堯之言此知堯之粗者是不知堯言之布于天下者在彼而不在此也此堯之所以配天而列聖所以不可跂及者歟而或者之論昧于夏侯勝之説而遂指堯為能以言布于天下夫三盤九誥之作孑孑然瀝心腹腎腸以告于人之不暇此乃商周至變之事豈陶唐甚盛之舉哉胡不觀有虞氏未施信于民而民信之夏后氏未施敬于民而民敬之葢亦盡行堯之道而已由此觀之治至于道之神用之妙而能以不言之言而布于天下治之至也中庸曰上天之載無聲無臭至矣嗚呼其堯之謂歟唐虞三代純懿論所以致天下之治在道所以行天下之道在心古之聖人修之身舉而措之天下國家至粹至美而絲毫之無雜至久至逺而須臾之無間夫豈有他哉其心術之妙見於天下有不可得而名言者天下之人見其然而昩其所以然也於是言動求之而不得禮樂求之而不得度數求之而不得則以為聖人之心或幾乎隱而不知其心術至粹至美至久至逺者未嘗不行於日用之際未嘗不行於天地之間凡所以育萬物而撫四海者盖無徃而非純懿也豈可以言動之端禮樂之具度數之末而求盡其妙哉深知乎此而唐虞三代之所謂純懿者如取諸目如指諸掌王道之論有未盡者請因而畢之純懿之道帝王之心也其本出於心其用達於天下堯不得之無以為堯舜不得之無以為舜禹湯文武不得之無以為禹湯文武然而天下之人皆知純懿而不知其所以為純懿者不能論聖人之心故也夫純懿之在心而不在政自心而發於政則唐虞三代之純懿可得而見也自政而求其心則唐虞三代之純懿不可得而見也堯之理隂陽舜之叙百揆禹之修九功湯之正六事文王之和庶獄武王之範九疇天下之事無不畢舉當是時民休而不役刑寢而不試禮樂則興學校則闢此皆其純懿之發於政者天下可得而見也至於正心誠意之本修於宫庭屋漏之間勤於夙夜旰食之際誠明以得之中和以養之仁義以行之禮樂以文之其於為善動容周旋顛沛造次無一毫違於道者及其發於至幽而見於至著也不令而人信不威怒而人感無聲臭之可接無始卒之可窮此其純懿之本於心者天下不可得而見也故堯之心見於欽明其所以欽明者不可見舜之心見於濬哲其所以濬哲者不可見禹見於無間所以為無間者不可見湯見於日躋所以為日躋者不可見文武見於式孚下土所以為式孚者不可見夫是以其用不可測而其功不可窮非真心之如此而動如此而靜如此而始如此而終一於純懿而不可見者孰能與於此哉由是言之純懿之心唐虞三代治天下之妙用也論唐虞三代之純懿而不論其心是言乾而不言健言坤而不言順亦不窮其本矣且三代之時已與唐虞之時異三代之治亦與唐虞之治異然言治必曰唐虞三代豈非以其心同於純懿而不可以異歟是知言心之道豈獨唐虞三代為然哉後乎此有聖人焉亦不出乎此矣然而不能者非不能也不為而已故漢髙祖雜於縱横文帝雜於黄老武宣雜於刑名光武雜於䜟緯是則漢之治失於雜而不為純懿唐太宗怠於貞觀之末明皇荒於開元之末憲宗惰於元和之末是則唐之治失於末而不得為純懿非失於治也失於心故也向使漢之君移其雜好之心而一於道唐之君移其慎始之心而一於道雖不可以望唐虞三代而其用心豈不庶幾於堯舜禹湯文武之萬一哉且孔子顔子皆不用於世者而孔子則曰文王之後文不在兹顔子則曰舜何人也有為者亦若是豈非同其道故耶豈非同其心故耶夫惟聖人之道同故其心同孔顔猶同於舜文况於有天下之君而以唐虞三代純懿之心為心則與堯舜禹湯文武之盛易地皆然矣周秦之士貴賤論舉天下而驅之以道則天下之士必將相率而入於道舉天下而驅之以利則天下之士亦必將相率而趨於利士以道為務雖欲其賤不可得也士以利為務雖欲其貴亦不可得也夫士非能自貴也道之所在何徃而不貴士非能自賤也利之所在何徃而不賤然是二者皆本夫上之人驅之上之所驅則下之所必從是必然之理也由是觀之非士之能自貴而自賤亦非道能使之貴而利能使之賤其所以為貴賤者其權盖在於上之人也揚雄曰周之士也貴秦之士也賤嗚呼是皆當時驅之使至於此歟盖嘗論之周之君舉天下而措之於不得不為道之地秦之君舉天下而措之於不得不為利之地士之所以為貴而所以為賤者其故盖出於此也且周之所以驅之者盖可見矣昔文武成康之致治其朝思夕慮惟以正天下之風者何其詳且盡也黨有庠遂有序家有塾天子有辟雍諸侯有泮宫天下之人其入則有家塾其出則有辟雍泮宫而小則有庠序是無適而不學也其朝夕之所游泳耳目之所觀聽起居飲食未嘗一刻不在於孝悌仁義禮樂之間是無適而非正也及其取人也賓之鄉閭論之司馬升之天府六德有所不正六藝有所不備者弗升也其試之以射容體有不比於禮進退有不和于樂者弗取也其登之於朝有一言之失中有一行之未盡者弗用也其幽隱僻陋之中有抱道懷德之士天子則安車束帛以招來之諸侯操幣執贄以就見之其所以驅之者如此則天下之士相率而入於道者必然之勢也若夫秦之所以驅之者則不然使之以術誘之以賞貴之以法其用人也非使之屠戮人則使之傾覆人也吾欲事㳺説若之口不利而辭不險者不用也吾欲闢土地若之不能屠人邑而踐人城者不侯也吾欲破軍殺將若之首虜不多者不賞也設為十二級之爵苟無尺寸之功雖有周孔之才曽閔之術不是選也其驅之者如此則天下之士相率而趨於利則亦必然之勢也士苟入於道必自重而不輕故周之士三公有所弗屑萬鍾有所不就諸侯有所不見晉楚之富有所不居而惟道之務夫如是奚而不貴士苟趨於利則必惟利是徇而無所不至故秦之士閭閻以公乗侮其鄉人郎官以上爵傲其父兄其甚者至為穿窬斗筲之事而不以為愧夫如是奚而不賤由此觀之非周之士能自貴也非秦之士能自賤也其上之人驅之使必至於此也及周之衰自幽厲失道至春秋之季數百年間王澤雖已衰㣲當時之人猶據禮守正以風其上其言紆徐婉美樂而不流怨而不傷怒而不戾悲歌憂思而終無犯上難制之氣凡此者皆入於道而可貴者也是驅之以正之效也及秦之衰天下豪傑恣睢之士釋耒輟耕徒手擊搏環向而攻之秦以不祀凡此者皆入於利而可賤者也是驅之以不正之效也抑嘗歴考古今之變而觀之前乎周驅天下者盖無不正後乎秦驅天下以正者則亦寡矣曰三皇曰五帝曰夏曰商雖其時之或變詳畧之或殊而其所以為天下者盖無以異乎周也故其當時之士無有不貴者也自秦以來西漢御臣之法重故其士相率而為委靡之俗東漢聘召之禮重故其士相率而為沽激之行魏晉之君貴莊老故其士尚浮虛而不適於用隋唐取人以辭章故其士務華藻而不由於正其弊也西漢以亂東漢以亡魏晉隋唐天下何其紛紛多故也然則為天下者可不謹其所以驅之者哉

body:
  text: 蓮峯集卷七宋史堯弼撰論五帝其臣莫及論聖人以神道役天下非特使天下可由而不可知可知而不可議雖貴為大臣而所謂天下道德渾備之士吾能默然運之于不可知之間而使之自盡于天下以助吾為治而卒不知其所以然者何也蓋役人者道全于神聖之妙而役于人者道偏于職業之間夫道一而已大者得其全而為君小者得其偏而為臣是以天下之偏者必聚而求合于大全之君以為之用為其君者能廓吾大全之神道而默然運動其中故在上者得以優遊無為而道常有餘在下者謂之服勤而道常不足此天下所以不勞而治也故朝錯曰五帝神聖其臣莫及夫五帝役人故其道全其臣役于人故其道偏君臣之間職此而異矣嗚呼五帝之時天下淳風未散也天下之人皆君子也皆道德之士也其間與人主大有為而天下推其賢者必其英偉矯拔之人也有如是之臣宜必有大過人之君如五帝者以運其材智使之常為我用而自以為當然而不逃吾神道之中苟非君有所過之臣有所不及疇克爾哉今夫大匠指揮百工而無敢不從其令者因其智能技巧有以過之也五帝之治天下亦若是而已故立制度風教化使天下陶至治之盛未足以窺其妙用也子萬靈柔逺人使薄海內外浹吾恩而漸吾澤未足以觀其妙用也其妙用常存于不可見之間能使亮功熙載之人可以為之用不可以企而及此神道之至也孟軻有曰充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神神也者妙萬物而為言見于施設而難可名極天下之至精通天下之至變道至于此無以復加矣而五帝之治天下一本於此故其時也斯聖人者端然于法宫之中未嘗動容變色而能運用夫風后重黎與夫四嶽九官十二牧之徒綽然而有餘雍然而有序而天下之人莫能窺其界量及成效已見而當時亦不自知其為神其妙用可勝言哉是以仲尼系易至神而化之必歸之黃帝堯舜固其宜也彼為風后為重黎為四嶽為九官為十二牧使之穆天縡經國體則固其所長至于神其道妙其用則在所不能故五帝之所以顯諸仁其臣可得而能也五帝之所以藏諸用其臣不可得而能也能其所易而不能其所難不及其君也可知矣五帝之道何異乎天地之道也天以神地亦以神故育萬物而不可得而名然星辰雨露皆天也而終不可以侔天之大山川丘陵皆地也而終不得參地之厚故五帝之臣終不可以及其君然而其君雖過其臣天下後世皆以為過而五帝不自以為過聞其臣言則惟恐不及此又其過人者也嗟呼後世之君非無聰明睿哲之資非乏勤鋭希慕之志而終不能躋五帝之萬一者蓋其臣負其才而欺其君為君者復無微妙運動之術以臨其下上無所長下無所短此莽撡所以亡漢仲達所以傾魏也其甚者希五帝而反乃違戾或矜材鬻智以求過其下而自謂神聖或設邊幅崖岸以待其臣而自以為不測不知已大失聖人之意是豈知有心無心之間哉以是而治天下其五帝罪人歟由是推之帝王之王天下必有以過其臣然後其才可得而運用非過以才也過之以道也後世之治雖弗逮五帝然亦有可觀者觀漢髙祖度量漢光武沉幾過其臣唐太宗英略過其臣故能運用當時人才以取天下彼朝錯得之而未盡何待聖人之淺而自叛其說也七國之反請帝自將無乃前日自親之策乎然腐儒曲學不論五帝所以取天下而區區陳朝錯之失蓋亦疏矣泰伯可謂至德論君子之於天下不求其德之可見而求使其德之不可見是以功足以及百世君子於此辭之而不為澤足以被萬物君子於此避之而不居寧舉而推之於人使天下受其賜而已不與焉此其用心不亦甚大而其為道不亦甚逺也歟吳泰伯之將遜商之將衰而周之將興蓋可必也以泰伯之興而得立於天下其功之可以及世而澤之可以被物者亦可必也而泰伯方且逡巡固避若無能然必舉而遜之王季以待文王之興寧使天下被文王之道而已不與焉此其志在於天下而豈屑屑然遜國以為髙逃名以為美哉孔子曰泰伯其可謂至德也已矣三以天下讓民無得而稱甚矣世之人不足以知聖賢之意則以為舉當受之國而與不當受之人此人之所以難能者既有遜國之實而深逃遜國之名此又人之所難能者而遂以此為泰伯之至德夫舉國而畀人好名之士可得而能也有其德而辭其名遁世之士亦可得而能也泰伯之德豈好名而已乎抑亦遁世而已乎是二者皆不足以為德而况所謂至德者哉方太王之居豳也周之王道雖未行於天下而天下之心已歸於周矣君子幸而出於此時豈不欲有為於天下哉使泰伯於此奮然以周家之業自任天下必不以我為貪使王道自我而成天下必不以我為専而泰伯則不然以為天命之歸有待於文王天下之人方陷於塗炭亦有待於文王寧使王道待文王而行不必其行於我也使王業待文王而成不必其成於我也於是脫然捨去其所當傳之業而不以為嫌逺託於蠻夷之地而不以為陋以成文王之德於天下率天下之諸侯環向而惟文王之歸舉天下之民無有逺邇莫不均被文王之澤而周之勳遂大集於天下此其心豈遜之以位哉亦遜之以德而已豈特為周室哉將以為天下而已及夫王道既已行王業既已成天下皆知其為文王之功而已不與焉此豈尋常遜國以為高逃名以為美者可希其萬一哉是知以天下遜於人猶可能也遜而使天下䝉其澤所不可能也澤及於天下猶可能也澤及天下而使人不知其澤之所從不可能也非天下之至德其孰能與於此哉昔之以位遜人者非一矣堯之於舜舜之於禹以天下遜者也伯夷之於孤竹子臧之於曹季札之於吳以一國遜者也其事之大小不同故其效之淺深亦異今泰伯之遜不過區區之豳七十里之國而已而孔子乃以天下遜歸之此與伯夷子臧季札遜一國者何異而乃加之以堯舜遜天下之名何哉嘗聞之孟子曰以天下與人易為天下得人難君子之不以天下輕授人如此故堯之遜為天下得舜也舜之遜為天下得禹也今泰伯之遜是為天下得文王也此其用心豈非堯舜為天下之心歟堯於此使舜之道及於天下舜於此使禹之道及於天下而泰伯於此亦能使文王之道及於天下此其所收之效豈非堯舜及天下之功歟遜行於蕞爾之國而其道大被於天下雖謂之天下遜其誰曰不然是以伯夷之遜人不過稱其清子臧之遜人不過稱其節季札之遜人不過稱其義而泰伯之德至於民無得而稱豈非其道之在天下有不可得而名言者歟雖然泰伯所用之心所收之功與堯舜同而其所遭之事則與堯舜有大相逺者堯舜之遜也當德業之已成天下之全盛而舜禹又皆有已試之功故堯舜之德可得而見也今泰伯之遜也當德業之未著天下之未一而文王之方幼又無已行之驗故泰伯之德不可得而見也孔子之定書於堯舜之遜止直著其事而未嘗論其所以然豈非以其顯而易見也歟至於泰伯則不然必斷然表而出之曰至德以明示天下後世嗚呼泰伯之心非吾聖人其誰明之曾子論道之難言也久矣不可以一言而求其幾也使其一言而可幾也則聖人豈不欲盡言以告人哉聖人惟急於告人是亦嘗有言矣然其為言亦不過舉其端而深託其意使人探焉而自知淺深隨其所受而得斯已矣其所以為言者蓋未嘗指名其實也非不欲指也而有所必不可也昔者虞夏商周之君始舉其所謂道者而明用於世而猶未著於言也及商之衰文王適當其時有所迫於中而不能自已者於是始觀隂陽之變以為易始見於言矣猶未施於教也及春秋而天下之不幸無有堯舜禹湯文武之主而人亦不復有知此者是以孔子隱而有所不忍而必至於為教凡天下之教蓋自孔子始然而未嘗定其所以為教之名今夫欲制器於天下而獨指物以為用則其用必將有所窮而不可以及逺惟其能設為方圓而虛之以待天下之器故吾之方圓無窮而器有盡彼雖百變而終不離吾方圓之域聖人之教亦猶爾矣天下之人孰能不日由其仁義孝弟禮樂而行者而聖人終未嘗指人以吾道止於此爾其如此而為仁義如此而為孝悌如此而為禮樂也蓋亦嘗因問而應之矣且應者不同而亦未嘗立為必然可指之說要於其終俾各有得焉而已爾是以天下視聖人如天之恢然不可指名以一而物亦無所遁者孔子曰女以豫為多學而識之者歟非也豫一以貫之雖然言其貫與一矣其所以為貫與一者終莫可得而聞也然則聖人之意亦可見矣顔回伸弓遊於其門可謂得其深者而亦未嘗見於言也至曾子始舉一以貫之之理而指為忠恕以告門人或曰門人之不可深告故告以近似者蓋嘗觀之曾子之見雖不止於忠恕而其所性則有近於忠恕者故其言若此其幾以一言之幾而言聖人之道者蓋自曾子始子思學曾子者而始指為中庸孟子學子思者也而始指為性善夫忠恕中庸與性善三者孔子雖嘗言之然而未嘗指是為吾之要而三子始各取其一夫弓人之子或習為箕而豢鷹之家或至於薰鼠何者其所習者然爾今天下之人莫不知孟子為性善之論而不知其源流出於曾子無怪也且邦之興亡其變也有狀宜可以言盡者而聖人猶曰言不可以若是其幾而况夫聖人之至者而可幾也哉故嘗謂曾子孟子之說固天下率從之易矣然常恐夫學者之昧其致道至此而或分也其可以不深思之歟墨翟論孔子沒楊墨始鼓其說以率天下當是時人惟楊墨之知至孟子始奮而闢之曰楊氏為我是無君墨氏兼愛是無父無父無君是禽獸今天下之人亦從而和之曰是禽獸也夫墨與楊其君子歟其小人歟其為道必有所據依其說亦必有所本矣甚矣瞽者之暗於明也人曰此東西也而謂為東西此黑白也而謂為黑白彼蓋未睹其實也今之從孟子者亦猶爾矣夫君子之斥邪說豈苟然也哉淫辭必求其所陷邪辭必求其所離而後得以致其攻今也特隨人以闢楊墨而實未能明知其所為非也使天下不幸復有楊墨而不能以自決是將反為其惑溺必矣故夫君子者必求曉然知其端而無務為相應和之說庶乎其可以有守矣且楊之道不若墨之盛也自戰國至秦漢以孔墨為一是以墨之書至于今不廢故嘗求之墨氏之初蓋學聖人而亦有所措於世者惟其所見之頗僻遂陷於邪途而不反流於禽獸而不知也昔者上古之世其人鄙陋質野蕩然如獸之在壙不知所適從惟各任其性情而不知有上下長幼親䟱之分聖人惡其無間憂其終之相賊殺也故因其尊卑隆殺而設為綢繆委曲其口腹耳目周旋進退以至於床簀几席之間無一不為之等差而人亦終日安行之無以異於飲食起居者是亦足以見夫禮義者乃人之性情見於節文而非節文之外復有性情也彼墨子者乃始患其然而更欲合其愛而使無差等其意謂人之愛一而已不可分也而不知其混并以入於亂也故孟子詆之曰天之生物使之一本而夷子二本故也荀卿亦曰一於禮義則兩得之一於性情則兩失之儒者使人兩得墨者使人兩失也夫惟一本故能兩得惟其有二本而始兩失之矣聖人之道雖一於內而必有别於外此其所為兩得而彼乃欲以待人者而待禽獸待於兄者而待途之人兄為親而途人為踈人為貴而禽獸為賤各有分也苟以待其兄與人者而待途人與禽獸既以失其分反而論之是以途人待其兄而禽獸待人此不亦兩失歟孟子之時申商儀秦惠施之徒非一矣而孟子未嘗排之其論儀衍之為非蓋因問而發獨於楊墨乃若是切齒而於墨尤詳者豈非以其兩失其本以亂人之性情破壞先王之禮義為天下禍至深也歟蘇秦論昔之聖人將立事於天下必先有以變而通之而智者之所以為智亦貴夫利而行之天下之事惟其能有以變而通之利而行之而後無所不濟嗟夫蘇秦張儀以小人之資變之之極而利之之過以入於傾覆之域是以君子鄙恥其事而不道然其以區區之匹夫無尺寸慿藉而能動天下於靜合天下於離六國皆以萬乘之尊隨其指意而不敢有後秦之强視之以為輕重之决方其用事天下非無豪傑智略之士而皆拱手熟視而不能投其隙此其為智必有過人而其為謀必有能盡天下之利者且齊楚與趙皆天下所謂强國也而蘇秦之說必始於燕張儀之說必始於魏是二者其故何也夫以孑然之身而欲合天下之衆此誠事之至難而又誰敢聽從惟能先得其一以招其餘而後可以集事於天下故夫儀秦之說六國必先得其一國而後可以合其他夫既已得其一而使人得以撼動之俾其勢易以破而其隙易以乘則天下將有所不從而事必有所不濟故嘗觀其縱之所以先於燕而橫之所以先於魏然後知儀秦之斟酌夫天下之勢而巧於術也縱非秦人之利橫非六國之利天下所共知也縱成則秦人必起而散其縱橫成則六國必起而破其橫是皆必然之勢也今也欲縱而使秦人得以散之欲橫而使六國得以破之則二者皆不可得成是以蘇秦之說必始於燕者以燕為逺於秦燕若叛秦則秦人之攻逺而諸侯之救近使燕知縱之利而無其害然後決意而惟縱之聽得燕而後縱可合也張儀之說必始於魏者以魏去秦為甚近魏而不事秦則秦人之攻近而諸侯之救逺魏知秦之可畏而諸侯之不足恃故決意而惟儀之從魏從而後橫可成也此皆其至計也使秦儀而或先說趙與齊與楚彼其皆强大之國見縱橫之無利害於已則必有所不聽夫惟始於燕而後縱成故秦人不敢動始於魏故橫成橫成而後秦得以逞然則二子之游說其始終蓋亦有理而豈苟然也哉是知天下之事必使之無釁隙之可動搖而後可以望其有成然世之君子智不足以及此故事有所不立而或至於敗孟子之所謂居廣居行大道者既已不可得見而當世之事又多無成故儀秦之事亦或有取二三策於此也項羽論項羽有蓋世之勇曹操有縱橫百出之術劉裕有英發豪健之氣皆天下所莫及也天下有所短而我獨長焉則長者勝三人皆以獨出天下之資而卒無成操﨑嶇中國裕亦崛强以卒世而羽又尋至於敗何哉夫惟聖人退藏於無窮之原而以無事役天下是以愈用而莫量其所止苟惟不若於聖雖獨出天下其用蓋有所盡也三人之無成意其鋭有所盡歟官渡之役操之鋭盡矣燕秦之師裕之鋭盡矣京索滎陽之間羽之鋭盡矣有所動有所不動有所戰有所不戰此智者之事也而曹劉能之利亦動不利亦動可亦戰不可亦戰此勇者之事也而羽甘心焉宜其亡之亟不若曹劉之猶有成也古之善用天下者使之常有不足之心而後有有餘之氣凡人之能天下之力蓋有時而窮盡也少强則老必弱朝奮則暮必隳彼善用兵者養其强且奮而重發之俾力不盡而有餘勇智不盡而有餘術欲不盡而有餘求而吾亦得以雍容條理未嘗疾勝亟敗以亂吾氣氣不亂則智益明而愈不竭是以有所不用無所不勝其不善者反之故事未成而天下之心已帖然共止而不可復用則我之鋭亦隨索而已異哉羽之戰也竭力轉鬬以窘髙祖屢戰而屢得志不勝而愈不止此其意謂與我爭天下者惟劉季一人耳是以利害之不知成敗之不審窮日之力以逐於百鬬要以得劉季則天下悉歸我不知彼未易得而此之鋭已先索矣垓下之戰楚歌一唱八千之師委甲而潰非其有所懷而去蓋其勇厲之氣用之久而耗之已甚則亦有窮而已也是八千嘗奮迅百戰從羽而不去亦欲冀尺寸之勞而後已爾使其負有餘之力豈肯一旦棄垂成之功狼狽而歸哉羽不知養其心而反銷鑠其氣則屢勝者乃所以必敗而無疑江東之業雖可復興而江上之舟倣徨而不得濟意羽之心亦自見其百勝而尚未成立則氣亦委而不振是以捨去而弗恤也曹劌與齊戰師將鼓劌曰未可齊人三鼓劌曰可矣齊師敗績公問其故曰一鼓作氣再而衰三而竭彼竭我盈故克之夫頃刻之間猶有盈而與竭之異况數年之間屢戰之後豈有常盈而不竭也哉是知强弱之相推勝負之相蕩此兵家消長倚伏之理也易曰寒往則暑來暑往則寒來日往則月來月往則日來往者屈也來者伸也故夫項羽之敗者其往也高祖之勝者其來也屢北而怒方作是以來者之必勝屢勝而鋭已盡是以往者之必敗而羽方曰此天亡我非戰之罪也雖然天亡羽矣意其亦戰之罪也又古之英雄其力之强未有若項羽者其敗之亟亦未有若羽之亟者此其故何也嘗讀史見楚漢轉戰以必爭成臯也不然羽之亡不至若是亟也沛公長者天下之所歸羽暴害殘賊故天下去之速且當是時齊魏燕趙九江已盡入漢羽孤立無與為助而又輕用其鋒使漢得乘其弊是數者羽所亟敗而豈在成臯之得失哉雖然羽之勢固必亡然漢之君臣論戰皆無足當羽者使羽裒百鬬之鋭亦足與曠嵗相劫而豈遽至於遁哉夫人必有羸疾之久筋力精氣悉已耗散一旦赫然就盡此無足怪者至於雄勇健特之人衝擊水火冒犯風雷而不少衰而亦卒然不救此必其有所重傷亟困以至於此也嗚呼羽之强亦必其形勢有所大去故其敗若此速也且楚漢百戰之場實當中原八逹之地使其無有要害巖險為之厄塞則楚漢之成敗將決於一日之間而又何俟夫百戰哉夫惟當時之勢楚東而漢西而成臯以天下之險介其兩間以限二國之衝彼此皆不能以踰焉故相持而不決者數嵗使其不然則髙祖可以長驅於楚之彭城羽亦可以直搗漢之關中而又何難哉始羽東擊齊成臯不可守故漢得以劫五諸侯兵直指彭城據羽之巢穴幸其兵敗故引而西羽亦知天下之勢在此而不可緩也故百戰京索滎陽間而必取之既得而使樅公守之漢亦力破而必据之及漢敗於廣武而成臯復歸羽羽又使司馬咎守之戒勿與漢戰俾漢無得東是時漢已失據欲退保鞏洛㑹聽酈生計故復留遂盡鋭誘司馬咎而破之成臯始復入於漢而羽明年遂亡此其理豈不昭然甚明也哉今夫猛虎負嵎咆哮而凌厲雖使萬夫荷戈而不可向及其失勢奔走平地則匹夫設穽取之如殺狐無異也向使羽得成臯出入乎其間以衝漢之腹心漢將為羽衝軼之不暇而能窘羽哉惟其形勢一決使漢得通兵於東追羽固陵韓彭英布四面以至當是時羽欲不亡得乎故夫兵家之要必求重地以為門鍵出入往來之孔道而重扼之以制敵之命不然則反為敵制漢之成臯光武之河內唐之潼關皆當時所謂孔道者也漢惟得成臯而楚亡光武得河內故河北遂定唐惟一失潼關祿山得以西唐社幾不血食然則兵家孔道之所在其可不謹之歟吕后論天下之事順其理而各適其所則安行而不悖惟其有所咈逆而觸其怒則必有所不平以至於怨亂而莫可解是以變之作未有無故而作者其未作之初先有以激之而弗得平抑鬱而不能發散則必潰裂四出以致其忿而後已故天下之變或起於內或起於外而其始皆有以激之而後作然其間嘗若有無故而作者是亦有無意於相激而勢必至於相激而其亂乃與夫有心於激之者均也有心於激之其激也有所指則其禍發也有所歸如朝錯削七國而吳楚因以叛若此之類人皆知之而無難而獨有無心於相激而勢必至於相激者雖髙見之人亦莫知其故是以亂每出於意外而莫可止嘗怪漢唐之初收天下於秦隋鼎鑊之餘而與民休息意其根蒂卒未可搖動也然皆不再世而幾奪於一婦人之手者蓋武氏之初一言一顧而遂為后其得之也易則舉而委之也必不甚惜髙宗又嘗欲廢之而事不諧宜其憤毒慘烈至於烹滅宗室菹醢大臣以撼取神器而後已蓋其享之也易而又有以大觸其怒其所以然者無足怪也若夫吕后則不然彼其初隨髙祖顛越狼狽艱難勞苦之態亦備嘗其極味矣故得天下而為漢家謀慮亦不可謂不至而實未有暌忤之怨然一旦忘悲别付託之言乃欲舉天下授與不相屬之人隂沉險刻將必取而後已夫其情理與武氏異而其反亂與武氏同蓋未嘗不怪其無故而作也嗚呼此必其閨門之間事有無意於相激而勢必至於相激以至於此也嘗觀髙祖以愛故欲易太子然後知其有以激之而無疑且其同冒百戰而後得天下其情豈不願其嫡嗣有天下哉今乃無故立戚姬子而視我如路人焉百戰離合之恩愛至此已了不相屬矣故得意之後遂鴆如意粉戚姬以發其至痛其憤悶急切紆鬱無所逞必舉天下而授諸吕者其意以為若能置我以從若之愛則豫豈不能外若以從我之親哉婦人之情至此而後已也是知諸吕之禍雖起於吕后之隂險而實原於髙祖之激之也今夫惟天下至親者易合而亦易以離易合者以其愛深易離者以其情切而怨不可解古今之亂有朝為父子兄弟夫婦而暮已如禽獸之相食者皆其情切而怨不可解也故貴其順而深忌其相逆若夫聖人則不然必曰以義制事以禮制心心無為而不正則理勢必不至於相逆而亂何由起哉夫以泗上一亭長而能以大度蓋天下而王之亦古今曠絶矣聖人之事未之容責焉然而禍之所自發則咎必有所歸亦不可不督過之也安劉氏者必勃論天下之事在我者可以必為而在人者不可以必為見於今者可以必料而出於他日者不可以必料圖於有形者可以必成而為於未兆者不可以必成漢髙祖臨終之時天下未有大患難之可憂而周勃亦無大功業之可見然帝付託之語乃曰安劉氏者必勃舉天下不可必之理而加之於必然此蓋髙見逺慮存乎其間而非世俗之所可知也竊謂髙祖之意有不可曉者四原本缺當其時天下無事劉氏既安矣而勃又何安耶此不可曉者二也陳平之智足以應變而無窮而勃椎魯若無能為者乃云安劉氏者必勃何耶此不可曉者三也若謂周勃可以制諸吕胡為乃面屬吕后使用為太尉又何耶此不可曉者四也此其髙祖微機乎嘗原帝之亡嗣君幼弱諸將尚存侯王太盛惟吕后之多謀而更事然後足以制其變此髙祖之所以不去吕后也然堇毒足以治病而亦足以殺人吕后足以制變而亦足以起亂婦人之情好私其外戚則諸吕之勢必至於傾漢此又髙祖之所以逆知吕后之亂也然諸吕之禍起於蕭墻緩之則養亂急之則速變是必頑然若無能而使不吾慮確然若不動而使不吾察而後可圖也此又髙祖之所以必周勃之安漢也既知吕氏之必傾漢又知周勃之必安漢然私用為太尉則吕后有致疑之心勃不綰兵柄則劉氏無可興之理此又髙祖之所以面屬吕后也髙祖其有憂患乎何其慮之深而計之盡也且制天下者莫易於治亦莫易於亂蓋其發也有狀則吾處之也有方而最不可為者莫難於不治不亂之際以為治耶則亂藏乎其中以為亂耶而治見乎其外此其禍必隂沉而莫可解既不可弭其變又不可聽其亂而諸吕之禍蓋亦在乎欲治不治之間欲亂不亂之際欲圖之而無可圖之形欲救之而無可救之狀以才與之角則才有所不足用將動而求成功則勢有所不可廢故王陵之直而無所措而陳平之智亦難獨任然則將何為而可耶曰是必有龎然無能為頽然若不足慮者而後可以定亂於天下此髙祖之所以必周勃之安劉氏與勃為人厚重而少文故其鎮重足以壓天下之亂而使之不能動其椎魯足以安諸吕之心而使之不吾疑然後徐起而取之則大事必決于我方是時直諫以抗之者王陵也隂謀而圖之者陳平也合將相者陸賈也結吕祿者酈寄也倡大義者朱虛侯也握重兵者齊與灌嬰也而劉揭御史窋張辟疆之徒皆并力馳騁乎其間是數子者皆以其才與之角惟勃能以不才而合其謀皆欲動而求成功惟勃能以不動而制其㑹是以入北軍而人不知士皆左袒為劉氏而諸吕不之覺安社稷定劉氏而天下不見其狀此髙祖所以必其成功而陳平所以自謂不及也向使勃處危疑而以區區之才動於其間則姦人得以乘勢而奪其權又何劉氏之安乎吾乃今知勃之無能者乃所以為有能而不足慮者乃所以為深可慮也嗚呼周勃今以無能而安劉氏髙祖亦常以無能而取天下矣方項羽咄嗟叱咤其勢若飄風震霆天下以為無漢矣而髙祖以其不智不勇之身橫塞其衝其頑冒椎魯雖足以取笑於人而卒能張項羽於始而翕之於終其知人之術無乃其取天下之術歟其所以任人者乃其所以自任歟不然何其能必周勃之安劉氏也耶方其既沒之時天下雖平而內有諸吕之禍蓄怒而欲發不可謂之治亦不可謂之亂故髙祖知其然也以其治焉而付之曹參以其亂焉而遺之周勃參卒能行其清淨無為之政安然而致其治勃卒以椎魯無能之才安然而平其亂此非髙祖知人之效蓋其御天下之術也嘗觀西漢之事有可怪者二周勃椎魯少文而高祖必其能安劉氏霍光不學無術而孝武必其能輔幼主皆卒如所料蓋椎魯少文者乃所以安劉氏而不學無術者乃所以能輔幼主也世之人不知夫不才之為才無用之為有用踈矣朝錯以其才而發七國之亂竇武以其才而速䆠官之變西漢以亂東漢以亡沈重而不發者未有不成踈狂以速禍者未有不敗故朝錯竇武用則劉氏必危周勃霍光用則劉氏必安豈非自然之理耶光武授鄧禹西討論善平亂者必審觀敵人之勢而用其將帥之才今夫敵人之勢必有堅脆而將帥之才必有長短故古之善取天下之君其所以收萬全之利者豈有他哉蓋亦固敵人之堅脆以用將帥之長短能使將之才與敵之勢相稱然後能相當能相當然後能相制故能取勝於天下而其兵不可敗方其將發也必觀敵之兵而又觀其氣觀敵之氣而又觀其勢彼為吾之敵者誰乎其氣果怠耶勢果緩耶雖以雍容之才亦足以制其亂其氣果鋭耶勢果急耶則必以縱橫百出之才而當其衝亦猶因病用藥而已非惟以丹砂而去其易除之病而又以烏喙蝮蝎而摶其難攻之毒其理蓋甚近而易曉嗟夫世之人不斟酌敵勢而酬酢之乃以雍容之士當飄忽震蕩之敵而兵始敗矣嘗怪光武掃蕩羣盜而不能不失威於赤眉其故何哉其失在於以鄧禹雍容之才不能與敵人之勢相勝亦無怪乎兵之至於敗也方其命禹也蓋曰禹有深沉大度故授以西討之略夫當時之盜其剽鋭而輕者莫如赤眉剽則彊悍而不可敵鋭則奮發而不可當輕則倐忽而不可禁而欲以深沉大度之士頑然而當其衝是猶冠冕佩玊之人而使之悍禦山林之勇其不斃者幾希矣雖然禹發光武取天下之心不可謂無智然而可以決一定之議而不可以應無窮之變可以優游於帷幄而不可以奔走於征伐向使民有未安耶禹也旦暮而撫之者其所長也謀有未決者耶敵有未撫者耶決其謀而鎮撫其敵亦禹之所長也而光武捨禹之所長而用其所短以當赤眉之鋭則西討之師適所以敗北而已今夫有雍容之才者必無縱橫百出之智稷契未必能當蚩尤之鋒曾閔未必能制盜跖之怒孰謂禹也而能當赤眉也耶嗚呼赤眉之勢本不張張赤眉之勢者鄧禹也鄧禹之才本可用誤鄧禹之才者光武也請論鄧禹制敵之踈以觀光武用人之失夫天下之亂莫難於當飄忽震蕩之亂自古以來其亂有四在漢則有項羽有七國有黃巾在唐則有安史其勢類皆如迅雷暴雨遽而不可遏然而卒破滅者制之有術也髙祖之取項羽李郭之制安史是百戰以摧其鋒而已亞夫之制七國皇甫嵩之破黃巾是堅壁以老其師而已鋒之摧則勢有所折而弊可乘師之老則氣有所竭而亡可待雖有震動之勢終何為哉赤眉之亂大類於四者而鄧禹有老其師之勢而不能用於始以喪其功有摧其鋒之勢而不能用於終以至於敗且赤眉之勢不終日之勢也雖有難拒之形而實有必敗之理雖有嵗月之彊而實無經久之患所謂寄生之冦無根之盜蓋可必取而無難方禹之臨山西也苟能乘悅附之心當屢勝之後直搗長安而據其險積財於內使我師優游而有餘閉關於外使赤眉皇皇而無所歸如是而赤眉不破吾不信也奈何得關中而不能守使賊勢橫行於長安而不可禁故曰禹有老其師之勢而不能用於始以喪其功方禹之入長安也苟能困赤眉扶風而其氣已沮犒吾兵養吾鋭於是以素飽而乘其機以至逸而待其勞以方鋭而攻其衰如是而赤眉不敗吾不信也奈何以饑饉之卒而當其鋭於威損之後而繼之以戰是以二戰而至二大敗故曰禹有摧其鋒之勢而不能用於終以至於敗夫禹之出也與更始諸將三戰而三勝與赤眉遇則二戰而二大敗更始諸將懦而無立故禹勝之為有餘赤眉之勢暴而難敵故禹當之為不足其有雍容之才而無縱橫百出之智蓋可見矣而光武反使之當衝突之敵以取敗故曰非鄧禹制敵之踈光武用人之失也昔者髙皇帝料韓信必能當柏直料曹參必能當馮敬蕭何之鎮重不使之運籌子房之多謀不使之征伐任人各當其長用人各當其敵故能取勝天下光武之用寇恂用耿弇亦若髙祖之用蕭何韓信矣而反失之於鄧禹嗟夫禹之才置之於帷幄不失為斷大事之謀臣而反用之以當飄忽震蕩之衝則不免為敗軍之將此光武不觀敵勢之過也兵法曰知彼知此百戰不怠嗚呼深知乎此而後可以將將矣

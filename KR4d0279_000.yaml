body:
  text: 蓮峯集十卷别集類三宋提要臣等謹案蓮峯集十卷宋史堯弼撰堯弼字唐英眉州人其仕履不見于史傳焦竑國史經籍志堯弼蓮峯集三十卷而世間亦無傳本故録宋詩者多不能舉其姓名惟永樂大典載有是集原序二篇其一作于乾道丙戍自署曰省齋不知何人其一為任清全序作于嘉定癸酉稱堯弼童丱即逈出不凡少以古樂府洪範等論往見張浚浚謂其大類東坡留館於潭與張栻逰每開以正大之學嵗丁丑偕其弟堯文登第云云而亦不言其所終考周密浩然齋雅談云李燾十八嵗為眉州解魁時第二人史堯弼方十四嵗人疑其文未工赴鹿鳴宴猶著粉紅袴太守命分韻賦詩堯弼得建字援筆立成云四嵗尚少房元齡七步未饒曹子建後為張魏公客不幸早世云云其所記與任清全序相合又江湖續集載張煒題蓮峯集詩一首亦有句云一梗江湖客三朝忠義家以諸書參互考證蓋堯弼登第後未授官而卒也堯弼天姿踔絶其詩縱橫排宕擺脫恆蹊其論䇿諸篇明白曉暢瀾翻不窮亦有不可羈勒之氣大抵有其鄉蘇氏之遺風惟其夏緑霜凋故不能如李燾之著書傳後然就其文章而論要亦不失為才士任清全序乃因集中有論學之作遂以張栻少年自得為堯弼磨礲浸灌之功欲援而入于道學之列則門户標榜之習轉不足以見堯弼矣其文在宋巳多散落是集乃其從孫師道所重刻今亦不可復覩謹從永樂大典中掇拾裒輯釐為十卷著之於録俾懷才賫志之士無聲塵翳如之慨焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序蜀士以文名者皆獲傳於世惟青衣史公堯弼唐英之文未傳昔張丞相魏公一見公洪範等論謂義理之學大類東坡手其文示諸子姪曰讀是則知為文之道而况今天下學士欲拜下風而不得寧不矚目於斯文也哉比因編次公平日所著文凡三十卷刋出與衆共之亦以備蜀士之闕文云乾道丙戌八月既望省齋書蓮峯先生史氏諱堯弼字唐英童丱逈出不凡紹興中史唐英之名滿於搢紳間天下知名士也李巽巖以南北六朝策首送眉陽蓮峯在第二年甚少其文尤該博非幼學所能兄弟三人兄長諱克俊嵗辛酉四川類試第一人蓮峯下第束書遊東南時張魏公在潭雅聞其名欲一見之蓮峯乃以古樂府洪範等論贄之魏公得其文以示南軒曰此東坡先生之學也留館於潭明年試湖南漕蓮峯第一南軒第二蓮峯因以文章正宗示南軒而嘗曰文章一小技耳蓋每開之以正大之學引而不發也是以南軒平生尊敬東坡先生不忘蓮峯嵗丁丑蓮峯偕其弟堯夫登第弟卒南軒以書相開勉具述中庸復性之理是時南軒蓋年未二十也其自得已如此非蓮峯養正之功也哉初魏公謫於潭禍不可測蓮峯獨從之遊觀其所贄詩章雖以戰守為正然其末未嘗不歸之愛民也辛巳用兵魏公復起蓮峯亦登第人為之喜蓮峯則曰魏公再用勿用兵乃可不然必再敗未幾果有符離之衄人以為知言其議論據正不隨世俯仰蓋如此是豈誇張誕謾苟以名勝相推激為重者之比哉清全總角侍先公家青衣江上蓮峯於先公為同年進士寓居栖禪寺時以小舟過先公率夜漏三十刻乃去清全傍立拱侍聽其言猶河漢無極也其文至多皆散落不存舊集漫漶今蓮峯兄長之嫡孫師道取而再刻之加以南軒少時一帖併諸公所跋附於其後使人知南軒少年自得乃蓮峯磨礲浸灌之力可考不誣也師道頃官蜀口遭值用兵亦主愛民之論不貪苟進之功狂童在傍訖全其節以是受知於制閫相公擢守古戎會鄰路有干戈之擾亦不樂用兵以去其尚蓮峯之家法也哉嘉定癸酉年家子任清全敘

body:
  text: 蓮峯集巻九宋史堯弼撰啟賀晁子止除合州啟伏審荐被恩榮光膺郡寄一麾出守已夙著於風謡三命益恭冝茂隆於天眷寵靈狎至懽誦交騰恭惟知府學士業履精深器資宏博盖養以文元之事業晁迥而暢以太史之風騷晁無咎景迂之道數以根其中晁以道崇福之詞華以麗其外晁之道全提祖印㕘妙貫於心傳益顯家聲集大成於玊振故雖處二千石之重而不驕於富貴猶且閲三萬軸之藏而間出其緒餘將大用之豈久居此惟赤水巴川之㑹有銅梁石鏡之竒冠盖往來集萬艘於江浦仙真隠見遺九鍊於茅山資道德之照臨庻風流之衣被坦然正路之日啟行矣大賢之彚升筆倒三江合䝉稽古之力政成餘地姑試發硎之功尚疑暖席之未遑已有追鋒之遄至某夙䝉恩奨叨預姻聨聞休命之播傳喜窮途之䕃映宻分餘潤猶切小人之便私佇入中臺即為天下之公賀謝解啟某聞之物無小大必有用于世人無貴賤賢不肖必有事于天下農以耕賈以貨工以器百執技藝各以其能聴天下之役而不敢後非有他也天之所以命我者當然而不可已耳君子之立於當世豈無所命之者哉得之于天根于性命之間發而為道德仁義忠信孝友黼黻文章之光舉而措之天下以成事業者盖君子所受命於天而不可已者也農不可一日不耕賈不可一日不貨工不可一日不作器百執技藝之人不可一日不事其事故君子亦不可一日不求用于天下古之仕者三月無君則弔雖一日出疆亦載質焉是豈樂進取慕名位而干富貴者哉要以正夫天之所以命我者而已某愚不肖敢自列于古之人哉然内度其區區則亦有不敢自棄往年所親慮其所聞不廣于四方爰命以逺逰是以萬里冒犯湍悍以至東南既而憣然渉沅湘以歸此其心雖非必于求進者然其中之亦欲有用于世以正夫天之所以命之者則亦未嘗一息而少忘故場屋之役或未能免焉伏䝉某官不鄙夷其愚羽翼而推挽之者百方意欲使之有所著見於當世而後已則今尺寸之獲雖無足言然亦有自嗚呼天其欲擯厄其身使伏草莾不得施則已或者欲有以用之于世必將始于今日其為賜何如也夫有以千金與人而人不喜有一言之相與而人終身為之不忘况三閲嵗之間日拜於下風而又䝉奬借而誘掖之似有以知其中之所懷不至於碌碌欲與之相期于高明博厚悠久之域者詩云我思古人實獲我心况其生於今而能獲其心者耶此其不可以不謝謹具啟事述悃愊之萬一以布下執事通青城程宰啟伏審榮綰銅章居古子男之地光臨玊壘號佳山水之鄉當此下車之初截然報政之敏士流増仰民氣已和盖字人之職實以愷悌風流為賢而比嵗以來廹於賦輸星火之急每聞督郵而已懼未覺縣令之為尊雖欲鳴琴詎能閉閣惟皂江岷嶺實兩蜀秀異之所鍾况福地洞天有羣仙翺翔于其上竹雲齊合山色翠流不妨引騎從而數逰或可釋簿書而一笑顧此縣封之屈得非吏隠之竒兹縁地靈以處名勝㳟惟某官江鄉人物酥酪弟昆族已並於蘇陳政乆傳於魯衛兩州贊治泛緑水之紅蓮百里承流揖西山之爽氣更假才華之刄一新廢置之綱起魯恭卓茂之風繼兹遼邈踵清獻汲公之跡自此權輿曽驥足之可淹亦牛刀之暫試如某者樗才無用蓬户至微白首雙親卧疴累嵗平生半菽待養一身猥䝉桑梓之依方借江河之潤雖知曠度為三十六峯而來得沐深仁同十萬餘家之慶再三抃蹈倍萬等倫謝王郎中啟迂愚何取初無堂下之言奬拔過優猥玷幕中之選論交非素寵命偶加豈徒拂拭其生平方幸吹嘘之有自矣伏以古昔既逺遺風莫存孰能收士于寂寞之濵灼分鑒别自非用意於㝷常之外莫障波頹豈無德人力振斯道某學空慚于自守才不足以適時生而濶踈數復屯棘簡編自樂付出處于無心蓬蓽粗安任窮通於定命不由紹介忽奉版書俾陪賔佐之逰将遂安輿之奉夫何特逹有此㑹逢伏惟某官性賦中和道尊皇極貫百代之學而歸於有用盡萬物之變而行之以仁竊考名德於先朝獲聞故家之遺烈昔在祖宗之世實深社稷之謀勲業不磨具存制詔祖孫相望合冠近班少屈星軺之臨聊庇井絡之分豈期樸學特荷深知俯念孤蹤何以辱湖南之賔客仰高德度顧莫攀江左之風流但知益勵于操持或可勉循于職守請學為政幸日親長者之風誓盟此心其同効衆人之報權輿兹始詠頌莫陳謝李守啟伏以恩有大而難酬情有迫於至切輒犯英重豈期矜從惟大君子為能推無礙之慈顧愚不肖私獲遂必從之欲嗟歟手足之至痛永矣幽明之既分寂寂帷㡛久沈蕭寺茫茫原隰未即幽墟鶴髪雙親長懷夙夜之感鴒原一念何勝風雨之哀滯魄八年歸安一旦此盖伏遇某官用法雖嚴而行之以恕持心甚厚而守之以公誼已薄於層霄仁不遺於纎芥閔其無所歸之殯深足悲憐察其不得已之求出於危廹興哀泉壤施德丘山没而有知當結草以為報生者未泯誓藏心而不忘頌銘之私筆舌難露代朱緜州囘蘇邛州季文啟訪别呉江乆矣嵗年之換言旋蜀道嗟歟㑹合之難遥聞桑梓之鄉已沸袴襦之詠方圖贊慶首辱貽音感既溢而中慚神已馳而形絆伏惟某官峨岷英冑湖海勝流聞道鄉來已㳺心于汗漫不妨聊爾尚俯首于軒裳諒簡帝心俾繩祖武小試八州之督旋升兩禁之華言念曲臺想光塵于僚舊㑹扶藜杖從嘯詠于邦君代張承務謝試官啟某啟伏覩漕榜猥叨薦名者竊惟科舉之設以搜爽異秀發之才不圖孱弱之資偶合規矩凖繩之内學未知其所向寵忽至而若驚嘗聞古者國家之取人也必教育之甚久而非擇之於一時故當時君子之為學也亦涵養之有素而後發之於一日盖教之不乆則或失於苟簡養之無素則將入于輕浮是以上之所以取人之法至嚴而詳下之所以為學之方甚難而備始置之于庠序學校之中而後措之於選掄論辯之域大必造於道德性命之理而小亦習於射御書數之微取之雖甚宻而天下不以為煩學之雖甚久而天下不病其緩務盡其實無求其名故能網羅當世之英才而無所遺陶成一代之習俗而底于治人知積學之美自無苟進之風某雖憃愚學且迂濶粤從童稚之嵗深杜苟求之萌浪為場屋之遊盖自父兄之命不謂微瑣亦䝉甄收此盖某官以廟堂求賢為懷以菁莪育才為念用心甚廣將為一世之公擇人至寛不求一夫之備聊取寸長於今日責其成器於他時仰惟激揚晚生之心豈勝感荷刻骨之至誓當退力於學不辜所期日思所以脩已深造之方庻幾少報盛德萬分之一考試省闈謝丞相啟較澤宫之彦方妙柬於衡平服筦庫之聨迺濫塵於竽吹荷一時之盛遇知小已之至榮鏤極感丹爰占謝墨伏念某學無根柢詞乏華芬第杜牧之阿房蚤慚異等官阮咸之騎校分隔清流不圖犇走之卑忽有傳宣之寵囘思薄技歘起厚顔書中之字蟫生久兹廢思門外之袍鵠立猶是等夷冒焉操去取之權或者駭見聞之舊至若討論商略參天子之從臣燕勞匪頒貴朝家之内帑是為優異迥出㝷常甚思山片玊以蒐材正恐日五色而過眼曷逃曠負祇玷陶成兹盖恭遇某官賛極以叙民彞秉誠而穆天縡紀宏休於白玊聿高同德之勲歌世美於緇衣克篤好賢之志褒典特加於洛學恩光徧及於里居抑子弟以寛寒畯之塗申禁防而覈材能之實凡此力扶於公道卓乎增賁于斯文遂致瑣庸亦叨器使某念無以報誓不辱知脱選者謂再登科自憐此日代天者為真造物永托餘生代人上楊節使書兩府節使太尉鈞座某嘗謂有國家者不可使威重之臣一日無於天下威重之臣其功效不特見於紛紜多事之時而尤見於治平無事之世盖多事之時其為功也顯而易見無事之世其為功也隠而難知方其犯煙塵冒矢石以摧難挫之鋒鼔行於大敵之前以取百勝之利如震霆如破竹如轉圜石於千仭之山以扞社稷以救生靈於累卵阽危之中此為功人孰不見及夫事已而兵休養安而務閒暇然其威靈之所震蕩氣焰之所懾服使姦宄陸梁窺伺之人望而畏之破膽折氣於㝠㝠之間盗賊冦敵之患潛消暗伏而不敢作譬如湍悍之水巉險之山神龍之所宫猛獸之所宅若不可得而犯使社稷固於㤗山不動之際此其效尤為至大而世莫之知也自非威勇膽氣之奮發智術方略之運動忠誠節義之激烈有以絶出於衆人之上而高視於一世之表者孰能至於此哉以是知固國不以山谿之險威天下不以兵革之利以有威重之臣而已唐有天下三百年多事居其半然其所以立國者以有威重之臣可恃而已是以天寶至德之世所恃者汾陽王子儀臨淮王光弼也建中大厯之際所恃者侍中韓洪僕射愬司空光顔也夫豈必安史之變朱泚之變淮西之變而後見此數人之功哉其平定之後内之諸鎮外之四夷有所忌憚帖服而不敢為變者以有此數人而已然則唐之有天下豈非以有威重之臣為固哉由是觀之其為用於天下也大矣恭惟兩府節使太尉執事知勇忠義卓出當世方敵國深入四蜀震動奮然一身轉戰百鬬上以衞朝廷而下以保吾蜀其功固已大矣爰自講解之後環數千里之間百萬生靈安於田畆農桑之樂無有烽燧桴鼓之警全蜀晏然乗間竊發之盜不作而朝廷得以尊安所以如此者非執事之頼而安歸哉夫為天下威重之臣功盛業大吾蜀恃以無恐者方且深執謙德䧏以下士此當今之士所以願歸依於門下而不敢後也昔唐杜黄裳元和間名宰相也而實出於汾陽王郭令公之幕府韓退之百世文章之士也而常逰於北平王馬燧之門以是知威重之臣其勲業盛大可以垂萬世而不朽雖杜黄裳韓退之之賢猶願出於其門以託其光耀而况於他人哉某雖一介無用之人然自少亦欲有所建立於當世者竊服執事之威重二十餘年矣嘗願一出於門下以望見光采託勲名以垂不朽焉然寸禄之所迫遑遑奔走於四方終不得一遂其願今者蒞官而適庇身於旄鉞之下此天實賜之使夤縁幸㑹以副其平生之區區不勝踴躍進伏墻屏伏惟執事幸進之徐察其所能將有尺寸可以備使令不碌碌而已者惟所裁幸不宣

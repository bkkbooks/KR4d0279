body:
  text: 蓮峯集卷四宋史堯弼撰策問均稅策課治於王者之盛時則守株之誚不免於嗇夫之口課治於霸者之末世則改絃之喻不奪於君子之志非王者之不足尚而霸者之有可稱時適其變而法便於民故也請借齊秦以為喻齊之小白相管仲而從其言秦之孝公用商鞅而聽其說是齊秦之便利苟簡雖為好髙慕古之士所黜其量時度宜反為通逹國體之人所取是其不貽於守株之誚而有得於改絃之喻也何則五家為軌五里為連此軌里之法起於管仲也非管仲有拂於先王齊小白富强之急不得不然爾千而為阡百而為陌此阡陌之法起於商鞅也非商鞅有拂於先王秦孝公兵食之急不得不然爾若使不然追蹤王者之迹圖為治國之術豈不亦踈且逺哉大抵一時之治必循一時之法必循一時之便不循其法不足以為治不循其便不足以為法藉是以觀歷古賦稅之得失蓋可見矣自神禹治水分别九州底乃財賦時則有五十之貢成湯嗣興受小共大共為下國駿龎時則有七十之助成王定周設為九賦以斂財賄時則有百畝之徹三代便民之法豈可企而及之哉春秋之世魯宣公之初稅畝則稅賦為不足定公之作丘甲則稅賦為不足哀公之用田賦則稅賦為不足便時之法果將若何為足觀也漢髙祖式遏亂虐除秦之暴天下平定區别疆界時則十五而稅一逮及文帝治風燦然四海富庶時則三十而稅一當此之時稅賦為有餘循時之便何足憂哉有若武帝專意征伐用度始不足加口錢𣙜鹽鐵鑄白金造皮幣紛紛然也無益於事是雖仲舒獻名田之策是雖師丹獻限田之策皆欲均其賦稅也惜乎策之不用而止唐太宗濟民水火除隋之暴身及太平法古遺意時則有租庸之制施及代宗前法稍玩有所更革時則有以畝定稅之制當此之時賦稅為有餘循時之便又何足憂哉有若德宗藩鎮强盛用度始不足議鹽鐵興錢幣行括苖置和糴紛紛然也無益於事是雖陸贄進六幣之策是雖齊抗進六姦之策皆欲均其稅賦也惜乎策之不用而止歷觀古者一得一失大率如此厥今賦稅何如哉不均之弊有二有兼并之弊有流徙之弊何謂兼并之弊富者地日以益而賦不加多貧者地日以削而賦不加少姦民欲計免於賦役者割數畝之地加之數倍之賦而收其少半之直於是其富者地連阡陌膏腴沃壤奄而有之其貧者曽無尺地以置錐託足方且困於重役迫於追呼此所謂兼并之弊也何謂流徙之弊吳蜀有可耕之人而無可耕之地荆襄有可耕之地而無可耕之人又其凶年饑嵗轉相散徙於豐足之邦於是所㑹之處如鳬居鴈集烏合蟻聚所居之里雞犬不相聞馬牛不相及又且伐户破竈析骸毁骨此所謂流徙之弊也為方今之計必欲去此二弊莫若行土斷之法何則籍其地之廣狹計其人之衆寡限之以户數而授之以土地使有力者勢不至於陵僣使不足者身不至於流蕩是法既行户有定籍田有定分無有兼并無有流徙然後從之為什一之稅則不均之弊又何患哉所以晉哀帝始行之安帝終復之亦能濟其艱危免其匱乏而天下有息肩之所豈不嘉哉幸今主上屢降德音以此為念庶幾禮樂興獄訟息明執事上體天子之意以此下詢愚雖不敏願以土斷為獻不識與其進否冗官策求天下之害而與民除之者君之職也陳天下之害而與君共除者臣之職也嗚呼天下有未除之害而為人臣者有能深言而力行之為人君者又從而深信以委任之以掃清積世之弊故害可除而利從而興焉嗟乎衰世之不由此也為其君者不知天下之利害聞其臣之言則掩耳而不聽為其臣者雖能言之於上見其君不聽則遂從而巳害既不去利何從而興乎冗官之弊天下之大害也苟君臣欲有為於天下者不可不除也其事似小為害甚大其為害有四何則唐虞所以庶績咸熙者庶官無曠也今也無其事而虛設其官無其功而空食其祿則是天下皆曠職也問之曰何職也曰備員而已小無益於民大無益於國此則曠職業為害一也國家所責有限天地所産有窮今也冗官布於州縣坐無事之人而食有限之祿縱無窮之欲而盡有窮之財海內所以虛耗國用所以罄空此則耗財用為害二也官吏無數而職業有限故有運貨賂於權門輦金帛於㦸里望塵擁拜搖尾乞憐冀欲超遷髙資擢除美職者矣此則長奔競為害三也奔競之徒固非夷惠之清而實叨餮之子也故其得職也曰前日所獻若干所費若干則今日槌民膚剝民髓以償前日之費而後已此則虐萬民為害四也四害不去天下所以亂亡相尋也然在治平之世則尚可而於有事之時則不可苟於是時君不聽其臣之言臣不盡其所欲言為其君者昧於安危之機不見天下之利害為其臣者除害之心不力君之不聽遂委之而已故冗官不去而日以滋蔓考之於唐中宗不報盧懷慎德宗不省杜佑是矣至於眀君良相則不然臣深言而力行之君又從而深信委任之為其臣者見事之智甚眀除害之心甚决慷慨激昂條陳利便為其君者熟知其害遂披襟以納之决意以行之故去冗官如反掌爾考之於唐憲宗任李吉甫武宗相李德裕是矣是四君者皆常有事也有事之時是人主中興之秋也今欲中興則當先除天下之弊而為新天下耳目之事捨省官何以哉何者四害之積天下莫不厭吾今於此一掃而清之非徒足以興四利亦可以慰天下之心矣四君當有事之時而撫中興之運是時冗官不可不省奈何中宗德宗失之於前幸而憲宗武宗得之於後中宗之時襲武后戕殺之後當韋氏濁亂之際天下不可謂無事方是時也側門用事墨敕授官凡數千員時號三無坐處其官何其冗也為中宗計者有事之時冗官所當省也奈何盧懷慎上疏以為諸司官數十倍於古諸牧宰不任職者一廢省之是言也可聽而不聽而中宗不知報何不眀之甚也雖中宗之過也亦盧懷慎之罪也夫吾欲除天下之害則青蒲再伏可也皂囊屢上可也何一言不聽遂從而已乎故治終不成也德宗之時三叛分王於幽薊華蓋䝉塵於奉天天下不可謂無事方是時也官員益濫銓選益謬入仕之門太多世胄之家太優其官何其冗也為德宗計者有事之時冗官所當省奈何杜佑上議謂救弊莫若省用省用莫若省官是言也可用而不用而德宗不之省何其不眀之甚也雖德宗之過也亦杜佑之罪也夫吾欲省天下之官力行之可也再言之可也何一議不聽遂從而休乎宜其功之不成也故曰中德不聽其臣之言其臣不盡其所欲言故冗官以滋蔓憲宗之初兩河未挈地悍將未悔過天下可謂有事矣而李吉甫秉政疾吏員太廣其意謂今天下有事必先省官以新天下之心故其早夜孜孜以輔治者無非此也乃奏曰今存無事之官食至重之稅遂省官八百員省吏千四百員故能成元和之治雖然吉甫之功也亦憲宗之功也何則非吉甫不能省冗官非憲宗不能用吉甫君臣相得此元和之政所以成也武宗之初劉稹未就誅藩鎮未盡服京師未甚安天下可謂有事矣而德裕為相憤官吏太濫其意謂今天下有事當先省冗官以新天下之心故其深思逺慮以為治者無非此也乃言曰省事不如省官省官不如省吏請罷郡縣吏凡二千餘員故能成㑹昌之治雖然德裕之功也亦武宗之功也何則方德裕建言武宗遂披襟而納之决意以行之噫非德裕不能去冗吏非武宗不能用德裕君臣相與㑹昌之治所以成也故曰憲武之臣深言而力行之其君又從而深信委任之故去冗官如反掌嗚呼天下有未除之患不可專罪君亦不可專罪臣天下有已成之功不可專歸功於君亦不可專歸功於臣君眀臣良治之基也君暗臣庸亂之府也中宗德宗於盧杜莫之報省而卒至於亂憲宗武宗能行二子之言故治稱中興則知省官去官吏之冗實救弊之先務恭惟國家炎精厄籙强寇干紀天下可謂有事正主上中興之秋也而天下有大兵甲十年于兹矣財利之臣鞭算心計亦至矣𣙜酒酤管鹽鐵關市舟車有征山林陵麓有禁然國用告乏軍儲告匱者何也此皆冗官未省取得其道而與非其宜故也竊願清入仕之門以絶濫進罷不急之職以去曠官斥無用之吏以省浮費則冗官可省而曠職業者無有也耗財用者無有也長奔競者無有也虐萬民者無有也四害去而利興矣而主上又能以憲武為法而以中德為戒大臣又能以二李為心而以盧杜為恥則今日中興之功豈特元和㑹昌之治耶私試策問楚屈原述離騷為九歌九章赴河而死其徒宋玉和之又為九辨自是文人才士依倣焉又如枚乘作七發傅毅作七激張衡作七辨崔駰作七依曹植作七啓張華作七命唐興作者尤多或者以此曹區區之文冀其有致身之階果其然耶請折衷為之說夫待人以必能者不能則喪氣倚事之必集者不集則挫心士之懷竒抱策出而佐時必期得君以展盡其底藴而上赴功名之㑹矣豈意中遭撓敗而功名不克就此固喪氣挫心而憂憤怨刺之言所以發舒於外而不顧死亡之禍也昔楚屈原為三閭大夫因罹讒毁流放江湖乃述離騷為九歌九章援天引聖而卒不見省遂赴河而死其亦蹈此者歟若屈原者可謂淺中浮外而不知大體者也蓋為臣之道莫善於全節而次之以全身苟道不足以正君智不足以弭亂諫不行言不聽則繼之以死故甘斧鑕安鼎鑊而不悔者冀以區區之身一悟主上而納之於善如龍逄以之死夏比干以之死商也脫或不幸忠謀而君不從正諌而主不信以獨見之眀而知禍亂之不救殺身之無益則超然逺去雖髙爵重祿亦不足以係其心而介其意姑全其身以沒于世如微子以之去商百里奚以之去虞也若屈原者其亦知此乎奈何不知出此而乃蔽於待人以必能倚事之必集而卒於不遇遂喪氣挫心以發其怨憤之言而為離騷之文以葬於江魚之腹嗚呼使屈原而稍知全其身以沒于世則必不忍為此及夫其身既沒其後宋玉從而和之又作九辨自是文人才士依倣為文如枚乘作七發張衡作七辨崔駰作七依曹植作七啓張華作七命以至唐興作者尤多皆願附於離騷之間遂謂之楚辭是皆不能自用其才而乃甘為憂憤怨刺之言以譏諷於時不然賈誼何以少年屬文於郡中自負為王者之佐而亦不能自用其才一以不遇過湘為賦以弔屈原其後卒以自傷哭泣至於夭絶其亦屈原之徒有以激之歟吁後之為國家者其於忠義之士名節之流當在屈已禮遇虛心優容使引鑑皆眀目臨池無洗耳若然則變故之世顛沛之時尚冀其有回天之力復國之勳况興平之際治安之朝何其不能成功乎課吏四善二十七最九等賞功十二轉三陳三資法西漢享國二百年傳十二帝不世之主抑何多也英武如髙帝寬厚如文帝才略如武帝愚皆不取之獨以宣帝為難能謂宣帝有英武耶斷斷之技恐髙祖之不肯為也謂宣帝為有寬厚耶察察之政恐文帝不忍為也謂宣帝為有才略耶拓地開疆則武之所優為宣帝不可企而及由是觀之宣帝難能之事果何著見而髙帝文帝武帝焉得而不取之耶甚矣人之智愚賢不肖未可以一律而論不有以區分而旌别之愚恐奮迅卓越之才不自表見怠惰阻鬱而不興姦貪放縱之士不自警戒侵漁掊尅而益甚也天下烏乎而免亂哉故宜統天下者有以處之耳此所以考課之法不得不行於吏職賞勳之法不得不行於將帥者也推是說以槩之於宣帝難能之事兹可見矣何則漢自髙帝平定之後一切草創倥偬不暇此馬上之治莫逃後世之清議是雖英武為莫可及而英武特用之以取天下傳及文帝時方宴安仁政之施固不可緩此以德化民實為後世之美談是雖寬厚為莫可及而寬厚特用之以結人心至於武帝則不然嫚書之辱白登之圍忍之久矣及當此時馬足已踐於河上不示之以威愚恐胸奴之變將可憂也武帝由是起而征之雪漢之恥倡漢之威是武帝之才略亦雖莫可得而及於征伐則有補於考課賞勳則無補也夫無補於考課賞勳何以責治道而維持天下哉愚想宣帝之前吏職之不稱將帥之不舉雖有考課之法而實不考課雖有賞勳之法而實不賞勳可謂極矣宣帝之興孰不咨嗟而憤悼之於此二者信有意也是故綜核名實則考課之法行於吏職信賞必罰則賞勳之法行於將帥矣考課既行於吏職則吏職烏得而不自勉吏職自勉也用能政事文學法理之士咸精其能者焉賞勳既行於將帥將帥焉得而不自勉將帥自勉也用能單于慕義稽首稱藩者焉嗚呼髙帝之英武文帝之寬厚武帝之才略雖莫及矣殊不知宣帝積弊之後使考課賞勳之法行則難能之事亦安可得而及之哉讀史至此乃知考課賞勳之法誠國家之急務也兹承眀策以唐四善二十四最九等考課之法而以升降其才能十二轉三陳三資賞勳之法而上下其功勞下詢諸生此愚之所以喜聞而樂道之也試效一班之見且四善以眀其人在已之所長二十七最以眀其人在官之所能在巳未必皆所長則或最為可取在官未必皆所能則或善為可取最善兼得則在九等為上上善最不聞則在九等為中下或有一最而三善或有一最而二善以至愛憎任情處斷乖理背公向私職務廢闕居官諂詐貪濁有狀莫不皆以九等而次第之故四善自德義有聞積而至於恪勤匪懈二十七最自近侍積而至於鎮防大率以此不復槩陳其詳夫考課而升降其才能有如此者則當時吏職之循良蓋可見也是以就其尤者而論之敢嬰逆鱗不畏鼎鑊以諌諍為事則有如魏鄭公詳眀治道深切時政以敷奏為事則有如陸宣公排衆人之說陳伐蔡之計則裴度擅其能應一時之變成天下之務則姚崇處其任以至徐有功之决獄髙季輔之考校班班然見於當時以此而觀他可類推而例見也豈不由考課之法升降其才能而至此乎且十二轉以示其器秩之厚薄三陳區别其立功之難則謂之上陳則品秩之必厚其立功之易則謂之下陳則品秩之必薄其中陳亦例而推其三資亦例而見故見任前資常選曰上資文武散官衛官勳官五品以上曰中資五品以上子孫上柱國國子勳官六品以下曰下資計戰功之多而取乎三陳則還以十二等者為之資議酬功之等而取乎三資則還以十二轉而為之品莫不皆然不復槩陳其詳夫賞勳而上下其功勞有如此者則當時將帥之奮發蓋可見也是以就其尤者而論之闔門稱疾畏逺權逼功大而主不疑則有如李藥師朝聞命夕引道無纎介自嫌則有如郭子儀長於策敵之功精於制勝之術則光弼為之最陳范陽之謀致兩京之復則李泌為之先以至張巡之嬰孤城李晟之抗羣賊班班然見於當時以此而觀他可類推而例見也豈不由賞勳之法上下其功勞而至此乎恭惟國家考功之法雖行矣而吏職不至於澄清此所以不免功過善惡資叙龎雜焉司勳之法雖行矣而將帥不至於銓次此所以不免勳勞劇易品級差叙焉吏職之未澄清將帥之未銓次蓋恐有害於治道是宜朝廷之注意也必欲吏職之澄清莫若法唐四善二十七最九等之遺意可乎必欲將帥之銓次莫若法唐十二轉三陳三資之遺意可乎夫唐法之善蓋有得於成周之遺何則成周之制爵祿以賢以庸而分之馭之以八柄辨之以八職若夫考課之六計乃唐之四善二十七最九等之法也賞勳之六功乃唐之十二轉三陳三資之法也唐之於周遼逺二千餘年法其遺意而成其治道也如此况國家去唐之世不甚綿邈法其遺意孰不可哉苟其若然非惟吏職之循良將帥之奮發與唐無異抑將逺追成王之逸駕享其既醉鳬鷖之太平矣漢宣帝中興之功何以過耶孤陋淺見執事以為然否王導謝安兼統內外古之興王其所以委寄責成而任天下之託者一人而已故舉天下之重任而付之方其用之也聰眀之鑒已洞然照其肝膈之間早知其文足以化成天下武足以威震八荒由是任之而不疑信之而不惑以為內外不專統則不可以責其大功故專之以內外之寄以謂軍國不參總則不可以制服天下故專之以軍國之權而責之以措置天下之務故有假黃鉞而督內外諸軍者矣有任宰相而為天下元帥者矣而當時之英才有受其責者必曰吾君付我以重任待我以赤心必當取天下以付之於吾君然後可以償其責於是內則淬礪有官撫摩人民修整法度以興衰撥亂外則鷹揚虎視運籌決策練兵搜乘以混一區宇凶頑肆蛇豕之虐吾則提橫行之卒以征之盜賊逞蝮蝎之毒吾則興問罪之師以討之及內外已治矣凶頑盜賊已平矣四方亦晏然無事矣然後人主享天下之富而已有取天下之功顧不偉哉向非人君付大臣以重任而人臣有取天下之英才疇若是耶嗚呼唐虞三代以來聖賢相遇未有不由此也降及後世鬼蜮青蠅之人進而天下無重任矣三光五嶽之氣散而天下無英才矣文武𣲖為二道而宰相元帥之職異矣是故天下或有英才而無重任或有重任而無英才此大功所以不立而大治所以不成也何則方時多故天下板蕩蓽門圭竇之中築巖釣渭之叟抱經世之策韜康國之略思欲整頓乾坤與華夏鼎新革故者人主舉而用之然而國家之重權不在於已也閫闑之內外不任於已也中外不得兼統軍國不得參預讒人鼓交亂之喙則異其任又眀日而罷其權矣欲望恢復豈可得哉此則有英才而無重任方時未寧人主於此捐千里之地舉百萬之師髙爵厚祿魚符金印獵天下之英才偉望拔一人而用之然而邊庭有鼠竊之寇河洛有飲馬之盜而四方入於頽敗委靡而不可救者何也所用無經國之才乏濟時之略徒務謹守封疆不能混一區宇望其一統實未可也此則有重任而無英才是二者其體雖殊言其致敗則一耳且唐自明皇以來藩鎮跋扈悍將橫行流血染潼關腥羶汙伊洛當是時忠義貫日月聲名憚戎敵者郭令公一人焉苟付之以重任則天下之難不難平矣奈何肅宗聽魚朝恩之讒間不過任子儀為朔方節度副元帥而已矣姦臣掣肘卒無顯功遂使懷恩騷動於兩河三叛分王於幽冀可不惜哉降及憲宗削平淮右孽芽未除禍根已結克融庭凑崛起匹夫倡戈魏博三晉瓦解方此時勳譽德業為朝廷重輕者裴晉公一人焉付以重任則河朔之盜不足平矣奈何穆宗惑小人之妬忌不過擢為東都留守而已矣逢吉沮撓卒以無成遂使强藩有問鼎之心唐祚有綴旒之勢可勝惜哉是二人皆英才而無重任焉若夫典午渡江一馬化龍元帝任王導簡文信謝安而江淮鞏固然以君子公恕之心待之則當時如二人者罕焉以春秋責備之法論之則王謝二子終不踰淮而北殆有重任而無英才與夫子儀中立異矣幸承師問請畢其說且晉鼎中傾金華韜德國政迭移於亂人禁兵外散於四方方嶽無鈞石之鎮關門無結草之禦李展石冰亂荆揚元海王彌潰青冀擾天下如驅羣羊舉二郡如拾遺芥馴至於宫闕榛荒元帝匹馬渡江下逮簡文天下未定而王謝為之佐焉夫正統未一實在士大夫為之匡救以混齊區宇苟任重而無重功者何賴焉此王謝所以不逃後世之議也且元帝過淮嘗思興復一心任導初加以都督中外又封以始興之地參總內外其任可謂重矣導於此時常懷匪石之心必翦吞沙之冦設學校於鼎沸之中立章程於櫛風之際忠誠貫日壯志凌雲以君子忠恕之心待之則導有取焉然而當元帝時越石挫鯨鯢之鋭士稚復九州之半太真宣王室之力士行擁三州之衆蠻奴之兵屢戰屢北中原之亂幾於冰泮石勒屯江西之卒糧匱兵亡劉總以王彌之疑猜生間起方是時也掛斾天山封泥函谷北卷三晉西吞秦雍易若折枝導不知出此終其身而大功無成以春秋之法責之則導有重任而無英才焉下及簡文方丁艱難委心安石既任以六州之事又加以征討都督參總內外其任亦重矣安於此時起為蒼生不從九錫衄苻堅百萬之衆折溫氏九五之心以君子忠恕之心待之則安有取焉然而當簡文時元冲之夙夜王家謝元之善斷軍事而淝水兵敗之從慕容垂挫於中山拓跋圭沮於定襄姚萇鼠畏於長安吕光魚駭於姑臧方是時東取青齊南定梁漢遷寶鼎於郟鄏返紫宸於瀍澗不啻反掌安不知出此終不能過江而北定中夏以春秋之法責之則安有重任而無英才焉吁取天下者必有英才然後可以兼內外之任而翦四方之亂苟反是則烏能成功耶王謝二子未能洗刷中原者豈二君不能委任耶豈重任不在於已耶豈冦敵不可平耶豈事勢有不可為耶非也無英才之過也二子者使當治平時端坐廟堂雍容議論則可矣丁時紛亂豈勝重任乎其為政事可知矣若較優劣則王優於謝何則王敦內侮慿天邑而狼顧蘇峻連兵指宸居而隼擊內難外患張如蝟毛是不可為之時也而導以草昧之餘制禮樂正法度而晉以安而安石時內無姦人强氐自泯于時西踰劔岫而跨靈山北振長河而臨青洛荆吳戰旅嘯叱成雲而六師屢捷是可混一之時也安反乃豪飲淫宴蕩志悅目故勝敵而兵愈弱得地而民益貧夫晉所以任安者亦重晉不負安而安負晉多矣則導優於安亦明矣且春秋責備賢者於齊小白召陵之盟書曰師於晉重耳城濮之戰遽書爵其進之亦至然文與之實不與者為其不以征伐㑹盟之功歸之天子王謝終不興復殆類是焉其才雖有優劣以春秋之法斷之其罪一也恭惟國家冦敵干紀華蓋南巡駐蹕吳㑹餘氛未掃播越海濱固不異晉東遷之亂上天悔禍殄滅之秋而聖天子委任大臣設為都督兼統中外文武之職不分為二將帥之任合而為一委以天下之大則其任可謂重矣聖天子既專其重任而將帥大臣又皆天下之英才所為之政所行之事浸澤區宇震驚中外天下復平之詩將再歌於今日矣下視東晉王謝如登太山而望丘垤也三國六朝都建康攻守人物謀議如何知天下之必可取為天下於必可取而後天下可得而定是故古之神武之君於天下未一之時而能使天下之勢已在吾掌握之中而吾之所以措置經略之術固足以運天下於未平之際故能以孑然之身當多難之衝而其措置綽然而有餘雖犯天下之至難以圖天下之至逺而天下之勢必折而入於我者其故何也蓋其所為者甚大故足以兼并天下而有餘然其所為之大者不待行之已平之後而已常行於未平之前惟其行之於未平之前故其逺大之效必著見於已平之後如炊無不熟爨無不成此無他為吾之敵者其施設甚小而吾之規模甚大是故小者不得不折而入於大而天下可得而定矣方秦之亡羣盜之所為甚小而髙祖之規模甚大是以其勢必折而入於漢方莽之亂羣盜之所為甚小而光武之規模甚大是以其亂卒平於光武方隋之亡羣盜之所為甚小而太宗之規模甚大是以其勢必折而入於唐嘗因此以觀江右六朝龍蟠虎視於建康之地夫建康者吳楚之襟喉也靣倚蔣陵背負洪流左京口而跨松江右采石而倚南州扼胸襟於石頭抗形勢於江上方其時也限三分於魏主當精兵於後周而又加之以兵强國富然六朝終不能因此以取天下者其規模之不甚大而取天下之術甚踈非地不便而勢不利也竊嘗覽其已行之迹矣有可為憤悶者二可為長太息者五可為痛惜者二真取天下者之深戒也齊氏失其淮浦而其勢弱是以自保之不暇此可為憤悶者一陳氏北喪淮淝而其地蹙是以受併於隋此可為憤悶者二孫權狃於赤壁之勝是以有合肥之奔此可為長太息者一文帝狃於伐魏之勝是以有河南之敗此可為長太息者二庾亮乘石勒之死而有復中原之志奈何終有邾城之敗此可為長太息者三殷浩乘季龍之卒而以中原自任奈何乃有姚襄之敗此可為長太息者四梁武雖有復淮之勝而終失河南之地此可為長太息者五而其所尤可痛惜者東晉之末天下之大機凡再至而皆失之孝武之時一至而謝元失之義熙十二年再至而劉寄奴失之是以天下終不可得而一且晉自永嘉而來大河以東濁河以北氊裘橫邉馬逸絳頭熾赤面張寖有年矣及苻堅之敗也慕容盜陜東苻沖亂關右堅沖相持其勢俱憊此正卞莊子刺虎之時也向使晉人能投天下之隙乘淮淝之鋭練兵搜乘直搗長驅一軍北收燕代以搖趙魏一軍西卷咸鎬而定關河則天下可圖也奈何反啖敵以糧養虎遺患而前日之功今已掃地矣此可為痛惜者一宋武之初定長安也秦民大悅相與泣涕而留之舉山陵宫室以動其心此正漢髙祖入關之時也向使因悅附之民起并吞之志南濟江淮西通巴蜀舉青豫之師以卷幽燕發秦中之甲以蕩隴右則天下可圖也奈何反留孺子以扞强敵而前日之入關適所以闢赫連戰場此可為痛惜者二是數者足以見六朝之規模甚小非地不便而勢不利也職此之由爾故六代之居江左雖與今日同而六代之不能復中原所以與今日異如前六朝之失因足以為今日戒然六朝之人物謀議亦有可道者何則請并劉備西兼巴蜀周瑜之策可取合吳蜀之長為唇齒之勢以進兼天下鄧芝之策可取也摧鋒冀朔延譽江南溫劉之志可尚也乘秦之亂求自北征謝安之策可取也先蕩臨淄掃清河洛謝晦之詩可詠也養鋭息肩觀兵洛汭則劉裕之謀可用文軌大同然後遷都則王懿之謀可行是皆其臣之謀有可取者然未足以比今日規模之大幸承眀問又以事之難易敵之堅脆攻守機要下詢試妄陳之漢光武起南陽一邑不六七年間而取天下南陽者今之鄧州也其地不得南方百分之一而能大創中興者蓋當未平而所欲為固足以運天下也洪惟主上運逢多難正中興之秋也為今天下之大計必將連吳并蜀安民息力以為固守之規耶然振國家之威以混天下者必勇於進而後可議荀攸策劉表之無志王導斥周顗之鬱鬱念藝祖提精兵二十萬拓封疆之萬里不為不難復其故地主上所急務也固守之策不足行也必將運江淮漢沔之資率荆州西土之兵以進耶然進取之術貴於分道並進使敵枝梧不暇是以晉攻關中則六道並進唐平淮西則九節度並進今欲如檀道濟自淮向洛如沈林子自汴入河豈不可乎進攻之策未盡善也必將觀天下之勢有可乘之便耶然使百年而便不至吾將端坐而待之乎釁隙雖出於敵而作之者在我六國以縱散而亡作之者秦也項羽以勢孤而亡作之者漢也今欲取天下非作敵之隙不可也乘便之策不足取也是三者皆不可用必有取天下之術焉夫事無難亦無易在我而已敵無堅亦無脆亦在我而已吾果能於多難之時宏謀巨術足以運天下則事雖難變為易敵雖堅變為脆所以致此者其攻守之道乎此非孫吳李靖所論者也此乃天下之大攻守而今日之急也必欲守乎荆州居上流江州居中流揚州居下流是三流者吳㑹襟喉建康藩翰者也必也據其衝使蕞爾敵國與夫叛臣吾得以坐制其命故應敵之暇得以自治而有餘故取天下亦有餘吾則淬礪吾百官撫養吾人民練兵擇將修吾道以深結天下之心治樓櫓於濡塢習步騎於長樂禮賢於延賔亭儲食於德充宫守已得策然後大舉以問背叛之罪自南鄭定三秦髙祖之遺迹可訪也出石門自河入汴沈林子之故事可訪也自彭城定青徐至幽冀謝幼度之故道可訪也彼脅從之民謳吟我二百年之厚德必有喜見官軍者守之道得於東南攻之功收於西北故天下可以必取也以主上之聰眀神武必得其妙用以興天下以建康而創王業彼六朝之君將負荆爾草茅妄論惟執事恕而取之

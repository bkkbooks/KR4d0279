body:
  text: 蓮峯集巻一宋史堯弼撰五言古詩寄上蘇卭州兼呈八座稽首仇池翁歸住小有天葛公尚逺孫岣嶁丹山傳道骨亦有種而今見嬋嫣大小茅山君霞襜兩聮翩弟兄對譚道舌本風雷旋嗟哉空山子妄意身飛翾忍饑嚙草木閲嵗烹汞鉛豈知至妙門端在𤣥中𤣥知公夙領此妙契遺蹄筌神凝物無疵合侍虚皇前我亦山澤臞㑹了區中縁㓕沒望仙鞚願言執風鞭相将丹丘上一笑三千年逰洛陽寳蓋寺贈長老道瓊詩一念落人境世路分崩犇車輪戰黄埃荏苒還自昏安知摩尼珠豈處濁水渾今我雖糾纒猶有故我存雲山時獨往一笑清心魂舊聞寳蓋峯氣壓羣山尊拂衣事幽討煙杉轉山根道人素所懽踴躍欣候門清眸夾明鏡耽耽老彪蹲招邀語宻室歡頰生春温往往到極則寂歴雙㤀言從今塵境空冰銷了無痕但覺江漢流浩蕩旋其源至道黙相喻不許諸方論送章孝偁歸荆南都官計用章郎中卭州人慶歴中倅延安與范雍論西事忤雍意竄雷州文正范公抗章雪其愆乃還孝偁即其孫也峩岷西南横盤石含靈光有蓄不得發澒洞難卷藏洩為萬夫豪聮翩欎相望緬懐嘉祐初赫赫都官郎蓍龜抱先識虎豹披其章幕府西陲開挾䇿驅酋羌喑啞竟莫吐反被按劍防青天徒昭昭萬里自投荒直氣終凛冽身仆心難僵髙平伊周徒奏疏排未央忠義一朝振朱鳥吞光芒還知百嵗後生此鶵鳳凰粲粲五色羽欲下虞廷翔先民重世徳君子思不忘祝君期無忝追攀軼飛揚㑹使坤南隅氣象還蒼茫次友生杜應求韻送中巖印老往成都正法原原臨濟孫一一孤峯峻舊來正法眼不許窺閫仭古路人迹絶况復遺轍軔只今誰健者公亦師子迅倚天劒氣寒掣電目光瞬平生縛虎手肯擊死蛇陣如何閙市裏撒手乃勇進前時老狐臊腥氣存已僅傾河看洗滌餘刃聊斥擯坐令㑹府地圜悟宗復振緬思中巖老今代無此雋喜聞親嫡子髙提曩真印要知天人師此位那可閏好去露鞭影廣道收駔駿睠言清浄闗莫遣衆魔磷願為一事大他物非所贐醉卧至夜半半醒中若有所愧者聞空庭石渠流水㶁㶁清亮不覺心體頓舒醉卧俱失因賦其所感吾生少懽娱遇酒増慨慷殷床惟一眠萬慮㡬消亡半夜還有覺惕然喟中膓世故何足道誠恐此志荒人生苦為樂我豈醒而狂孰為見在心勿正能勿忘涓涓石渠溜起予者卜商泠然落枕寒解渴不待甞坐令肝肺間一一流天漿須㬰四體喻髪膚了無痒夢覺與醉醒忽落俱亡羊流水去不舍此心湛如常恍疑奏簫韶儀鳳碧雲翔眷此聽愈淡杳誰見其鄉乃知天宇中一氣同蒼凉平明視渠水非笙亦非簧矢詩以自歌濁清付滄浪連州守王大寳元龜建雙溪閣於放生池上為作詩以效頌祝二流西北来東迤方茫洋斗岸蒼石裂突兀森塹防邦伯此經始華榱壓崇岡下俯古泓碧上粲新髙堂恭惟繞樞辰朱旛照滄浪銀刀決網散揺漾涵恩光冠劍擁呼舞穉耋紛歡康我亦歌且謡請祝天無疆緬思長淮北忽焉惄中腸餘黎尚網罟割烹燎其湯戢戢生理㣲豈足膏銛鋩吁嗟中道呼西江誰為揚湟流去沄沄佇立東南望安能挽溟渤一洗濡沫塲八荒共靈沼四海為濠梁帝力爾何知江湖永相忘陛下千萬夀樂愷未渠央同馮蓬州當可遊中巖分韻得林字羲和轉日轂北陸鞭窮隂天地不自持年老去如駸卉木浩萎垂江山動蕭森變化故不干樂哉此幽尋蓬州老摩詰玉齒鏘璆琳相擕亦忘言一笑孤雲岑至人鷲峯来分坐兹巖深攝衣請從之宛如在中林聊欲薦清供無物致所歆端有白月輪烱然碧潭心賞㑹詎偶然夙昔諒合簮别去莫惨惻渠無去来今當有羲黄人甞識太古音再别譙宰相逢恨不早相别苦相逼相對若無言相望恐相憶夙期夫君深寤寐先已識嵗晩飛雙鳬此地見顔色為我作眼青窈窕問心臆誰言淡如水有味寧忘得塵裏詎可堪髙才未宜抑平生趙魏優教育儻其職菁菁在中沚行矣要封植扶揺那知程聊爾六月息靜心堂曲士懐軒裳銖寸較得失紛紜戰寵辱矛盾相撞抶大方惟逹人天㳺寄虚室巻舒儻由已出處要無必時来作砭針一起當療疾時去收龍蛇夭矯自超逸隠見了無礙妙迹那可詰我公天人姿宿有補天術心縁靜見理心静與天一當年風雨㑹黄道賔出日乾坤方瘡痍塗炭入憂恤神鋒指幽燕酋領将斧鑕世數有長消忽忽謝簮韍歸来卧林藪道自無伸屈慶堂示餘彦親洒銀筆述聊遺郢人斤千載斵妙質定應山水觀中與胸趣匹仰看衡雲飛雲静山崒嵂俯眄湘流水舟楫空蕩潏可憐天東北狼煙暗鬱律神州見蒼莽悲風為蕭瑟再拜願有期經綸勿韜鬱天心酌民言公再調鼎實風霆驅八荒遊戯須一出故仁夀簿張府君挽詩覽府君事狀見其居靖康國難時讀李晟傳慷慨不覺淚下䀌然有感於中作詩哀之羊肸與鬷蔑雅好非宿敦擕手遽升堂一語不待煩物理適相感豈用䟽戚論夫君今則亡遺言空復存乃能使余悲覽之涕瀾翻曩在嵗丙午烽煙塞天閽四溟波蕩沃公方卧山樊忽撫西平傳憤悶神飛鶱尚想繡帽翁凛凛躬櫜鞬指顧還兩都筍簴安陵園唐家有遺黎不識金鼓喧掩巻淚如迸汗簡猶班痕平時閭閻中聊乗下澤轅豈知中激烈感慨在元元斯言當余意為慟聲復吞但聞神州地晝暝烟塵昏故老不可得華屋今丘墦九原儻作興余欲重與論孫叔度挽詩簡州古遺直冰雪映當代茫茫㡬回首凛凛欲無對居無屋漏愧動必繩墨内秋風看獨立縹緲一蘭佩從先大夫㳺持此儻無悔何意寥闃中值此一門再有馬誰千駟曽無徳與載富貴饕一指回首失肩背夷恵百世師曹李九泉輩丘原餘慟哭天地日蕪穢七言古詩将至江州中流見庾樓慨然有感作庾樓行江州江城赤如赭江吞孤城去如㵼忽然華楹出城角庾公之樓髙照野雲空翬飛粲丹雘樹杪鱗差排碧瓦行人轉盼居人誇云道風流有存者庾公當年志恢拓神姿從来本夷雅偶驅百萬攖虎狼反斾南歸惟匹馬如何倚欄向北顧坐俯驚湍弄盃斝豈知宗國風燈似膏盡烟空欲煨炧朅来撫事一悲慨淚落清波為誰灑細思興替總人為有昊何能擅坯冶東丁洞效江西體次知難韻洞中滴瀝㡬何深猶有太古之遺音我来一唱三嘆息闗雎之樂元非滛無聲也復鳴東丁入耳偏向幽人清端勝恵山味甘好奔走水驛煩瓶罌春晚飲西湖上歸借榻吴山睡起偶作旅愁底物堪破除閒出西湖弄妍靡蒼山為鬢水為鑑煙幕霓裳秀而綺興酣劇飲醉如泥妄意将湖比西子傍人見之為絶倒謂我愚癡長康似歸来寂歴竟何得只有熏熏黒甜美夢魂依舊過西湖潮怒殷床驚不起謁周侍郎大江之南英靈窟瑰竒萬古輸不竭往年鼓柂窮壯觀見公更覺人超越當時持橐趨明光徑度蓬山跨奉常漢儀周典一朝重斧藻皇度看翺翔只今自合補衮闕元有胸中絲五色如何一麾渺江海扶揺未嫌六月息此邦齊魯伯仲間鄉来文物餘班班天遣儒宗作邦伯風流正始應追還老稚何知但呼舞平易近民吾父母悃愊無華兩京似宴坐黄堂物安堵小人不識衝氣機况知道學窮精㣲羲文孔聖演三畫後来百代誰傳衣圖書不見出河洛禹箕九疇那復作一時覆瓿笑迂濶子雲太元亦寂寞振起此學非公誰心匠妙處璣衡齊定知數術本天授無乃太一燃青藜草元遺編當不朽還許侯芭傳業否舊来甞辱河南幸從今肯在諸生後留題丹經卷後武陵郡西桃花源水盩山厔蠻區連秦人避秦乆寓此種桃千樹春風前落紅滿地溪路斷魚郎捨舟得洞天瑞光浮動見宫室桑竹交映膏腴田蒼崖老木含太古民物朴野天理全男耕女織無租庸鷄鳴犬吠通陌阡東家西家走相問客来何許今何年歴將時事為具言二世不守嬴氏顛人心歸漢沛公起四百餘載瞞竊焉迄今已復為晉有尚何懼死長城邉豈知世態多廢興聞之撫髀皆喟然辭歸未許留數日陳列俎豆如賔筵生逢樂土自可樂山林朝市非相懸明朝棹開落塵境恍如夢破陵谷遷淵明一記故實在世俗竟作神仙傳裹粮問道不復往大笑子驥真無縁我今置酒嶂峰巔醉䄂起舞凌風煙大還有訣誰所傳始自廣成授黄髯髯龍上征老聃出谷神立説洪其源隂符黄庭龍虎經伯陽契易誠多端况復後學如牛毛支分𣲖别徒紛然先天一氣誰真知来如陽徳升九淵疾雷破山坤軸裂政要主者定力堅前絃之後後絃前藥物不可錙銖偏黒白相尋祕融結髣髴有象形質圓周天運火循屯䝉非同坡老燒凡鉛無中生子奪造化脫骨洗髓乗雲軿鞭笞鸞鳳隘八極銅駝一笑三千年胡為知此不自錬先儒甞戒偷生安人身生死猶晝夜以道順守全此天何須行怪出世法屏棄骨肉潜荒山君臣父子與夫婦兄弟朋友綱常間聖人設敎若大路反趨旁徑迷榛菅方壺員嶠渺何許徒令世俗滋欺瞞房公便合掃塵壁大書我詩為訂頑蓮峯書故宫道者丹經後作也學仙之術形容殆盡然極其説而歸之正有晦庵感興之遺意讀其詩則其學可知矣前進士信武趙繼珪䟦賀楊緜州除武陵守越王樓前佳氣浮涪翁江上恩波流㡬年結佩作邦相萬物氣吐人歌謳白鶴池邉嗟来暮武陵溪畔桃花路忽傳芝檢九天来㑹擁朱旛兩輪去轅攀蹬截無留停痒爬垢櫛待蘇酲仙人延貯一笑喜探丸付授真長生老成自合朝家用未許三刀頻入夢鶴髪行趨鴛鷺班更作吾州九鼎重送胡庭美解成都筦庫赴鳳州學官署鼔鼕鼕大府闢斂板争趨後先入歸来坐曹吏接肘簿領埋頭課銖粒學宫柳揺晝日長清風巻舒編簡香紛紛燕雀稻粱急往聴鸑鷟鳴岐陽大海水大海湯湯水所積太山巖巖雲所出飜騰一俛仰能為雨三日旱苖滋生物滋殖田夫得耕女得績式歌且謡拜手乞泰山雲勿紆鬱大海水無終極題大光寺詩寺舊有石床刹後忽不見百轉細落修蛇蟠兩間螺髻巉青巒其下碧澗流清寒天旋路盡不復去環為絶嶂凌空攅傖儜左右更折旋攝伏犀虎蹲猊狻忽然覆釡落山趾化出寳宇中平寛石床曩事知有無猖狂欲往心渺漫空憶盛時元壯觀鳴鐘擊鼓侵雲端天魔禠魄不敢干那知刼災須㬰間淒涼瓦礫荒叢菅但存四壁空青山興亡一去寧復還獨遣道者身苦難我喟而作坐長歎乞為白雲千嵗閑贈友人悼往不知籬菊芳豈知籬外逰人忙寒暄節物覆手異依然大樹堪彷徨羡君真比道州政間飲醇酒南山陽遥想文殊造摩詰元妙深談舌廣長中道相呼互濡沫相忘各適遮無傷要知風鬟太華女夫豈秋思悲空房智拙方䟽漢隂圃才多端謝鼂生囊青天自不憎白眼好在宗之快舉觴

body:
  text: 蓮峯集卷五宋史堯弼撰私試策君臣遇合乾健乎上坤順乎下明良之會乾坤之義也乾坤一於生而以氣相合則萬物育矣明良一於治而以道相與則天下定矣故乾坤之相合貴於久而不息一或息焉則萬物不得其育明良之相與貴於久而無間一或間焉則天下不得其定久而不息則萬物之生無已也久而無間則天下之治無窮也是知明良之會乾坤之義蓋有自然一定之數存乎其間而豈可易哉古之聖人深知乎此也故凡所以遇其大臣者崇之以天下之髙位而不以為泰畀之以天下之重柄而不以為專異議之不搖讒間之不入猶以為未也吁俞以盡其謀賡歌以交其歡欲其久而不厭也古之大臣亦深知乎此也故凡所以事其君者與之靖天下之變而使之安任天下之繁而使之逸夙夜而不辭勤勞而不倦猶以為未也為之典章以求其傳為之制作以成其化欲其治之久而不已也凡為此者豈特以致天下之治而已哉將以正夫乾坤之義使其久而不息者當如此也三代盛時其明良之間大抵皆然而未有若成湯伊尹相與一德之際深得乎此者何則湯以一德而為之君尹以一德而為之臣而乾坤之德固已合矣故湯之舉尹也選天下而舉之舉商邑而聽之隆之以阿衡之名吾之所以取平者惟尹之信也付之以革夏之事吾之所以救民者惟尹之望也當此時天下之事一則伊尹二則伊尹而不敢二也此無他乾之所以合乎坤者其道當然耳而尹之相湯也始與之載自亳以除天下之暴終為之宅九有以成天下之治其任至重而不為之憂謂其責在我而不敢辭也久居其位而不以為勞知天下之望我而不敢逸也自幣聘三至之初至咸有一德之日亦久矣未嘗一日忘天下也此無他坤之所以承乎乾者其道當然耳蓋尹之為相幾五十年而湯無纎芥之嫌尹無告勞之意此非乾坤之義久而不息者歟其德至於格天其造商之業至於五百有餘嵗者用此道而已然則尹湯之所以為盛豈非深得乎此哉恭惟我主上專任相臣以乘中興之運既深得乾坤之義而逺軼尹湯之隆未有如今日之盛者也兹承明執事下詢欲講求漢唐臣主難遇之因鋪張今日君相同德之懿此千載一時之遇其可不揄揚以為萬世之休哉彼漢唐之事董仲舒陸贄之不逢已無足言而賈誼之才宜見用於文帝而不用裴度之功宜有為於文宗而不為其難遇之因有不得不論者且文帝承髙惠之後海內方離戰國之苦而始獲一旦之安方當舉畫一之法尚清淨之治內因漢家之業而外結胸奴之好誼當此時宜有以贊文帝休養生息之德而乃以一時之鋭氣處士之大言欲係單于之頸笞中行説之背更已定之法改火德之王其説之不可用亦明矣然則文帝之不用誼無足怪也文宗承穆欽之後兩河三鎮之間悍將強藩節麾之自專號令之不稟為文宗計者宜乘太和之盛專任威德之臣以振朝廷不振之勢而制諸鎮莫制之患亦不可緩矣而乃信牛李媢賢之讒從閽寺自恣之計使元勳巨德之臣去京師之重而從外鎮之逸其用賢之心亦可謂不固矣然則裴度之不留亦無足怪也是坤道貴靜而賈誼則失之疏將何以事其君乾道貴健而文宗則失之懦將何以用其臣不然文帝豈棄賢之主而裴度豈真忘世之士哉嗚呼文帝有可為之資而誼不得事之之道裴度有可為之才而文宗不得用之之術無怪乎明良之難遇而至治之難得也此君相今日同德之懿所以冠壓百世而獨為盛歟竊以草野之中窺天地之大日月之明而知之矣我主上之任相也知之甚深故浮議不動任之甚專故重權不分嚴之以師相之尊大之以兩國之封表之以繪像之贊然猶若報功之未盡也而吾相之事君也還東朝以成孝治息干戈以全民命收兵柄以尊朝廷建太子以作人才禮樂文章粲然大備然猶夙夜而不倦也然則一德之盛舍尹湯其誰配之嘗觀咸有一德之篇於至治之後方將丁寧申敕以終始日新為事將久於一而不為二三之德故其書至於列之誥訓為萬世法則今日之盛宜有以作宋一經垂於無窮以見乾坤之大罔俾一德之篇專美有商也賦役三代之法至成周而備成周之法得周公而定夫周公所以定周之法而使之備者豈有異術哉舉天下之法至纎至悉盡歸之於中正重之而不加毫釐輕之而不損錙銖如斯而已矣是以其養民之政雖若甚繁而不亂其救民之制雖若甚悉而不傷田各有制賦各有等役各有差取之有時故用之有節司之有官而行之有序又安有作法之弊哉故行之當時雖循其舊制猶可以為國而施之後世雖祖其遺意猶可以為治也且其取民之賦園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯漆林之征二十而五然猶太宰得以總其計小司徒得以經其土載師得以物其地惟恐民之或困也夫是以雖取之而不以為貪其役民之力上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人然猶司徒得以稽其民均人得以時其力卿大夫得以辦其全惟恐民之或怨也夫是以雖役之而天下不以為勞然則周公之法其本於中正者其詳如此宜其後世數百餘年春秋之際晉楚齊秦之強兵無嵗而不交會盟無嵗而不講然其所居之國猶周之地故所役之兵猶周之民其兵皆藏於民出則備行陳入則散於田野是以未嘗無事而聚亦未嘗無事而食非若後世之民兵開口以待縣官之哺則其兵雖用而費不若後世之夥而况齊晉擅山東之饒秦擁陕西之富楚得東南水國之利加以管仲通魚鹽以斡其利秦穆公霸西戎而資其富魏絳為政於晉孫叔敖為政於楚皆能裕其民而使之不困其所以興作甚多而不聞有財殫力屈之弊豈亦由此也歟若夫鄭區區之國北通於晉南通於楚二百四十二年之間凡晉楚之戰鄭必先受兵焉故常惴惴然束幣篚玉以待命於郊者嵗無虛月月無虛日疑其不可支矣然而國小而易令民寡而易集雖受兵於外而中不失其所以為國之計雖應役於晉楚而皆有常數而不紊况以子産之徒執其政養民以惠使民以義宜其驅之無不率令之無不順也故雖作丘賦然以聽之田疇則周公井邑之制宛然其猶在是以加少而不至裒取以為無窮之患斯其所以輿人誦之封內大治者蓋亦由此也歟以此觀之周公之治後世慿藉以為國而其效尚若此則其法之中正無弊可知矣彼漢唐之時賦役之制如漢髙十五而稅一如漢文一男三年而事如太宗租調之法受田者為租丁嵗有粟稻之輸而用人之力嵗二十日雖各出一時而初不外乎周公之遺意也我國家往者多艱之初賦役雖久加於昔然比年以來廟堂軫裕民之念減月樁而兩浙荆湖遂絶科抑之患除廣西布估以蘇嶺嶠僻逺之民蠲免租稅于荆揚而田之荒斥者無虛額之稅分屯漢上之兵而蠲蜀民饋運之費而比又亟申徭役之禁所以阜民財裕民力者如此則主相恤民求治之意至切矣可不講求郡縣之弊以仰副宵旰之念乎若夫戍兵冗官之費可省則省之核其實數而使之不濫斯可矣將帥邊鄙之給可損則損之計其實用使之不費斯可矣浮屠道宫之入可收則收之計其入使之不失斯可矣如此而民之財可豐也抑工賈之末不若禁其無益之貨汰佛老之徒不若清其披度之源糾遊手之惰不若加無職之民以夫家之征如此而民力可紓也能考之以周公之法酌之以中正之意何施而不可哉苟足以利天下則行之又何疑焉今朝廷方致成周泰和之治廟堂之上必有舉周公中正之法而措之天下者矣愚不敏何足以知之姑以此塞明問漢劉歆作三統歷譜以天地之數五百一十三年謂之會四千六百一十七年謂之元九會而後復元一元之間災嵗五十七而隂陽有三五七九之厄自入元而有陽九百六之會其後谷永於成帝時述災異遂因百六之會而陳三七之戒至光武中興世俗多言讖法而或者又因三七之戒而言四七之主如三者之論其有考而言耶其無考而言耶聖人之垂教有先天而言者有後天而言者先天而言則詳天道而略人事後天而言則詳人事而略天道詳天道而略人事此以天道而禁人之所為也詳人事而略天道此以人事而戒天之所為也禁人之所為者禁於未然之前而戒天之所為者戒於已然之後故禁於未然者有不敢為而戒於已然者有不復為此聖人之垂教吾昔於書與春秋而見之曰雨曰暘曰燠曰寒曰風此上天之事也而皆起於視聽言貌之間嗚呼豈視聽言貌之微足以致上天之變哉蓋聖人先天而立教以為如是則雨如是則暘如是則燠如是則寒如是則風欲人君先事戒懼恐悚修省而不敢或為一不如是則上天譴責必有大禍此洪範所以詳天道而略人事禁於未然而人不敢為故歟曰日蝕曰星殞曰山摧曰川竭此亦上天之事也而聖人不著其所應嗚呼豈災異之自來而無以致之者哉蓋聖人後天而立教以為如是曰日蝕如是曰星殞如是曰山摧如是曰川竭不復附會以著其變欲人君因事戒懼恐悚修省而不敢復為一不如是則災禍繼致不可復逭此春秋詳人事而略天道戒於已然而人不復為故歟嘗怪劉歆作三統厯於天地之數五百一十三年謂之會四千六百一十七年謂之元九會而後復元一元之間災嵗五十七而隂陽有三五七九之厄自入元而有陽九百六之會其後谷永於成帝時遂因百六之會而陳三七之戒光武之時或者又言四七之主嗚呼若三者之論其有考而然耶其無考而然耶愚謂劉歆先天而立教則不言其所以致之之由若後天而立教則其以一世之人而決意明言數千百年之後於前則無所考於後則無所據亦是妄言而已矣如歆之説是使人君於人事則不修於天變則不畏推之於無可奈何之鄉而曰數已先定非區區人力之所為焉然則殘教害義莫此為極故無取於聖人之門焉大抵漢自仲舒倡為災異之説而一時之士從而和之迂若劉向僻如京房狂如眭孟夏侯勝怪如翼奉李尋誣如杜欽谷永皆弊精神勞心術於天命之間終其身而不知厭焉至如劉歆特又甚焉者一為其説而王莽遂以符瑞自立睥睨漢鼎而窺之豈非劉歆之徒有以啓其志耶推乎此則虀粉其骨不足以謝天下矣六韜與詩書異愚嘗讀漢史至張子房傳觀良之為人畫隂謀則不如陳平善征伐則不如淮隂攻城野戰則不及曹參供餉給饋則不如酇侯然卒能掉三寸之舌為帝者師封萬户侯而四人者不及嘗讀至此未嘗不歎惜也及推考其事然後知漢之興皆子房之功焉何則始良起下邳有一父老授以兵法曰讀是則為王者師良視之乃黃石公之三略也故髙祖用之以西定關中南取蜀漢約三章誅暴秦破強項而天下服其仁義解鴻門之厄陳灞上之師裂韓彭之地散垓下之卒而天下服其權謀雖曰髙祖之治而實留侯之策雖曰留侯之策而實出於黃石公之書因徐考三略乃知上略設禮賞别姦雄差德行審權變下略陳道德察安危仁義權謀之道相為表裏參用之黃石著之於前子房行之於後皆二道之相濟也幸承師問請因是而論太公六韜之法焉嗚呼郁郁乎洋洋乎洸洸乎周文王武王之治也紀於書詠於詩雜出於傳百家之言昭如也有道德焉有仁義焉有禮樂焉有教化焉有法度焉其休功駿烈裕如也其深恩美澤藹如也其典章文物燦如也其紀綱制度炳如也其所以治天下之法何其仁其所以除天下之暴何其義雖寥寥千百載之後可端拜而議焉然尚有可疑者今兵家者流有六韜之書文武太公答問之辭也有文韜有武韜有龍韜有虎韜有豹韜有犬韜自文師至戰步其二君一相軍旅答問凡六十篇以至兵車樓櫓糧草器械山川險要風雲天象無不備論而詳説其間又雜以權謀之言夫詩書亦文武之書也六韜亦文武之答問也何六韜與詩書相反戾之若是耶豈文武之功兼權謀而用乎抑非太公所作而後世好事之人妄傳乎試折衷之夫仁義者常行之道權謀者輔助之術時可以用仁義則用之時可以尚權謀則尚之譬如造大厦焉其柱石棟梁既已具矣而榱椽楹桷亦存之豈以其微小屈曲而遽廢其用哉仁義者棟柱也權謀者榱桷也兩不可廢也然而仁義為其本權謀為其末是故三代之君有以行仁義之兵而亦參用焉何者成湯之伐桀民有來蘇之望亦可謂仁義之兵矣然湯誓之篇乃曰升自陑而孔安國謂從陑出其不意則權術亦用焉商髙宗伐荆楚克鬼方與天下除殘暴之害豈非仁義之兵乎而商武之詩乃曰罙入其阻而鄭康成謂冒入其險阻則權術亦用焉周宣王內修政事外攘夷狄勞徠萬民豈非仁義之兵乎而常武之詩歌曰如飛如翰而鄭康成以謂嘽嘽然疾如飛鷙如翰則竒兵亦用焉蓋其以仁義為本而以權謀輔之焉推是三君之事則文武從可知矣今取六韜之書而觀之無非出此也蓋王者之兵專用仁義故必進賢退不肖以清其源賞功罰罪以修其政利而無害成而勿敗惟以愛民為心此仁義之術也不然何以六韜之篇獨首之以仁義耶及不得已而用兵方且選將練卒料敵應變上得天時中得地利下得人和深思而熟計之此權謀之術也不然何以隂符之篇獨首之以權謀耶則其兼而用之亦明矣噫向使文王武王非仁義則何以退修文德崇虎來降八百諸侯不期而會雲合響應哉向使非權謀則何以破牧野之旅降崇墉之人哉意其必出於太公之言也夫兵凶器也戰危事也戎國之大事也故古人必審謹而用之一舉而有功則禁暴除亂安民和衆混一區宇一怒而安天下之民用而無功則海內虛耗人民流離大兵之後必至凶年而民受其殃故善人教民七年然後即戎蓋如是審也文武當虐君之時思欲有以拯天下之溺而除天下之殘然而知兵之不可輕用也故丁寧反覆問於太公詳悉細究知其必然故方舉兵以除暴孰謂六韜而後人妄傳乎仁義譬之五穀可以養生而不可以伐病權謀譬之藥石可以伐病而不可以養生文武之時海內未寧知權謀之可以伐病也故以仁義為本以權謀為末而參用之及天下已平四方無事知權謀之不可以養生也遂偃武修文歸馬華山之陽放牛桃林之野干戈包以虎皮將帥使為諸侯示天下不復用武亦六韜之微意也自斯以降宋襄公棄權謀而行仁義故卒敗於泓秦始皇捨正道而專詭譎故二世而亡向使二君知太公之書仁義權謀兼而用之則烏得為三王之罪人乎惟張子房之用黃石亦可謂造其閫域矣承學荒殘姑誦所聞以塞明問幸執事裁之伏羲神農黃帝堯舜之君不忍民之無知而惡其無以别憂其無以生是以為網罟耒耜衣裳舟車杵臼弧矢宮室棺槨書契凡若是者一切便民而近於人情若夫秦自始皇廢封建破井田置𨽻書以更大小篆為紙以易簡策後世遵之至今未已斯亦便民也何帝王則聖賢稱之以為變通之利而秦則論者諱而不言知經而不知權則其失常在於樂因循知權而不知經則其失常在於樂更變此古今治亂之所由也古之人君雖樂於更變而不失為盛帝者知經之由也後之人君亦樂於更變而不免於滅亡者其不知經之罪也愚嘗為之説曰有天下國家者當在於守經而達之以權蓋經非權則泥權非經則悖二者相資而相成苟經之失則權雖有取亦何以為治也哉孔子於繫辭序十三卦皆伏羲神農黃帝堯舜之為制愚與其知權也惟數聖人能守之以經故可以為治焉降及後世秦皇帝變往古之制以行便民之法愚亦與其知權也惟秦皇不能守之以經故終不免於亂焉嗚呼知其全則昌得其一則亡此秦之知權與上古同而所以異者其不知經常之制也竊觀包羲之世無網罟之用而於是為之結繩神農之世無耕耨之利而於是為之耒耜無為市之制而於是為之聚貨黃帝堯舜相繼而起垂衣裳而治天下作舟楫以濟不通服牛乘馬重門擊柝杵臼以為利弧矢以為威造棟宇以易古者之居作棺槨以異中野之葬為之書契以代結繩者皆伏羲神農堯舜之為也嗚呼可謂不知權乎然其所以治天下者皆五常之道也皆相授之制也曷嘗作為聰明而失於不知經者乎此所以為孔子之取云爾秦始之興其英邁過人之才似可以為治其廢封建置郡縣此皆可為而始皇勇為之而井田之制與封建相表裏封建廢則井田不可以獨存由是阡陌開焉夫封建廢而郡縣置井田廢而阡陌開創𨽻書而易小大之篆為紙而更簡策之繁斯皆始皇以英武而作此偉事也人皆曰簡便之路秦實啓之而不知公天下之端柳宗元以為自秦始者亦非過論矣嗚呼亦可不謂之知權乎然而其焚先王之書銷天下之兵尚刻削之政者豈非其騁一人之見而廢萬世經制之法乎此後儒之所以去之云爾夫上古知權而守之以經故治始皇廢經而達權故亂何足怪哉然愚於始皇有所深取者以其可與權而有所深恨者以其不能守之以經故也或曰馬遷謂三代之政若循環周文矣秦救之捨質故亡矣數者何足取乎愚曰壯士不復幼東水無復西秦之簡便施之於夏商之世則不可若以之救文之弊得其宜矣今欲得以質而救之是猶使壯士復幼而挽東水以西之者亦難矣故愚於此以馬遷為庸士而始皇之權可以為後世法或曰何其亡乎曰不知經元結陸贄言論揚子雲漢末大儒也作法言以凖論語大抵商略古今人物少有許可至論唐虞人材則曰臯陶以智為帝謨論後世之事君則曰謨合臯陶謂之嘉夫自堯舜至於西漢之末凡數千年豈無一人翹然獻忠贊襄彌縫以為後世之法哉子雲孜孜臯陶以為臣子獻言之模範者不為無説也愚嘗反復而論之熟矣蓋太上有立德其次有立功其次有立言立德之士鮮矣士之生於世當佐人主興衰撥亂以立非常之功苟為不然則必鋪陳利害條别是非明當世之得失而補人主之缺焉觀堯舜之時在廷之士如禹稷如益契或以治水有功或以播種有功或以敷教有功獨一臯陶者碌碌諸子之間若無能為然舜以不得為已憂者誠以其謨可以治天下國家也考之於書臯陶謨之所載不過曰在知人在安民惟帝其難之知人則哲安民則惠黎民懷之而已然則揚雄孜孜取之者豈非美其知人安民之策乎其後如伊尹之訓太甲傅説之誨髙宗周公之戒成王無非以此為念也三代而下獻言之士雲集霧合不可勝數獨李唐三百年間有可采者何以言之隋失其鹿太宗舉晉陽之網而羅之當此之時咄嗟叱吒所向無前人皆以為太宗能創業矣殊不知一不從魏徴十漸之戒唐何能興哉蓋十漸之戒不過譏太宗之逺君子近小人是不能知人也譏太宗之奢肆勞役是不能安民也宜乎太宗聽之貞觀之治寖寖乎成康之際歟女武為亂明皇提戈藩邸之中而剪除氛亂遂即帝位當此之時人皆以明皇能守文矣殊不知一不從姚崇十事之訓唐何能治哉蓋十事之訓不過陳祿莽閻梁之亂漢欲明皇之知人也不以峻法繩下而願政先仁恕欲明皇之安民也宜乎明皇從之開元之治巍巍乎文景之上歟然則唐之所以創業守文者皆由魏徴姚崇能進知人安民之謨而太宗明皇傾心聽之之效耳夫以祖宗創業守文皆由於此後世子孫欲中興王室者豈外是哉自安史亂天下肅宗幸河東於斯時也攻城陷陳折馘執俘專閫外之寄者郭子儀李光弼之徒是矣元結之於肅宗初無肺腑之託也特以當天下擾攘之時自揣其才智不足以立功於當世於是三篇之時議上焉自涇卒犯京師而德宗狩奉天於斯時也陳師鞠旅備禦盜賊以清一時之難者李晟渾瑊之徒是矣陸贄初無葭莩之親也特以當國家艱難之際自度其智慮不足以有為當世於是數篇諫論上焉然結之所陳不過數百言贄之所陳無慮千餘言其文簡嚴峻厲汪洋大肆為能切中當時之利病大矣哉雖臯陶之嘉謨魏徴之十漸姚崇之十事其知人安民殆未能逺過也請撮其機要而言肅宗違李泌河陽之謀而不能從任諸將征伐而心懷猶豫是昧於知人矣安史之亂來歸者戮於獨柳之下待罪者斃於縲紲之中是昧於安民矣故結之所陳不過言將士臨敵而奔賢人君子遁逃任賢人斥小人乃帝王之常道其知人之謨有如此者國家失於太明太信故力役乞丐凍餒不足蒼生危窘貧獨流亡其安民之策有如此者德宗任盧杞之姦邪盤固如山禍亂屢作而猶且不悟知人安民果安在也故贄之所言以致冦為羣臣之罪納諫為帝王之德一酬一詰未盡臣下之能君子小人必辨明而精審知人之謨孰能出其右哉斷失於太速察失於太精寡恕多猜禍難滋至必使潤澤洪而人心悅安民之謨孰能出其右哉嗚呼二子所陳分别利害條陳是非載在青史炳若丹青有不可掩者然撮其大略不過知人安民而已譬如兵家之書千章萬句不離乎多方以誤之之一句耳使肅德二君皆能虛已聽納以成中興之功顧不偉歟恭惟主上撫中興之運禍亂之變又甚唐室之季然則知人安民之謨誠今日之藥石也天下之士蒙被朝廷教育者久矣行將淬礪詞鋒展摩天徑翮效一鶚之高翔然後伏劔束書直扣天閽吐胸中之所藴如元陸鋪陳安民知人之謨期不負所學而後已不識先生以為然否歷代之君或以功或以德而受天命也然班彪作王命論以為出於天命唐柳宗元作貞符書以為由於人事何耶嗚呼天人之際未易言也人事得則天命歸人事失則天命去是天命即人事也人事即天命也豈人事之外别有天命哉愚嘗持是説以觀歷代數千百載間上自唐虞下迄五季凡所謂盡人事以祈天命者不過德與功而已有德以受天命唐虞三代是也有功以受天命漢唐是也若夫魏晉而下泯泯棼棼例無功德天命亦從而去焉夫受天命以德則以位相禪而天下不以為私以兵相攻而天下不以為暴此無他天地有奉生民有庇也故亂而復治絶而復續必數百年而後已焉以功而受天命則布衣崛起而大業不難成仗劔請命而大勳不難集此無他亦天地有奉生民有庇也故亦亂而復治絶而復續數百年而後巳焉若乃無德與功而欲竊上天之命則近不過於數十載逺不過於再傳安能綿綿不替如瓜瓞之詠耶請試言之堯繼嚳而黎民臻於變之風舜繼堯而天民蒙垂拱之治揖遜之德為如何也夏之有天下始於嗣舜而傳世十有六王商之有天下始於克夏而傳世二十八王周之有天下始於伐商而傳世三十六王繼述之德為何如也故曰唐虞三代以德而受天命者以此春秋之後六國爭雄至秦并之而不能守漢髙祖起自豐沛乘秦之亂雲合響應八年而天下為漢傳世二十五歷四百年有功於民可知也典午之時南北分裂至隋并之而不能守唐太祖起自晉陽乘隋之亂席卷長驅六年而天下為唐傳世十八歷三百年有功於民可知也故曰漢唐以功而受天命者以此若夫漢之後而有當塗之魏以至楊氏之隋唐之後而有朱氏之梁以至郭氏之周雖各得正統年號之紀承承不替然取以權謀則人復以權謀取之此魏晉宋齊梁陳隋是也取以詐力則人復以詐力取之此後梁後唐後晉後漢後周是也大抵紛紛籍籍代雌代雄故曰無德無功天命亦從而去焉國家皇天眷命厯數過於漢唐藝祖開基受禪同於舜禹削平僭叛混一海宇則有德於天下有功於民未可量也肆及主上運遭艱難未克復平或者歸咎於天故執事作為問目以班叔皮王命論柳子厚貞符書下詢諸生愚敢不罄所聞以對夫怪力亂神之事聖人之所不言圖讖符瑞之學君子之所不取若叔皮作王命論是特知髙祖之興五星聚白蛇分而不知誅秦滅項約法三章則有功於民而後受天命者也以是觀之叔皮雖世掌史書豈為無失乎然所可為今日道者非柳子厚貞符書而何觀其痛隋氏之虐嘆大聖之起如三代受命之符一切非之其言曰德紹者嗣道怠者奪豈非以功德為人事耶豈非以人事為天命耶推此則今日之事不過修祖宗之德復祖宗之功彼區區敵國不足患也雖然或者有曰關中天府之國四塞為固王不得不王霸不得不霸愚謂不然創業之君先定於關中人心所係可以卜天命之去就焉若乃中興之君既能慿藉祖宗之功德則關中不患不能取也何哉髙祖之興與強楚相抗者屢矣論強弱則楚強而漢弱論勇怯則楚勇而漢怯是以不知人心孰歸焉天命孰與焉不得不先定關中以卜漢楚之廢興也故先入關中而強項遂滅四百年之漢始定於此太宗之興與羣盜相持者亦屢矣論強弱則盜強而唐弱論勇怯則盜勇而唐怯是以不知人心孰歸焉天命孰與焉不得不先取長安以卜唐盜之存亡也故霍邑一戰而老生就擒三百年之唐始定於此若乃光武之起不過延攬英雄務悅民心以復髙祖之業而已是雖決策河北而其後果能安集關中以成中興之業焉肅宗之起亦不過治兵討賊委任將帥以復太宗之業而已是雖即位靈武而後果能恢復兩京以造中興之業焉故曰中興之君既能慿藉祖宗之功德則關中不患不能取也我主上聰明神武漢光武唐肅宗之所不逮也則所謂功德固已萬萬於漢唐二君則朝廷之上豈無如馮異輩安集關中乎豈無如郭子儀輩恢復兩京乎愚庶幾尚及見之採托漢唐以來時君世主號令文章所以感動人心者以形容今日制誥之美焉昔魯君過宋都呼垤澤之門守者曰非我君也何其聲之似我君愚於詔書亦云蓋自古仁聖之君發一德音下一制令其所以感動人心使天下樂聞而喜見之者皆相似也如三代之君為訓誥誓命周詳委曲通上下之情開生靈之惑或導利除害或去危就安或立法審令或遣使誓軍當時翕然而奉之後世欣然而傳之讀誦流布爛然百篇之書播在人口為萬世法夫豈必區區類舉而後足以為今日獻哉請獨借兩漢而論之髙祖之初興其制詔之可以上擬於三代者屢矣然末有善於約法之詔也其言曰凡吾所以來為父兄除害非有所侵暴何其言之足以感動人心至若是耶當時秦民必有至於流涕者矣向試使陳涉項羽發號施令無是言也髙祖之興諒由是哉光武之中興其制誥之可以擬三代者亦屢矣然未有善於舉賢之詔也其言曰吾德薄不明冦賊為害強弱相陵何其言之切直至若是耶向試使王莽更始發號施令無是言也光武之興亦以是哉雖然非特此也又有愈於此者唐德宗中興陸贄為教令而李抱真為帝言山東士卒聞之感激思奮臣故知賊不足平武宗中興德裕為詔書王元逵等得之皆震恐思效已帝每稱魏博功則顧德裕道詔語言甚切於事而能代謀夫如是絲綸一出而感動激昻歡欣鼓舞萬口一辭豈非有以順人心之所在切其情之所宜而然乎恭惟主上稟帝舜之孝思躬文武之純德所任者皆髙宗之佐所修者皆宣王之政重以側身修行夙夜匪懈仗順舉義將欲回北狩之鑾輿復先聖之境土乃者發德音下明詔撫慰士民激昻在位孝悌之義稟於天性而見於言辭恤民之意出於優為而發於文章三代誥誓無以加矣如明策所謂更生之喜創見之歎誠不知其幾何也恭承明問諸生採托漢唐以來時君世主號令文章所以感動人心者形容今日制誥之美夫贊揚盛化末學鯫生殆不足以措手然敢不竭愚見以道其一二焉竊嘗聞漢唐之世王言詔旨不下千數固有足深嘉者以愚觀之皆未足形容今日請得以我藝祖故事而證之乾德初王全斌討孟昶先皇帝覺寒而念征蜀將士遣使賫詔勞全斌等三軍之士皆致感泣已而蜀平嗚呼此其言之足以動人心激昻忠義之節古未有也我主上乃者下明詔所以感人心而激忠義者豈特漢唐之比哉蓋所以祖述三代之憲章藝祖之故事也夫如是乾德之成績不逺而全斌之忠節有繼矣中興之功愚將拭目而見之

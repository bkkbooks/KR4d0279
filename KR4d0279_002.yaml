body:
  text: 蓮峯集卷二宋史堯弼撰五言律詩癸亥秋陪張丞相逰西湖和周去華機宜韻二首天上辭魁柄拂衣巖石間乾坤雙眼靜日月一身間目極朝東水心懷直北山應憐沙際鴈亦解向陽關幸陪雙絶巘偶念莽蒼間野旱經時赤行雲盡日間蕭蕭看脫木悄悄對空山幾欲兼忘去江湖獨往還重題湖上林端落照盡湖上逺風清水榭芝蘭室仙舟魚鳥情人琴何寂寞煙月足平生一泛釣璜處再吟鏘玉聲白雲閣閣虗雲出沒雲閣兩無心旌斾千山立笙竽萬籟深相君聊暇日藍輿得幽尋徙倚天東北狼煙猶爾侵送青神宰樊允南解官次杜應求韻折腰真漫爾掉鞅忽班如心委身來去人懷政卷舒宦逰三釡計臭味一編書此道儻同趣何曽有别歟簿領侵尋地淹留寄此鄉相逢談笑共不覺嵗年長物色重陽近秋髙萬象藏賦歸三徑裏籬菊有餘香從昔安平易無心問疾遲才知中自守不逐世多岐赫赫寧期譽悠悠去有思豐碑人口是看取祖行詩並轡中巖寺芳樽一破愁更寒談衮衮雲曉玉浮浮會有相從樂還如此地不合離真有數那敢作人謀舟過黃州上赤壁因懷東坡偶題赤壁今朝過蒼梧幾日期天旋疑水逺風怒恐檣危斷岸餘千丈英雄只一時多情雪堂老月白夜探竒黃雀餉隱者文素翁其人有天文歷數之學珍重文夫子山林日月長談天鄒衍口痛飲伯倫鄉宴坐看飛動相呼死稻粱黃腴風味好聊足薦君觴古松人之生也直此物自長年霧雨晦深谷風雲乘半天扶危正須爾得道亦超然慘淡空回盼長吁立暝煙贈别江湖聞逺役風雨弄扁舟邂逅逢吾子周旋寫我憂雲瞻三峽晦波動五湖秋恨别休驚鳥相忘已兩鷗天地有佳處岷峩橫翠微茅廬介山趾嵐色入書幃共社公應可論心我亦稀他年能似約江漢會思歸送譙允蹈解青神赴永康學官二首簿領塵埃地淹回嵗月闌青山應有素去路肯留難吏隱寧官冷心清則體胖不嫌時拄笏三十六峯寒亦有淡臺者時升單父堂匆匆能幾見忽忽兩相忘明日舞雩地薰風編簡香䇿勳歸聖域此道久微茫挽故眉守張廷琛伊人湖海士夙昔想風流決䇿元戎幕宣威塞北秋分遼空往恨保蜀尚前籌落寞三刀夢真成取次休碣石崢嶸嵗何如扣帝閽狼煙今晝晦鯨海正波翻遺恨公流涕當時獨抗言荒阡新宰木誰酹曲江魂公嘗論燕山事公典吾州日人懷不忍欺轅攀那復得巷哭竟成悲外祖松楸在空山草木萎魂逰儻來否尚作凱風思挽宋邑宰充宇蠅頭字寒更豹體膏當時書鴈塔晚嵗試牛刀便作泉臺去難酬雪案勞鳳雛家學在飛翥看秋髙楊夫人挽詩奉嬪歸盛族觀奠及遺芳藻巳空南澗萱應茂北堂人間空墮驥地下復鳴凰慘慘聞吹棘紛紛想斷腸挽程淳老宣和全盛日經略府潭潭智出人千百時資䇿二三福星須爾往邉瑣定誰堪幾輩能華髮猗歟北斗南戒定通前念蘇黃早見期源流知衮衮金印漫纍纍白首風塵外丹砂嵗月遲泉臺無復恨喬木有餘悲挽劉中逺侍郎神主多艱日歸安九廟中忌才終引去退卧敢論功未省真忘世嘗疑數悟空欲咨黃髮老几杖合扶公精神曽感會帝念老臣餘內閣升嚴直褒章賜命書同時那得有回首却成虛露電從渠過吾逰自物初沄沄緑水邉丈室一蕭然顧陸留青箬宗雷老白蓮研朱看點易搖塵聽談玄忽忽風流盡長懷晉宋前故國餘喬木蕭條今作哀舂容思曩昔懷抱復誰開浩劫真難詰微言不重陪未忘吾里在華表一歸來挽虞齊年運使曩把司農節蠲民百萬資公今隨夜旦誰與療瘡痍貯羡時包匭槌人吏剝肌九原難再作墮淚閲豐碑吁嗟先晚季寂寞慨前修斗仰公無幾雲披我末由扁舟方楚越華屋已山丘耆舊襄陽盡歸來涕欲流孫致平尊人挽詩再見書樓氏風流繼六賢素輕千户擬還守一經傳好學嗟亡矣傷心為䀌然郎君今二妙早晚慰深泉七言律詩離臨安道中有作拂袖歸與喜欲奔回瞻不覺鼻含辛有情猶作遲遲去何事空餘咄咄頻潁水舊來堪洗耳西風當日苦多塵人間觸處皆宜隱不必桃源始問津師伯渾至青神約訪而潛歸以詩相别因戲之開門脫豈非癡空費追亡急作詩雪月會知思戴老棗瓜方欲問安期夢魂莫逐人千里遙夜還同月一規此去相過吾得計定應掎角待伊尼胡氏舊逰臨行贈别二章孤枕懷歸夜夜傾閉關猶作旅人行絶知半路能逰客難忍終年欲别情雪裏梅花逢的皪風前木葉任縱橫一鞭明日三巖路可是泠然馬足輕妙契還從蓋始傾無言與共四時行可堪嵗晚倉皇别多謝詩來繾綣情最喜伊家三樹秀故應我輩一經橫人間定價如金玉入眼那能較重輕挽彥承知監蚤年獨出棄繻關肯作轅駒老故山澒洞煙塵嘗解難從容矢石敢投艱尚餘長短蘇張術不值風雲楚漢間還想湖湘對床酌淚滂原草不勝斑程隱君挽詩武陽昔有埋輪使慷慨風聲今未休此老典刑餘故國鄉來儀槩動殊州曽無遺憾登三夀忽遁優間卧一丘招以哀詩追楚些未忘吾里尚魂遊挽李提刑久善絶知嗣法一枝香作意開堂嗣雪堂早悟錐沙傳筆畫旋收珠玉入詩囊卷藏人閟龍蛇字炳蔚家餘虎豹章衣鉢兩郎公不恨班班文物未淒涼大江南畔按澄初兵弄潢池悉就俘坐使奔鯨無脫網當時懸鼓不鳴桴後來盜起螺川震却恨公歸蜀道趨但使國僑長在鄭定知賣劍化萑蒲曩持玉節問痌瘝邂逅南昌一解顔親見瘡痍摩手拊夜深父子短檠間行裝約束有琴鶴道力較量無素蠻自合明光將劍履如何零落遂丘山夢寐平生杖屨從慣看髙論吐長虹滕王閣畔樽罍共房琯湖中嘯詠同忍鄉西州悲謝傅空期斗酒酹橋公緘詩髣佛招英爽淚濕西風未有窮挽邑令王公君家家學有傳衣事業如何只漫違九萬鵬程終莫上一雙鳬舄嘆頻飛空傳是處棠隂布倐作朝來薤露稀楚些莫愁招不得山頭騎鶴看來歸挽湔江令何公家在岷山第一流世收科級萬人頭同時看接才華盛大夢真成頃刻休尚憶依蓮王儉逸空傳治縣次公優茫茫螻蟻王侯盡六六峰前汗漫逰五言絶句題無熱軒飲水不救渴利害成火攻那知在人世長夏有清風竹齋樗櫟雖不才亦各言其長愧此萬丈夫寐卧無何鄉山齋禱公一邱壑何似東山起可憐丹青手置之巖石裏醉石有時醉濁清隨意眠小大何須酒池中始了一生課三老亭可憐商山樂黃綺不同歸聞公有二老晚節自離竒寓齋莊生十九言妙處如筏喻我欲問公居公心無所住李文山讀書堂堂上中聖賢心醉百不理堂下笑糟粕未知其趣爾叢桂秋風芳桂叢的皪好顔色乃公欲盤旋戒子勿剪伐泛宅四明有狂客歸計亦風流好激鑑湖水泛君天上舟棗后皇有嘉樹剡棘森自防安得上摘實貢之白玉堂柔桑陌姑待三年采聊為卒嵗謀可憐齊魯俗乃欲比封侯虎川暴虎須袒裼馮河必褰裳想公川上歎誰與共行藏七言絶句賀宋嗣宗除嶽陽守五絶暫駕湖山兩轂華便應雲海去乘槎蓬萊弱水而今近看上鼇峯判五花鼎就軒皇上白雲遺音那復數韶韺湖山依舊魚龍在要識當時奏樂聲太息滕侯績未成尚須堤土作湖扃萬艘丹檻屯江浦千尺長虹鎖洞庭郡邉洞庭風濤莫測舟至無所寓皆泊南津去州甚逺又有覆溺之憂慶厯中太守滕侯宗諒欲自嶽陽門西距金雞作偃虹堤堤下盡以舍舟楫堤未作侯召去後無有繼者今不知能興此大利嘉惠湖中往來之人否龍虎十年氣壯哉抵排霜雪傲風雷湖邉老樹勤封植會有仙真邂逅來不樂還思上嶽陽江湖回首路茫茫欲生兩翮從公去濯足波濤望八荒杜子美寄韓諫議詩云今我不樂思嶽陽又云濯足洞庭望八荒送王昭祖國史吏部歸丹陽七絶尻脽連接召徐嚴誰羡平生太史談汗簡殺青推老手未應留滯只周南知君家住練湖邊家近東南尺五天一棹賦歸天有意練湖歸看滿湖蓮練湖滿湖發蓮華則丹陽是嵗必有為執政者萬牛回首重丘山才大誰令挽不前只好礨胸澆酒遣未妨洞腹曬書眠公有七夕詩云礨胸澆酒遣洞腹曬書眠秋毫得失肯悲歡北固山邉更一看龍虎四雄那復見今餘鐵鑊兩團團康莊車馬沸駢闐直欲轅攀挽不旋空使州人行砥道眷言相顧却澘然飛下翩然雲錦衣風流未忍此邦違相逢敢覺吾文進太息空持此道歸公初來眉州云持此道歸判不為俗吏之語覺吾文進會當依詞客之評稚老丁寧勸復回煙霾秋靜九關開定知青瑣黃扉去那得朱幡皂蓋來試何企筆偶書北忩酣卧日輪髙夢寐平生五栁陶睡起羲皇千古意挽回却向一秋毫綰蛇縈蚓應無用拘虎囚螭儻有餘付與劉侯堪把筆尊師不解世間書不用濡毫滴硯乾更隨曹植作波瀾碧窗點易真吾事洞府歸來玉露溥次程右史韻送僧南逰問果佛日問訊風顛妙喜師天南海北看孤飛如何指是無還地却作梅州萬里歸南嶽髙台長老道光嘗為靈源清侍者邂逅一見頗能談其行戒走筆為賦兩絶贈之長記涪翁舊有言太平清老世無賢而今一見髙台面遺烈真能賴得傳曉上髙峯破曉煙室中老子衲中賢對談移日無人付乞與清風萬壑傳湖上浪洶濤翻忽渺漫須臾風定見平寬此間有句無人得赤手長蛇試捕看當年敵騎敢窮妖只恃重湖洶怒潮誰謂山川堪設險向來還作盜之招題南嶽祝融峯祝融峯上躡雲根咫尺蒼霄欲手捫聞道東山曽小魯洞庭今已一毛吞黃雀餉師渾甫家仲安人事如何只好乖即今懷抱鄉誰開短檠閲罷三千牘遙夜相望把一杯深秋風露豆苖肥一粒才貪觸禍機萬里頭顱無處覔刺天那復見羣飛黃雀餉程右史二子夢逐桃溪流水回靖州幾日賦歸來風流却喜諸郎勝邂逅相從把一杯聞道賜環消息近旋看一葉泝江來黃腴風味殷勤去遙望沅湘屬賀杯他年一葉泝江來東坡離江黃貶所詩也乙丑中秋與山僧數輩自虎邱靈巖泛太湖登洞庭東山曰翠峯望湖中羣山髙下出沒如大圓鏡見百千萬億青螺髻然瑰瑋絶特蓋入眼未之見恨風作不能過西山睹林屋洞天之勝然已得其髣佛矣太湖三萬六千頃如今試吞無一毛目力未應論近逺泰山之本只秋毫七十二山湖面橫橫斜出沒亂青冥只疑亦有鈞天奏驚起魚龍舞洞庭羣山相望有無間髣佛三生常往還不用張帆越清泚化身先自遍西山孤峯直上散青眸山峙西東浸碧流弱水人言三萬里是問我已到瀛洲海門湖上東畔開海東飛仙呼不來乘桴便欲徑浮去無人從我復空回泛舟回邑次韻人言佳句有風流不羡騷人賦逺逰坐遣目前無限意筆端風起白蘋洲離臨安舟中有懷山藪朱文之子聊作五絶以寄楊栁垂垂小港流楊花無算逺空逰離情自是紛如絮不是伊能惹客愁無賴南風怒客船夢魂驚撼不成眠何當月白虛窗夜仍復論文更説禪仙舟輕漾首仍西我獨南征未得歸相望兩鷗空浩蕩何如雙鳥共鳴飛吳楚風光美甚都好雕肝腎細捫摹還家若問東西事為舉新詩當畫圖親庭遙望屬坤隅憑子還家與説吾為道江南足魚蟹鄉來不復似臞儒賀蘇卭州移鼎州兼呈八座四絶州並重湖水入雲天邉鴻鴈影還分政成魯衛因循地人是茅山大小君何須萬里尋岣嶁更問君王覓鑑湖箭鏃玉床今在手桃花流水去分符白鶴山頭留幾時白鶴池畔歌來遲浮邱伯去無消息老眼而今儻見之卭有白鶴山蓋仙迹頂有白鶴池浮邱伯故迹雲海相望定渺然已驚别夢不成圓他年勝處煩推轂此道滄洲好待看送青神丞劉平仲解官三絶多竒趙北燕南地還喜超然出兾方氣習敦龎今復見餘風千載有陶唐笑談裁割發硎餘豈是丞能不負余並舍過從無一事坐看㶁㶁水循除祖烈班班汗簡編鄉來人物覺尤賢轅攀耆老空遺恨不受渠儂一大錢甲子春過浙和周去華韻五絶遲回獨立湘江頭湘江無情空自流擬呼妃子弄雲瑟一㵼胸中千斛愁貪看衡麓數峯山那覺江風獵獵寒吹亂衣巾都不記橘洲沙上幾遺冠誰家花栁暗門邉投憩同維藥玉船醉卧黃鸝新弄舌一聲喚起小窗眠滿眼殘紅正亂飛端如棹入武林時此身也是鷦鷯樣乞與桃林借一枝雙峯翠掃半天餘遙想岷峩霽雪初足踏東南今已遍却思歸卧舊時廬題南嶽方廣後洞五百羅漢所居二絶嶽勢扶輿峻莫攀豈知深處鎖幽間千巖萬壑爭回互别有乾坤藏此間山自周回溪自流沉沉萬籟不勝幽此間有句誰堪話五百真人今在不戲中書巖寶印師方丈寧墮眉毛出為人舌端雷電不無神如今有口却挂壁草木巖中元自春放形漫浪蜀山西只是人間一闡提不擬將心覔安處間來洗腳玉泉溪張府君挽詩頻年來往鄭公鄉邂逅論文膝上郎已訝樹風增感嘆忽聞薤露送淒涼見説親顔晝日嬉夜窗膏火對書詩功名底事身終悮孝友平生政已施誠孝從來此物根只今誰與踐斯言夫君泉下儻無憾大字壁間猶有痕驚起龍蛇忽夢歸一朝脫屣萬緣非遙知月露寒松滴不是波濤木葉飛氣象重歸金馬地更看埋玉亂松楠他年父老還能説道上書生為指南和衢守張舍人龍眠捉馬圖詩筆間幻出馬中龍放牧平沙細草中亦有崑崙元圃意蕭騷駿尾欲生風世間凡馬那知數便覺從今一洗空不遣奚奴嚴玉勒恐因風雨渺龍宫公肅在東南三有書來未報聞其除司直以詩寄賀且謝江北江南罷戰塵兩階干舞作升平河東五色真毛羽九奏簫韶看一鳴小試猶為天下平惠文柱後要無刑從今凖擬于張傳吾世常司汗簡青縱橫才力自時須今代鵷行政要渠亦有故人巖石裏未嫌不奉子公書

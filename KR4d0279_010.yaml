body:
  text: 蓮峯集巻十宋史堯弼撰小簡與張丞相某今歳依迹寓緜竹所幸者日在鈞府數數聞相公動静於數千里外甚悉如日侍台坐然不知楚蜀之隔也每以自釋與常歳僻居欲問而不得長懷歉然不滿者異矣邇日冬令已半緬惟體道夙夜大川方增精神所運天人畢相佛氏所謂其福勝彼者非此而何某逺借廣厦之覆兩親益勝健自明年山林潜伏之計漸遂緜竹邦風久熟察之良近古禮義獨在父兄子弟方勉學而相門近族子一二皆秀可喜但鄉邑耕民與茶園者焦急特甚於嘉眉間春時流殍載路所不忍見仍歳已如此又不知來春如何更旬日將歸侍邉南首恩情欲往不可臨風浩歎伏冀坐御六氣以逰無極亦烏乎待哉不勝懇懇之私某近於戒仲四十九哥所竊伏聞相公溫清之餘閉閤深居天逰獨得大易微言著書已就雖聖賢常徳但造物者亦将未許忘世耳宓犧氏時近太古逰於易初難方生而未極至西伯周孔而變極矣三聖獨體此履險䝉難一時乗馬雖若迍邅而靈龜内得豈復為朶頥而失當時與後世固已如鳴鶴之子無不應者得非能居其室出其言行無不善者哉相公膝下兩雋器又共講此道樂未易言長公英特超詣見近文益快人意又竊聞少公深厚亮逹異甚某恨蹲伏蜀底不得遂下風之情以幸緒餘且縱觀兩公凌厲大為門下之慶凡此嚮仰其中如何伏紙飛越與張丞相子欽夫今嵗來緜竹五收所惠書三得所著文眷眷於我厚甚累年别來無如此慰滿也仲隨所附書果在嚴隆後到冬氣已深比來侍秦國太夫人和國大丞相起居復何如近與仲隨數數欵晤具言欽夫夙夜孝友上奉重親外接事物酬酢一切周旋切至之狀賢業方進如此仲隨極言之不覺感慨出涕聞之重增歎想益充此心放之四海何往而不可也文字真小技哉願益勉之不倦不息深所望者楚蜀邈然恨不得相與朝夕仲隨每過從相對日相念耳小道士聞益竒近作何文懷抱千萬殊未能布惟萬萬為親益盡珍重與李久善㕘議某違離門著又復累月居僻左地不能問起寢狀不勝依依有自少城來每上詢台座伏聞比來氣體益充神觀愈邁此固道力所致豈亦岷峨之神宻贊祐以隂厚吾蜀耶輒易少禀傳聞劉叔夏將赴眉倅而程右史季子侑未有移牒想台座必與薦名矣此小程所深望於門下者叔夏固自與右史有契更借九鼎一言端可必耳某不逺歸侍謹先録近所鄙著一二上干聞聴惶恐惶恐旦夕即面請鋤削尚冀為廟朝調䕶倍萬之懇不勝勤渠答張德明求誌銘某伏䝉專人惠書伯誠已辱誨諭矣委曲深至如此某何者迺敢當祇用戰惕且審此曰霜勁侍奉壽母令人起居萬福某出朝議先生之門豈敢於誌銘輒有違避但文字拙踈姓名么麽非任之屬敢不惴哉伏承見采之意厚甚且往復再四誠意激切恐益無地今更不敢逃命以重取罪容續杼思却告轉求當世知名逹官名位以充之使其姓名不玷金石幸甚幸甚德明與伯氏齊年以丈見目尤非所冝自此告削去比來敦匠諒勞神觀叔介今有消息至即往問左右他面以敷謝與邛守蘇季文某禀頓首拜上覆知府太博知炤鄉丈台座即日冬序極寒伏惟坐嘯餘暇燕處超然明神寵綏台候起居萬福某奉親里居䝉大庇粗無他拜侍未期伏幾倍保英重以俟環召為斯文九鼎之鎮不宣東坡先生妙道絶學乆矣不聞於世也而緒餘發於文章政事言論風㫖者又誰似之伏惟知府太博文慨然收之晚季全提祖印復盟斯道一世士䝉頼甚厚分符小試開府未幾而異效卓然抑黄豫章所謂海涵地負聲實相當内外稱職今復在兹乎竊惟知府太博丈鄉來道學鼎盛若將與惠荀輩相期滄州之外此特見於善者機耶風聲流聞不獨眉山增重而某亦被輝映多矣景仰往者髙安奉辭以西不聞誨誼者又四年矣其為道德文章之仰惓惓如何自聞歸為白鶴之鎮日夜延頸企踵以望綘節之來甚於邛民而開府至今幾一年迫近無幾舎乃不能一掃門下以釋其慕而又缺然無一書以承動静輸欵素則禮有似不遑者而豈其情哉盖自春末朱文約過左綿度夏及秋更歸又值邱嫂自湖外還一病不起災禍相惱百况感愴因循怠慢今始獲遣人以干記曹伏惟深照有素雖或以情矜亮而其忍媿負疚亦何以寄此顔也文慶公和尚茶榜文方靈芽未動時盡大地無㝷處争奈而今碾破不嫌與衆分甘須慿世外通人為辨箇中真味恭惟慶公禪師根苖特異風味不凡迥超百草頭邊獨秀孤峯頂上明招銚子直與踢飜則老籃兒已曾抛下上窮佛子下盡羣生如今總與一甌普同甘露從此不妨兩腋各起清風未露靈芽已知善種况是生先天地自本自根自固存要須飽熟風霜勿正勿望勿助長何勞摘取便足家珍苟非其人鮮能知味踢瓶翻銚不須公案重拈儲月分江便是東坡活法印公和尚醫眼茶榜文竊以起一生于萬死屬大醫王破羣昏而獨明是為圓覺特持絶品逺向勝流㐲惟印公大德寶鏡當空金篦在手透見祖師心孔刮開諸佛眼睛豈惟受龍樹之秘方抑亦造軒轅之靈竅九衢暗暝真推明月照臨一片太清肯使微雲㸃綴功德實難思議文章未易酬勞漫慿兩腋之清風為謝萬金之良藥祭唐惠父知郡文士盛吾州公獨早秀負笈飛翔揚于天校顥噩遺文深探厥妙發為詞華常出人右士争取式鋟木以鏤迄今誦傳載於人口登名大庭歴試云久俾囘郡邑政術愈茂餘刃恢宏迺縮于袖晩始擁麾方州是守千里之民嘆未始有神胡不弔奪民父母沉疴永已抱才莫究來以朱旛還以丹旐峽風秋悲送鷁西首嗟我與公弟昆中表寓悲此觴敬以文侑有懷惟德有涙如溜祭謝宰母太夫人文有僚潺江令尹則賢魯山潔清武城歌絃豈弟牧人不勤箠鞭厥惟令母實誨使然頋慙顓䝉獲㕘宦聨熟聞德聲考之僉言曰初作嬪睦婣家傳慈祥肅雍幽貞静専馥郁壼闈如蘭蓀荃藻蘋餘閒服膺簡編圖史紛綸旁羅貫穿授子以經籯金笑捐發為曹訓婦言盈篇謝蘊吟詠的歴珠蠙筆追衛家落紙雲煙具此衆美婦德之全詩歌女士夫人有焉謂冝壽豈千載華顛風木不停朝露忽先豈㳺瑤池雲輜翩躚或往浄方坐於寶蓮凱風之悲攀援莫還我卜升堂使婦拜前是則令儀奉之周旋今也來思空撫几筵恭陳豆籩淚流迸泉徙墳祭文易墓非古也孔子聞雨甚至防墓崩泫然流涕而况於體魄歸復于地兹久乃一旦震動暴露以遷為人子者其敢忍見而情有大不可已者前所塟地水流于寅在風水隂陽之法當禍長盖頻年之間血屬相望于死凢六人皆長也寅之流禍無窮血屬之存無幾祭祀之承其不可以多殺意吾二父之靈亦不得安於此土也今改卜新兆叶吉靈其將永寧嗚呼子孫幽昧愚塞不嫻習風水隂陽之故使墓師恣為欺誤誕謾至於多殺靈之血屬且震動暴露以遷其何所逃歸罪戾惟靈尚慈哀而赦佑之祭程右史文嗚呼人之出沒乎混茫之中其偶然耶才之洪纎智之明晦傳授之際亦有司之者耶凡榮粹得䘮升沉通塞其有數存耶豈倐來而暫去初亦無定耶人相與離合悲喜之變死生契濶之異亦有説耶其無有耶天耶人耶孰撡柄是孰主宰是何其不齊不測不常之若此耶使僕之悲至此其極耶悲夫人之病在才智之不足而公為有餘發為精悍蹈厲淘汰峻潔之文足以取高一世東南與吾蜀之士皆推稱焉天既畀之若將大為時之用者而止于是耶盖嘗立螭坳勸講讀掌命書横翔孤騖震驚一時何其忽然而遽却耶見忌于人三黜而歸天地日開明才者日登用衆皆謂公且召入司帝制胡為溘然而謝去耶公之逰布天下獨與僕弟昆親篤無間言往執别于鴈峯之前約相與為嵗寒之逰僕既行千里竒禍横出而天亦奪公以去天乎若此其毒耶孰知夫前日之歡變而為今日之慟耶雖然公處寵辱若逰戯然其于死生之際豈逰戯視之耶在易精氣為物逰魂為變而况于公之英爽如此謂之存耶沒耶此為逹觀者言也若其情鍾念結又將何以已耶孰能詰其説以紓僕之哀耶頃以患災闔門且久比公葬不得臨其窆拊其匶深有愧于古誼公尚寛其戾舉其觴耶墓誌銘廣漢楊君大年墓誌銘紹興歳辛未余過廣漢郡太守館留余於房公湖有客冠儀肅然謁入恭甚盖郡人楊其姓椿其名大年其字也察其姿外重遲而内敏悟多技能尤工於琴與醫指法及脉法往往自得余時病寒𠻳大年為胗脉論曩所為受病之説如目擊凡月夕必抱琴來為余鳴彈於茂樹翠竹湖水淡蕩交映之間飲常夜分不倦觀其趣非有求於余而相親重有味如此彼其真誠不以世合也一日從容為余言某早不天失所怙不自收束間近非儕類飲酒博奕放廢以故生無師友源流之益今始知貴學惕然疾病於中但年浸大扞格無所至奈何余為言若於琴與醫率能日造入移是術智於書能不輟不厭其何不能則喜且恨遂不復廢書余由是愛之問其鄉之人皆云大年家故饒於醫非以為術特病夫世之貧不能致醫以死與誤餌食之中道夭者迺探賾岐黄之文五運六氣之化又旁究他方書脉訣既有得則製丸劑施病者辛未春郡大疫死者相藉有親族忌不覘伺者大年不擇髙下往赴無憚家人懼甚拘是不得出則謬為他適其人多頼以活亦不自以為德也間持緡幣適市遇貧急探懷袖與之不省問誰氏余由是益異之後五年余復過廣漢其子浩來拜且泣乞書其墓則大年沒既四年矣為之澘然不得辭按楊氏世為郡著姓大年之父􅗈承節郎母彭氏沒數月大年毁骨立遂疾以沒得年三十四一男浩也三女長適朝奉郎張某之子某餘尚㓜以紹興某年某月某日從母夫人葬于雒縣宗賢鄉鴈橋里原其心篤於賙人賑物之事後將有顯者銘曰志莫充齒莫嗇没以孝幽不隔往從所恃永元宅楊君夫人彭氏墓誌銘廣漢楊君􅗈之夫人彭氏既沒之四年將葬其長子松之配張氏與余之外家有連松又以余友生張耆狀來乞銘辭不可夫人世為新都縣望氏曾大父某大父某父某皆有學不仕母氏少有淑質父母擇所冝歸歸楊君楊君家素豪夫人入門一相以慈和恭儉持其家而周施以待物使楊君得以日賦詩飲酒燕賔客自娯不知有家之為勞且勉楊君使不以心計鈎距取富曰厚薄聚散若有命其安之庶為子孫百世之計以故家雖豪而無乗時射利之為建炎初方師興上下告匱楊君傾家財佐用度朝廷命以承信郎寵之夫人諗之曰君父方在難一介𨽻臣可坐受官爵宴居自如耶楊君由是出領歩卒備邊守有勞遷承節郎夫人則為之主祭饋祀必潔以䖍理家事纎悉中度睦内外親皆得其歡誨子弟使志於學楊君既沒舅姑春秋高多疾恙夫人夙夜治湯劑進飲食求以順適其意無不盡得以怡然不啻如楊君之存楊君有女弟與夫人之妹早嫠居生産空索夫人取養于家無間然收其孤穉撫摩聘嫁必擇大家如已子篤於親愛多此類紹興二十三年微疾以沒年止六十族黨與其州閭悼惜焉夫人平生喜尊禮師儒出於天性始耆之父岷少從其伯父張公正已學文教授為鄉先生夫人使松從受業積十餘年敬愛日加於初一夕盜穿學宇欲攘取未得夫人聞之未黎明即函襲衣往勞問其勤厚如此已而松預郡賔薦若將昌其門以報夫人教廸之勤者未赴禮部試而夫人沒季子椿以毁致疾後夫人數月亦沒一女許適人未行先夫人沒孫男女若干人松舉夫人葬于雒縣崇賢鄉鴈橋里先塋旁實沒後四年某月某日銘曰不以富自娯行慈祥相㳟愛以延儒門將昌時不待今則亡我書其石光其藏兄伯振墓誌銘余伯兄明甫諱堯俊一字伯振少頴悟軼羣為文必爭竒無秋毫世俗氣年二十有六類省試陜蜀考官沈黎守費公樞得其論漢屈羣策驚異絶嘆以為非今世之作也手其文示同考官秘監何公倫㑹亦持其策來見謂識治亂體如制舉文而駕部外郎李公百藥已定其賦詩有天下之選之語擢為第一人文既出士皆傳誦余時行東南留在所見何公自蜀致其文於兵部外郎朱公輅宰相取觀嘉嘆黄甲恩解褐擬劍南西川節度推官從辟教授永康軍㝷被誥授左文林郎教授維川郡未幾除改四川茶馬事司屬官事素號繁浩兄始仕使者闕一切裁之無留難自先朝來賦取出入盈縮一日盡究深久於吏者之所不逮間論事諸臺稠人中聲吐洪暢琅然動左右坐皆増氣利害多所從其風神秀拔識度恢踈故論者期以功名可立致當世大事為可辦此余聞凢大夫士言然兄異時書來江湖當曰凢吾所以仕者盖為養耳必子之歸相卒業以求吾所聞於古而根於天者悲夫以累百絶於人之才内未極其所止外亦不一施於用不幸年僅三十有二以沒於是閭里州黨及天下之善士又相與出涕太息歔欷不置矣兄性虚澈囘轉古今理道先民微㫖人莫可究測者皆一見洞悟穿貫無遺滓自余及季氏盡力終莫能與俱也盖别七年而兄沒沒之二年余始歸歸二年嫂劉氏亦不幸卒先時皇大父墳地人率咎風水曰在葬書長不宜故兄之卜最謹久乃得在眉山武徳鄉岡如龍夭矯旋盤來投大溪止溪有潭洞號大小龍湫相望泓碧如珠聨與山相紆徐以紹興二十四年十二月丙申俱葬史氏占籍眉之青衣故久自余曾皇大父尚義俠皇大父有文聞太學至余父學務躬行周人急如已余母輔以無倦而兄益遇寒士慷慨視財如糞土一子宿孫益慧幾兄之不亡銘曰龍湫之旁龍蟠其岡維伯氏之藏後之昌王老僧塔銘嘉州龍逰之屬鎮曰平羌岸大江人夥以繁有院曰大悲屹焉市㕓中有老僧紹宗眉龎骨立頺然出入民伍間供其鐘磬梵唄之事闤闠郊墟莫擇所適遇人無貴賤尊少懽愉無間暇則敞軒面竹曰梢雲兀然終日若槁木然平生未嘗見欣戚藏之有無一不問或胠篋持去雖空乏亦不以動意得年八十有五以化幾若無心者夫浮屠人之說余不能盡詰大率欲旋反於初不滯於物死生變遷有不能入者余不知師果能通其説與否特喜其能一切不係著于心與今之利于山林墨墨而居于于而作自以為有得而其中往往遇物則勃蹊搶攘不知自息者是於其説余又不知其孰為通與否也師之化以紹興二十八年正月甲子火而塔之以三月丙寅小師法圓既奉順其生又能厚於其終求余書其塔師姓王氏世為儒生於余祖母為母弟銘曰不住著止係留身百年海一漚泊焉漚滅今何逰哀詞寶文閣學士開國郡公程丈哀詞并引紹興二十有三年冬十有一月寶文閣學士通議開國程公年八十有三以沒公宣和初為侍從持節察數道作鎮大藩晩爵徹侯就里第諸子吏二千石通守方郡諸孫曾元數十人皆宦學歳生朝朔望上壽赫然一時踰四十年老而益康寜聰明如少日今逹官貴人在天下聲位出公右固不乏至福禄壽善具美子孫蕃熾昌大必稱公皆以為莫及常考驗公所謂得報於天如此者數聞長老言公平生帥邊未常殺人軍法當死必為道地生全之徒流亦末减以論然所至設方略張紀律人不敢犯邊以安常推是心凡治獄必恕理民財凡厚取以刻不為夫天地之心惟生物為事人誠合於是天之豐其報其理不信然耶今人帥邊治軍率忍於殺謂不如是威不立治獄務鍛鍊人法惟恐不極斂以急刻刮民膏髓殆盡猶不慊以是故不得盡其年以長有其富貴子孫不旋踵不振不知幾何人報章章如是世曾不以戒何哉東坡翁常著外祖逸事實公四世祖以直盜蘆菔根者寃寜免官去已而壽九十其子壽八十五曾孫皆仕有聲同時為監司三人其為德源流所從來已逺至公益推是心施用程氏之世益大不以是故邪公生世滿足何憾吾特哀夫德人長者之於世寡也故表而出之為世鑒戒而係以詞六章章各五句其詞曰有燁其存延閣其崇徹侯其尊子孫後前金印纍兮或駕以出里人以觀指以謂人曰是壽善耀吾里兮有䀌其亡昔惟華顛燕笑林下几杖罍樽今委蛇兮里人告言曾是華屋忽焉丘山里無斯人悲莫禦兮相其哀榮夷考乃行維是不忍不黷于殺天則報兮咨爾後來懋乃厚德無或于薄以侈公禄永厥世兮宇文龍圖時中哀詞并引龍圖宇文公之䘮大夫士弔曰此今之德人長者也始其二仲兄在二府赫然上亦注目公踐外内任有聲身尊而德榮餘三十年間與人未嘗大色詞雖卑者言藹然聞人善若已有可謂德人長者今亡矣雖然是殆見其溫恭自牧者孰知其剛明立事奉身進退盖甚武且決者哉夫士所為不及於古者剛不能沉潜而吐柔不能高明而茹皆不足以成德吐者必折而茹者不可與立若公者非沉潜矣而又能高明者之謂哉宣政間權臣震天下天下士畢由其門嘗與之並朝而不少貶焉是時方恃治忘亂公獨懼國勢之弱及數言諸公不合則乞補外上留使賛讀不可遂知平陽㑹用師燕山燕將劉嗣初來分屯反側洶洶莫測公從一騎抵其營納以信誠諭以敗禍而隂設備張勢使兕虎豺狼帖帖不敢出穽以闞兩河頼之有司方倚燕事幸功公不樂懇請解郡去不數日嗣初叛殺守將屠平陽未幾而遂陷兩河最後守潼川朝廷方欲用公又力請祠於是蜀之斂日益急郡縣益削吏益以惴惴而公則已家居泊然矣獨何所見而然哉余行東南歸始獲拜公公不以年輩爵德與之論議無所不盡則以是知其私尤詳信平其溫柔而能正静而敏於先幾退然若怯而毅於事方進頡頏而勇於退盖處事甚勇且決而恨不大著於世以没也故嘗以為如是乃可為德人長者哉彼甘于自卑曲拳而擎跽竊竊然謹毫髪畏繩墨以為是德人長者之行此特以媚世取寵固名位而不去者之為耳而何益於治亂之數哉莠亂苖而紫奪朱惡其似也考論公德者庶其有别乎詞曰甚矣吾衰世泄泄兮末俗善柔波頽靡兮以是媚嫵麗權勢兮稻粱之謀網羅隘兮孰深而厲淺則掲兮有懷夫君横流涕兮被服明月中晰晰兮廓寥將翔方凌厲兮忽何所見戢而逝兮進也夷猶退勇鋭兮曽是溫良能果毅兮愛莫可起九原閉兮矢詞洩哀悼此世兮程右史哀詞并引吾州右史金華公以文字行于時交㳺滿天下晩特與余善盖樂余之誠而余亦得公之心别未幾而訃聞不覺失聲以哀因追論其平生有世未盡知其心之然者始公東逰余與之偕宰事者一見公以其文有西漢之風薦之策府擢右史兼外制勸講西清數引經誼合于國是天語褒稱之南方士之秀咸自謂莫及宰事者權益張慘舒恣肆驚一世莫不惴畏務軟熟順事之人謂公稍囘柔兩地可立致而公素通脱平眎之論議風發中其機的見忌惡出令䖍之安逺安逺在荒徼人謂之不堪公作歌詩飲酒一不問詩語間含譏刺于書常引喻切諷之皆人所難言聞者為之懼益見忌使為彭州丞以歸䜛媢者日至由是有武昌之獄又有靖川之移自安逺歸與余邂逅豫章城歡呼論文終日不識其為轉徙也將之靖川送石笋峯下則對客嘲哂如平時浩然以去宰事者沒公始歸英儁漸升用語誥命者必屬公而訃已聞莫不悼其有文而無年夫物之理跌而起起必大振而乃止于是豈能使余之勿悲然其終始三黜處之常若嬉戯然此亦豈無得而然者哉又豈可以死生脩促為悲友生家伋仲安善論公以為精悍而實坦蕩其眎交宰事者與交一命之士無間仲安盖知其心者公之文世皆知之而未知其心之然故序列之以洩余之哀而係以詞曰孰披雲錦之陸離兮泝清都而高騫忽囘颷之振薄兮驚墮翼于修闗理或柅而必行兮亦消息之固然不須臾而留待兮據華屋而丘墦彼軒裳而泥汙兮此翰墨之虹蟠較輕重于錙銖兮信天公之常慳抱連城以自珍兮顧通塞其何患矧逰戯于寵辱兮諒死生其一貫念摻别之曽幾兮倐音容之莫見心悵恨而長摧兮涕淋漓而日澘嗟露電之無住兮夫聖賢而能免非浩刼之可攝兮惟妙有之莫變儻此道以同符兮㑹將相求于汗漫簡池守孫公哀詞吾州所以重於天下者以風俗厚論議正士大夫有家法而子孫能世守往往可以傳後世風州里盖孫氏自少師公更内外任以風節聞簡池守朝議公又能嗣以清白亷謹飭子弟在家一切嚴法守不違在官動以禮義蹈繩墨在鄉吾州人喜論議率難服至言家法則稱公父子再世無間言曩吾州守有大為姦利不法者而性暴傲不祥以吾州衣冠之㑹作意侵辱之務以聲勢嚇人使不得窺議則肆志張甚公自簡池丐祠歸以禮一見守來謁公戒門以謝於是深居未嘗一與之私覿使若不可得親踈者終守之敗秋毫不敢以無禮加公古之仕者出則澤在人其居澤在州里至於動以禮義蹈繩墨使人視之而可則聞之而必作又澤之尤者則其沒也得非可以祭於社者之謂歟公之行治其詳則有書墓之刻吾州里之評與凡賢大夫士之公言在詞曰瞻故國兮喬木峙德人亡兮誰仰止驗平生兮無少累凛家法兮世其美入於學兮出以仕佩徽􅀈兮循轍軌善一鄉兮人則視紛後生兮恬委棄樂曠放兮事詼詭捐榘度兮踰德禮噫九原兮愛莫起哀以文兮詔吾里
